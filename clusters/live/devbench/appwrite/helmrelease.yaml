apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app appwrite
  namespace: live-devbench
spec:
  releaseName: *app
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: appwrite
      version: 1.2.2
      sourceRef:
        kind: HelmRepository
        name: appwrite-helm
        namespace: live-devbench
  values:
    commonLabels:
      milano.app: appwrite
    image:
      repository: docker.io/appwrite/appwrite
      tag: "1.9.0"
    console:
      image:
        repository: docker.io/appwrite/console
        tag: "7.5.7"
    appwrite:
      domain: dev.nirmalhk7.com
      existingSecret: appwrite-env
      existingSecretOpenSslKey: _APP_OPENSSL_KEY_V1
      usageStats: enabled
      storage:
        limit: "30000000"
      extraEnv:
        - name: _APP_OPTIONS_FORCE_HTTPS
          value: enabled
        - name: _APP_OPTIONS_ROUTER_FORCE_HTTPS
          value: enabled
        - name: _APP_OPTIONS_ABUSE
          value: enabled
        - name: _APP_SMTP_HOST
          value: smtp.maileroo.com
        - name: _APP_SMTP_PORT
          value: "587"
        - name: _APP_SMTP_SECURE
          value: tls
        - name: _APP_SMTP_USERNAME
          value: nestor@nirmalhk7.com
        - name: _APP_SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: appwrite-env
              key: _APP_SMTP_PASSWORD
        - name: _APP_SYSTEM_EMAIL_ADDRESS
          value: nestor@nirmalhk7.com
        - name: _APP_SYSTEM_EMAIL_NAME
          value: "Nirmal - Appwrite"
        - name: _APP_STORAGE_DEVICE
          value: Local
    api:
      podAnnotations:
        milano.app: appwrite
    realtime:
      podAnnotations:
        milano.app: appwrite
    workers:
      audits:
        enabled: true
      mails:
        enabled: true
      builds:
        enabled: false
      certificates:
        enabled: true
      functions:
        enabled: false
      statsResources:
        enabled: false
      statsUsage:
        enabled: true
    schedulers:
      executions:
        enabled: true
      functions:
        enabled: false
      messages:
        enabled: true
    persistence:
      enabled: true
      storageClass: milano-v3
      uploads:
        size: 10Gi
      cache:
        size: 2Gi
      certificates:
        size: 1Gi
      functions:
        size: 5Gi
      builds:
        size: 5Gi
      sites:
        size: 5Gi
    mariadb:
      enabled: false
    database:
      adapter: mariadb
      mode: external
      external:
        host: 172.16.0.106
        port: 3306
        rootUser: appwrite_rw
        name: appwrite
        existingSecret: appwrite-env
        existingSecretPasswordKey: _APP_DB_PASS
    redis:
      enabled: true
      image:
        repository: docker.io/library/redis
        tag: "8.8.0"
      metrics:
        enabled: false
      auth:
        enabled: true
      standalone:
        persistence:
          enabled: true
          storageClass: milano-v2
          size: 8Gi
