
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
  namespace: mgd-llm
spec:
  interval: 10m
  chart:
    spec:
      chart: open-webui
      version: 12.8.1
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: mgd-llm
  values:
    ollama:
      enabled: false
    redis-cluster:
      enabled: true
    podLabels:
      milano.app: *app
      milano.level: managed
    persistence:
      storageClass: milano-v2