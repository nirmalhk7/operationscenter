
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
  namespace: mgd-llm
spec:
  interval: 10m
  chart:
    spec:
      chart: open-webui
      version: 12.13.0
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: mgd-llm
  values:
    enableOpenaiApi: true
    openaiBaseApiUrls:
      - "https://generativelanguage.googleapis.com/v1beta/openai"
      - "https://openrouter.ai/api/v1"
    openaiApiKeysExistingSecret: open-webui-secrets
    openaiApiKeysExistingSecretKey: OPENAI_API_KEYS
    ollama:
      enabled: false
    extraEnvVars:
      - name: ENABLE_OPENAI_API
        value: "true"
    redis:
      enabled: true
    command:
      - /bin/sh
      - -lc
    args:
      - |
        cat >/usr/local/lib/python3.11/site-packages/sitecustomize.py <<'PY'
        """
        Disable TLS verification for Open WebUI's Authlib OIDC client.

        Authelia is fronted by Traefik's default certificate in this cluster, so
        Open WebUI needs the same trust posture Grafana already uses.
        """
        try:
          import functools
          from authlib.integrations.httpx_client.oauth2_client import AsyncOAuth2Client
        except Exception:
          pass
        else:
          _orig_init = AsyncOAuth2Client.__init__

          @functools.wraps(_orig_init)
          def _patched_init(self, *args, **kwargs):
            kwargs.setdefault('verify', False)
            return _orig_init(self, *args, **kwargs)

          AsyncOAuth2Client.__init__ = _patched_init
          print('sitecustomize: patched authlib httpx client', flush=True)

        try:
          import functools
          from urllib.parse import urlparse
          import open_webui.routers.openai as _openai_router

          _orig_get_all_models = _openai_router.get_all_models

          @functools.wraps(_orig_get_all_models)
          async def _patched_get_all_models(request, *args, **kwargs):
            res = await _orig_get_all_models(request, *args, **kwargs)
            if not res or 'data' not in res:
              return res
            api_base_urls = getattr(request.app.state.config, 'OPENAI_API_BASE_URLS', [])
            filtered_data = []
            for m in res['data']:
              url_idx = m.get('urlIdx')
              base_url = api_base_urls[url_idx] if url_idx is not None and url_idx < len(api_base_urls) else ''
              hostname = urlparse(base_url).hostname or ''
              if hostname == 'openrouter.ai':
                model_id = str(m.get('id', ''))
                pricing = m.get('pricing') or {}
                is_free = (
                  model_id.endswith(':free')
                  or model_id == 'openrouter/free'
                  or (str(pricing.get('prompt', '1')) == '0' and str(pricing.get('completion', '1')) == '0')
                )
                if not is_free:
                  continue
                raw_name = str(m.get('name', model_id))
                if ':' in raw_name:
                  parts = raw_name.split(':', 1)
                  m['name'] = f'openrouter/{parts[0].strip().lower()}/{parts[1].strip()}'
                else:
                  provider = model_id.split('/')[0].lower() if '/' in model_id else 'openrouter'
                  m['name'] = f'openrouter/{provider}/{raw_name}'
              filtered_data.append(m)
            res['data'] = filtered_data
            if hasattr(request.app, 'state'):
              request.app.state.OPENAI_MODELS = {m['id']: m for m in filtered_data}
            return res

          _openai_router.get_all_models = _patched_get_all_models
          print('sitecustomize: patched openai model filter & naming', flush=True)
        except Exception as e:
          print('sitecustomize error patching openai models:', e, flush=True)
        PY
        exec /app/backend/start.sh
    podLabels:
      milano.app: *app
      milano.level: managed
    podAnnotations:
      milano.io/open-webui-auth-revision: "2026-06-03c"
    persistence:
      storageClass: milano-v2
    extraEnvFrom:
      - configMapRef:
          name: open-webui-env
      - secretRef:
          name: open-webui-secrets
