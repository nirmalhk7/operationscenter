
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
  namespace: mgd-llm
spec:
  interval: 10m
  chart:
    spec:
      chart: open-webui
      version: 12.9.0
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: mgd-llm
  values:
    ollama:
      enabled: false
    redis-cluster:
      enabled: true
    podLabels:
      milano.app: *app
      milano.level: managed
    persistence:
      storageClass: milano-v2
    extraEnvVars:
      - name: GEMINI_API_KEY
        valueFrom:
          secretKeyRef:
            name: open-webui-secrets
            key: GEMINI_API_KEY
      - name: BRAVE_SEARCH_API_KEY
        valueFrom:
          secretKeyRef:
            name: open-webui-secrets
            key: BRAVE_SEARCH_API_KEY
    extraEnvFrom:
      - configMapRef:
          name: open-webui-env