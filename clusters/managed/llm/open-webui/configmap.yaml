apiVersion: v1
kind: ConfigMap
metadata:
  name: open-webui-env
  namespace: mgd-llm
data:
  ENABLE_PERSISTENT_CONFIG: "false"
  # Ollama remains the internal embeddings provider, but is not exposed as a
  # chat-model source. The picker therefore contains only Gemini and OpenRouter.
  ENABLE_OLLAMA_API: "false"
  OLLAMA_BASE_URL: "http://ollama.mgd-llm.svc.cluster.local:11434"
  ENABLE_OPENAI_API: "true"
  OPENAI_API_BASE_URLS: "https://generativelanguage.googleapis.com/v1beta/openai;https://openrouter.ai/api/v1"
  ENABLE_WEB_SEARCH: "true"
  WEB_SEARCH_ENGINE: "tavily"
  RAG_EMBEDDING_ENGINE: "ollama"
  RAG_EMBEDDING_MODEL: "nomic-embed-text"
  OLLAMA_API_BASE_URL: "http://ollama.mgd-llm.svc.cluster.local:11434"
  CHUNK_SIZE: "1000"
  CHUNK_OVERLAP: "150"
  RAG_TOP_K: "8"
  RAG_TOP_K_RERANKER: "5"
  RAG_RELEVANCE_THRESHOLD: "0.1"
  ENABLE_RAG_HYBRID_SEARCH: "true"
  ENABLE_RAG_HYBRID_SEARCH_ENRICHED_TEXTS: "true"
  WEB_SEARCH_RESULT_COUNT: "8"
  WEB_SEARCH_CONCURRENT_REQUESTS: "4"
  WEB_LOADER_CONCURRENT_REQUESTS: "8"
  WEBUI_AUTH: "true"
  DEFAULT_USER_ROLE: "user"
  ENABLE_OAUTH_SIGNUP: "true"
  ENABLE_LOGIN_FORM: "false"
  ENABLE_OAUTH_PERSISTENT_CONFIG: "false"
  ENABLE_OAUTH_ROLE_MANAGEMENT: "true"
  OAUTH_ROLES_CLAIM: "groups"
  OAUTH_ADMIN_ROLES: "admins"
  OAUTH_ALLOWED_ROLES: "admins,user"
  OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "true"
  OAUTH_CLIENT_ID: "open-webui"
  OAUTH_PROVIDER_NAME: "Authelia"
  OAUTH_SCOPES: "openid email profile groups"
  OAUTH_CODE_CHALLENGE_METHOD: "S256"
  OPENID_PROVIDER_URL: "https://secure.trusted.nirmalhk7.com/.well-known/openid-configuration"
  OPENID_REDIRECT_URI: "https://llms.trusted.nirmalhk7.com/oauth/oidc/callback"
  ENABLE_EVALUATION_ARENA_MODELS: "false"
  AIOHTTP_CLIENT_TIMEOUT: "300"
  AIOHTTP_CLIENT_TIMEOUT_OPENAI_MODEL_LIST: "10"
  SCARF_NO_ANALYTICS: "true"
  DO_NOT_TRACK: "true"
  ANONYMIZED_TELEMETRY: "false"
  CONCURRENT_UPLOADS_LIMIT: "2"
  ENABLE_STREAMING: "true"
  RAG_EMBEDDING_BATCH_SIZE: "8"
  WEBUI_URL: "https://llms.trusted.nirmalhk7.com"
