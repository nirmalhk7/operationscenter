apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-clickhouse
  namespace: mgd-llm
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: langfuse
    milano.app: langfuse
    milano.level: managed
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
      app.kubernetes.io/instance: langfuse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/instance: langfuse
        milano.app: langfuse
        milano.level: managed
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:25.2.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8123
            - name: tcp
              containerPort: 9000
          env:
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: users
              mountPath: /etc/clickhouse-server/users.d/default-password.xml
              subPath: default-password.xml
      volumes:
        - name: users
          secret:
            secretName: langfuse-clickhouse-config
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-clickhouse-data
