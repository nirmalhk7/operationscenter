apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app searxng
  namespace: mgd-llm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: *app
  template:
    metadata:
      labels:
        app: *app
        milano.app: *app
        milano.level: managed
    spec:
      containers:
        - name: *app
          image: docker.io/searxng/searxng:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SEARXNG_BASE_URL
              value: "https://xng.trusted.nirmalhk7.com/"
            - name: SEARXNG_BIND_ADDRESS
              value: "0.0.0.0"
            - name: SEARXNG_PORT
              value: "8080"
            - name: SEARXNG_PUBLIC_INSTANCE
              value: "false"
          envFrom:
            - secretRef:
                name: searxng-secret
          volumeMounts:
            - name: config
              mountPath: /etc/searxng
            - name: cache
              mountPath: /var/cache/searxng
          startupProbe:
            httpGet:
              path: /
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: searxng-config
        - name: cache
          persistentVolumeClaim:
            claimName: searxng-cache
