apiVersion: batch/v1
kind: CronJob
metadata:
  name: paperclip-company-import
  namespace: mgd-llm
spec:
  schedule: "15 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: paperclip-company-import
            milano.app: paperclip
            milano.level: managed
        spec:
          restartPolicy: Never
          enableServiceLinks: false
          initContainers:
            - name: wait-for-paperclip
              image: busybox:1.37
              command:
                - sh
                - -c
                - |
                  until wget -qO- --header="Host: paperclip.trusted.nirmalhk7.com" http://paperclip.mgd-llm.svc:3100/api/health | grep -q '"status":"ok"'; do
                    echo "waiting for paperclip..."
                    sleep 5
                  done
          containers:
            - name: import
              image: node:24-bookworm-slim
              command:
                - sh
                - -c
                - |
                  set -eu
                  npm install -g paperclipai@0.3.1
                  paperclipai company import \
                    --from /company \
                    --target existing \
                    --company-id "${PAPERCLIP_COMPANY_ID}" \
                    --collision replace \
                    --api-base "http://paperclip.mgd-llm.svc:3100" \
                    --api-key "${PAPERCLIP_API_KEY}"
              env:
                - name: PAPERCLIP_COMPANY_ID
                  valueFrom:
                    configMapKeyRef:
                      name: paperclip-env
                      key: PAPERCLIP_COMPANY_ID
                - name: PAPERCLIP_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: paperclip-secrets
                      key: PAPERCLIP_API_KEY
              volumeMounts:
                - name: company
                  mountPath: /company
                  readOnly: true
          volumes:
            - name: company
              configMap:
                name: paperclip-company-operations-center
