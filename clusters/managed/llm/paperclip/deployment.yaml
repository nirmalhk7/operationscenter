apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app paperclip
  namespace: mgd-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: *app
  template:
    metadata:
      labels:
        app: *app
        milano.app: *app
        milano.level: managed
    spec:
      enableServiceLinks: false
      containers:
        - name: *app
          image: paperclipai/paperclip:latest
          ports:
            - containerPort: 3100
              protocol: TCP
          envFrom:
            - configMapRef:
                name: paperclip-env
            - secretRef:
                name: paperclip-secrets
          volumeMounts:
            - name: data
              mountPath: /paperclip
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperclip-data
