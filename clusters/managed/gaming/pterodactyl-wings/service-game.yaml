apiVersion: v1
kind: Service
metadata:
  name: &app pterodactyl-wings-game
  labels:
    milano.app: pterodactyl-wings
    milano.level: managed
spec:
  type: NodePort
  externalTrafficPolicy: Local
  ports:
    - name: mc-tcp
      port: 25565
      targetPort: 25565
      nodePort: 30565
      protocol: TCP
  selector:
    milano.app: pterodactyl-wings
