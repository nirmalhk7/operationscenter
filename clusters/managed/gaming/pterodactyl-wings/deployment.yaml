apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app pterodactyl-wings
  annotations:
    secret.reloader.stakater.com/reload: pterodactyl-wings-config
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      milano.app: *app
  template:
    metadata:
      labels:
        milano.app: *app
    spec:
      initContainers:
        - name: apply-minecraft-settings
          image: busybox:1.38.0
          command:
            - sh
            - -ec
            - |
              server_dir="/var/lib/pterodactyl/volumes/49df4544-3f70-49f5-b890-7882e0b5bf1b"
              target="${server_dir}/server.properties"
              desired="/etc/minecraft-settings/server.properties"
              permissions_target="${server_dir}/permissions.json"
              permissions_desired="/etc/minecraft-settings/permissions.json"

              if [ ! -f "${target}" ]; then
                echo "No server.properties found at ${target}; skipping Minecraft settings overlay."
                exit 0
              fi

              cp "${target}" "${target}.gitops.bak"

              while IFS= read -r line || [ -n "${line}" ]; do
                case "${line}" in
                  ""|\#*) continue ;;
                  *=*) ;;
                  *) echo "Ignoring invalid Minecraft property: ${line}"; continue ;;
                esac

                key="${line%%=*}"
                value="${line#*=}"
                escaped_value="$(printf '%s' "${value}" | sed 's/[\/&]/\\&/g')"

                if grep -q "^${key}=" "${target}"; then
                  sed -i "s/^${key}=.*/${key}=${escaped_value}/" "${target}"
                else
                  printf '%s=%s\n' "${key}" "${value}" >> "${target}"
                fi
              done < "${desired}"

              if [ -f "${permissions_desired}" ]; then
                if [ -f "${permissions_target}" ]; then
                  cp "${permissions_target}" "${permissions_target}.gitops.bak"
                fi
                cp "${permissions_desired}" "${permissions_target}"
                chown 988:988 "${permissions_target}"
                chmod 664 "${permissions_target}"
              fi
          volumeMounts:
            - name: volumes
              mountPath: /var/lib/pterodactyl/volumes
            - name: minecraft-settings
              mountPath: /etc/minecraft-settings
              readOnly: true
      containers:
        - name: wings
          # renovate: depName=ghcr.io/pterodactyl/wings
          image: ghcr.io/pterodactyl/wings:latest
          env:
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
          ports:
            - name: api
              containerPort: 8080
            - name: sftp
              containerPort: 2022
            - name: mc
              containerPort: 6901
              protocol: TCP
          securityContext:
            privileged: true
          volumeMounts:
            - name: config
              mountPath: /etc/pterodactyl
            - name: volumes
              mountPath: /var/lib/pterodactyl/volumes
              mountPropagation: Bidirectional
            - name: dockerlib
              mountPath: /var/lib/docker
            - name: tmp
              mountPath: /tmp/pterodactyl
            - name: run
              mountPath: /run/wings
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
        - name: dind
          image: docker:26-dind
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          args:
            - --host=tcp://0.0.0.0:2375
            - --tls=false
            - --mtu=1400
            - --dns=1.1.1.1
            - --dns=8.8.8.8
          securityContext:
            privileged: true
          volumeMounts:
            - name: dockerlib
              mountPath: /var/lib/docker
            - name: volumes
              mountPath: /var/lib/pterodactyl/volumes
              mountPropagation: Bidirectional
            - name: tmp
              mountPath: /tmp/pterodactyl
            - name: run
              mountPath: /run/wings
      volumes:
        - name: config
          secret:
            secretName: pterodactyl-wings-config
        - name: volumes
          persistentVolumeClaim:
            claimName: pterodactyl-wings-pvc
        - name: minecraft-settings
          configMap:
            name: pterodactyl-minecraft-settings
        - name: dockerlib
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
