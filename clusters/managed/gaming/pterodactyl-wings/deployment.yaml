apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app pterodactyl-wings
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      milano.app: *app
  template:
    metadata:
      labels:
        milano.app: *app
    spec:
      containers:
        - name: wings
          # renovate: depName=ghcr.io/pterodactyl/wings
          image: ghcr.io/pterodactyl/wings:latest
          env:
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
          ports:
            - name: api
              containerPort: 8080
            - name: sftp
              containerPort: 2022
            - name: mc
              containerPort: 6901
              protocol: TCP
          securityContext:
            privileged: true
          volumeMounts:
            - name: config
              mountPath: /etc/pterodactyl
            - name: volumes
              mountPath: /var/lib/pterodactyl/volumes
              mountPropagation: Bidirectional
            - name: dockerlib
              mountPath: /var/lib/docker
            - name: tmp
              mountPath: /tmp/pterodactyl
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
        - name: minecraft-bedrock
          # renovate: depName=itzg/minecraft-bedrock-server
          image: itzg/minecraft-bedrock-server:latest
          env:
            - name: EULA
              value: "TRUE"
            - name: SERVER_NAME
              value: "Milano Bedrock"
            - name: SERVER_PORT
              value: "6901"
            - name: ALLOW_LIST
              value: "false"
          ports:
            - name: bedrock
              containerPort: 6901
              protocol: UDP
          volumeMounts:
            - name: volumes
              mountPath: /data
              subPath: minecraft-bedrock
        - name: dind
          image: docker:26-dind
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          args:
            - --host=tcp://0.0.0.0:2375
            - --tls=false
            - --mtu=1400
          securityContext:
            privileged: true
          volumeMounts:
            - name: dockerlib
              mountPath: /var/lib/docker
            - name: volumes
              mountPath: /var/lib/pterodactyl/volumes
              mountPropagation: Bidirectional
            - name: tmp
              mountPath: /tmp/pterodactyl
      volumes:
        - name: config
          secret:
            secretName: pterodactyl-wings-config
        - name: volumes
          persistentVolumeClaim:
            claimName: pterodactyl-wings-pvc
        - name: dockerlib
          emptyDir: {}
        - name: tmp
          emptyDir: {}
