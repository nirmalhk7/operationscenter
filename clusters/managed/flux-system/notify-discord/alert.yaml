apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: &app discord-alert
spec:
  providerRef:
    name: discord
  eventSeverity: error
  eventSources:
    - kind: HelmRepository
      name: '*'
    - kind: HelmRelease
      name: '*'
    - kind: Kustomization
      name: '*'
