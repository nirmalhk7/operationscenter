apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      version: 40.3.0
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: kube-system
  values:
    crds:
      enabled: true
    deployment:
      podAnnotations:
        prometheus.io/port: "8082"
        prometheus.io/scrape: "true"
    providers:
      kubernetesIngress:
        publishedService:
          enabled: true
      kubernetesCRD:
        enabled: true
    priorityClassName: system-cluster-critical
    image:
      repository: rancher/mirrored-library-traefik
      tag: "3.7.4"
    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    service:
      spec:
        ipFamilyPolicy: PreferDualStack
    ports:
      web:
        hostPort: 80
      websecure:
        hostPort: 443
    additionalArguments:
      - "--api.dashboard=true"
