apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: kube-system
spec:
  interval: 10m
  chart:
    spec:
      chart: reloader
      version: 2.2.14
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: kube-system
  values:
    reloader:
      reloadStrategy: annotations
