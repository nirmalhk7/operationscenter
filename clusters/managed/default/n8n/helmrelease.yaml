apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app n8n
  namespace: mgd-default
spec:
  chart:
    spec:
      chart: n8n
      version: 1.16.35
      sourceRef:
        kind: HelmRepository
        name: community-charts
        namespace: mgd-default
  interval: 10m
  releaseName: *app
  values:
    podLabels:
      milano.app: *app
    main:
      persistence:
        enabled: true
        storageClass: milano-v2
        size: 1Gi
      extraEnvVars:
        - name: N8N_PROTOCOL
          value: "https"
        - name: N8N_HOST
          value: "n8n.trusted.nirmalhk7.com"
        - name: N8N_PORT
          value: "5678"
        - name: NODE_ENV
          value: "production"
        - name: DB_TYPE
          value: postgresdb
        - name: DB_POSTGRESDB_DATABASE
          value: *app
        - name: DB_POSTGRESDB_HOST
          value: "172.16.0.106"
        - name: DB_POSTGRESDB_PORT
          value: "5432"
        - name: DB_POSTGRESDB_USER
          value: "n8n_rw"
      extraSecretNamesForEnvFrom:
        - n8n-credentials
    webhook:
      url: "https://n8n.trusted.nirmalhk7.com"
    timezone: "America/Denver"
