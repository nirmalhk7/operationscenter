apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app n8n
  namespace: mgd-default
spec:
  chart:
    spec:
      chart: n8n
      version: 1.16.35
      sourceRef:
        kind: HelmRepository
        name: community-charts
        namespace: mgd-default
  interval: 10m
  releaseName: *app
  values:
    podLabels:
      milano.app: *app
    main:
      persistence:
        enabled: true
        storageClass: milano-v2
        size: 1Gi
      extraEnvVars:
        N8N_PROTOCOL: "https"
        N8N_HOST: "n8n.trusted.nirmalhk7.com"
      extraSecretNamesForEnvFrom:
        - n8n-credentials
    webhook:
      url: "https://n8n.trusted.nirmalhk7.com"
    timezone: "America/Denver"
