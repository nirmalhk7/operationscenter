apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app n8n
  namespace: mgd-default
spec:
  chart:
    spec:
      chart: n8n
      version: 1.16.46
      sourceRef:
        kind: HelmRepository
        name: community-charts
        namespace: mgd-default
  interval: 10m
  releaseName: *app
  values:
    podLabels:
      milano.app: *app
    main:
      persistence:
        enabled: true
        storageClass: milano-v2
        size: 1Gi
      extraEnvVars:
        N8N_PROTOCOL: "https"
        N8N_HOST: "n8n.trusted.nirmalhk7.com"
        N8N_EDITOR_BASE_URL: "https://n8n.trusted.nirmalhk7.com"
        N8N_SSO_MANAGED_BY_ENV: "true"
        N8N_SSO_OIDC_LOGIN_ENABLED: "true"
        N8N_SSO_OIDC_CLIENT_ID: "n8n"
        N8N_SSO_OIDC_DISCOVERY_ENDPOINT: "https://secure.trusted.nirmalhk7.com/.well-known/openid-configuration"
        N8N_SSO_USER_ROLE_PROVISIONING: "instance_role"
      extraSecretNamesForEnvFrom:
        - n8n-credentials
        - n8n-oidc-credentials
        - n8n-smtp-credentials
    webhook:
      url: "https://n8n.trusted.nirmalhk7.com"
    timezone: "America/Denver"
