kind: SealedSecret
metadata:
  name: n8n-smtp-credentials
  namespace: mgd-default
spec:
  encryptedData:
    N8N_EMAIL_MODE: 
    N8N_SMTP_HOST: 
    N8N_SMTP_PASS: 
    N8N_SMTP_PORT: 
    N8N_SMTP_SENDER: 
