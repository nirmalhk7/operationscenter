apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app calendar-merge
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: *app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: *app
        milano.app: *app
        milano.level: managed
    spec:
      serviceAccountName: default
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      containers:
        - name: *app
          image: "blakdav/ical-merger:latest"
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: calendar-merge-secret
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
