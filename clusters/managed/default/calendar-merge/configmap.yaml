apiVersion: v1
kind: ConfigMap
metadata:
  name: calendar-merge-script
  namespace: mgd-default
  labels:
    app.kubernetes.io/name: calendar-merge
data:
  server.js: |
    const http = require('http');
    const https = require('https');
    const { URL } = require('url');

    let cachedMergedCalendar = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Merged Calendar//EN\r\nEND:VCALENDAR';

    const fetchICS = (urlString, redirects = 0) => new Promise((resolve, reject) => {
      if (redirects > 5) return reject(new Error('Too many redirects'));

      const url = new URL(urlString);
      const client = url.protocol === 'https:' ? https : http;

      client.get(url, (res) => {
        if ([301, 302, 303, 307, 308].includes(res.statusCode) && res.headers.location) {
          return fetchICS(new URL(res.headers.location, urlString).href, redirects + 1).then(resolve).catch(reject);
        }

        if (res.statusCode < 200 || res.statusCode >= 300) {
          return reject(new Error(`Failed with status: ${res.statusCode}`));
        }

        let data = '';
        res.on('data', chunk => data += chunk);
        res.on('end', () => resolve(data));
      }).on('error', reject);
    });

    const pollCalendars = async () => {
      console.log('Polling calendars...');
      try {
        const urls = process.env.ICS_URLS ? process.env.ICS_URLS.split(',').map(s => s.trim()).filter(Boolean) : [];
        if (urls.length === 0) {
          console.log('No ICS URLs configured.');
          return;
        }

        const calendars = await Promise.allSettled(urls.map(url => fetchICS(url)));

        let events = calendars.map((result, index) => {
          if (result.status === 'fulfilled') {
            const cal = result.value;
            const start = cal.indexOf('BEGIN:VEVENT');
            const end = cal.lastIndexOf('END:VEVENT') + 10;
            if (start !== -1 && end !== -1) return cal.substring(start, end);
          } else {
            console.error(`Failed to fetch calendar ${urls[index]}:`, result.reason.message);
          }
          return '';
        }).filter(Boolean).join('\r\n');

        cachedMergedCalendar = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Merged Calendar//EN\r\n${events}\r\nEND:VCALENDAR`;
        console.log('Successfully updated merged calendar cache.');
      } catch (err) {
        console.error('Error during polling:', err);
      }
    };

    // Poll every 10 minutes
    setInterval(pollCalendars, 10 * 60 * 1000);
    // Initial poll
    pollCalendars();

    const server = http.createServer((req, res) => {
      if (req.url !== '/') {
        res.writeHead(404);
        return res.end();
      }

      res.writeHead(200, { 'Content-Type': 'text/calendar; charset=utf-8' });
      res.end(cachedMergedCalendar);
    });

    server.listen(8080, () => console.log('Merge server running on 8080'));
