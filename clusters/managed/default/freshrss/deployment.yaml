apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app freshrss
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: *app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: *app
        milano.app: *app
        milano.level: managed
    spec:
      containers:
        - name: *app
          image: lscr.io/linuxserver/freshrss:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
