apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app outline
  namespace: mgd-default
spec:
  chart:
    spec:
      chart: outline
      version: 0.8.0
      sourceRef:
        kind: HelmRepository
        name: community-charts
        namespace: mgd-default
  interval: 10m
  releaseName: *app
  values:
    web:
      forceHttps: false
    url: "https://outline.trusted.nirmalhk7.com"
    extraSecretNamesForEnvFrom:
      - outline-credentials
    extraEnvVars:
      OIDC_CLIENT_ID: outline
      OIDC_AUTH_URI: https://secure.trusted.nirmalhk7.com/api/oidc/authorization
      OIDC_TOKEN_URI: https://secure.trusted.nirmalhk7.com/api/oidc/token
      OIDC_USERINFO_URI: https://secure.trusted.nirmalhk7.com/api/oidc/userinfo
      OIDC_USERNAME_CLAIM: preferred_username
      OIDC_DISPLAY_NAME: Authelia
      OIDC_SCOPES: openid offline_access profile email
    fileStorage:
      local:
        persistence:
          storageClass: milano-v2
    minio:
      persistence:
        storageClass: milano-v2
    podLabels:
      milano.app: *app
    externalPostgresql:
      host: "172.16.0.106"
      port: 5432
      username: "outline_rw"
      database: *app
      existingSecret: outline-credentials
      passwordSecretKey: "DB_PASSWORD"
    redis:
      enabled: true
