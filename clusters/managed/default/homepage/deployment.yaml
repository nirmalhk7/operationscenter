apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app homepage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: *app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: *app
        milano.app: *app
        milano.level: managed
    spec:
      serviceAccountName: *app
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      hostAliases:
        - ip: "172.16.0.101"
          hostnames:
            - home.trusted.nirmalhk7.com
            - auth.trusted.nirmalhk7.com
            - grafana.trusted.nirmalhk7.com
            - prometheus.trusted.nirmalhk7.com
            - scrutiny.trusted.nirmalhk7.com
            - secure.trusted.nirmalhk7.com
            - portainer.trusted.nirmalhk7.com
            - robot.trusted.nirmalhk7.com
            - proxmox.trusted.nirmalhk7.com
            - vault.trusted.nirmalhk7.com
            - authelia.trusted.nirmalhk7.com
            - authentik.trusted.nirmalhk7.com
            - immich.trusted.nirmalhk7.com
            - drive.trusted.nirmalhk7.com
            - git.trusted.nirmalhk7.com
            - n8n.trusted.nirmalhk7.com
            - outline.trusted.nirmalhk7.com
      containers:
        - name: *app
          image: "ghcr.io/gethomepage/homepage:v1.12.3"
          imagePullPolicy: Always
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "home.trusted.nirmalhk7.com,10.0.0.10"
          envFrom:
            - secretRef: 
                name: homepage-secret
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /app/config/custom.js
              name: homepage-config
              subPath: custom.js
            - mountPath: /app/config/custom.css
              name: homepage-config
              subPath: custom.css
            - mountPath: /app/config/bookmarks.yaml
              name: homepage-config
              subPath: bookmarks.yaml
            - mountPath: /app/config/docker.yaml
              name: homepage-config
              subPath: docker.yaml
            - mountPath: /app/config/kubernetes.yaml
              name: homepage-config
              subPath: kubernetes.yaml
            - mountPath: /app/config/services.yaml
              name: homepage-config
              subPath: services.yaml
            - mountPath: /app/config/settings.yaml
              name: homepage-config
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              name: homepage-config
              subPath: widgets.yaml
            - mountPath: /app/config/proxmox.yaml
              name: homepage-config
              subPath: proxmox.yaml
            - mountPath: /app/config/logs
              name: logs
            - mountPath: /app/secret
              name: homepage-secret
              readOnly: true
      volumes:
        - name: homepage-config
          configMap:
            name: *app
        - name: logs
          emptyDir: {}
        - name: homepage-secret
          secret:
            secretName: homepage-secret