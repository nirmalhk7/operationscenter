apiVersion: v1
kind: ConfigMap
metadata:
  name: &app homepage
data:
  kubernetes.yaml: |
    mode: cluster
    ingress: false
    traefik: true
  proxmox.yaml: |
    url: https://proxmox.trusted.nirmalhk7.com:8006
    token: ${PROXMOX_USERNAME}
    secret: ${PROXMOX_PASSWORD}
  settings.yaml: |
    title: "Operations Center Boulder - MILANO"
    description: "Welcome to Milano!"
    background:
      image: https://images.unsplash.com/photo-1600104146011-ad1a8571f161
      blur: sm
      opacity: 50
    useEqualHeights: false
    headerStyle: clean
    statusStyle: dot
    fullWidth: true
    maxGroupColumns: 6
    bookmarksStyle: icons
    iconStyle: theme
    disableIndexing: true
    target: _blank
    layout:
      Observability: {}
      Networking: {}
      Infrastructure: {}
      Security: {}
      Automation: {}
      LLM: {}
      Productivity: {}
      Media: {}
      Devbench: {}
      Gaming: {}
      Quick Links: {}
  custom.css: |
    #oc-status-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      align-items: center;
      margin-top: 0.35rem;
    }

    #oc-status-badges a img {
      display: block;
      height: 20px;
      width: auto;
    }
  custom.js: |
    (function mountStatusBadges() {
      const badges = [
        {
          href: "https://github.com/nirmalhk7/operationscenter/actions",
          src: "https://img.shields.io/github/checks-status/nirmalhk7/operationscenter/main?label=CI&logo=githubactions&logoColor=white",
          alt: "CI status",
        },
        {
          href: "https://github.com/nirmalhk7/operationscenter/tree/main/clusters/managed",
          src: "https://img.shields.io/github/actions/workflow/status/nirmalhk7/operationscenter/test-k8s.yaml?branch=main&label=GitOps&logo=fluxcd&logoColor=white",
          alt: "GitOps status",
        },
      ];

      const render = () => {
        if (document.getElementById("oc-status-badges")) return;

        const anchor =
          document.querySelector("#information-widgets") ||
          document.querySelector("header") ||
          document.body;

        const container = document.createElement("div");
        container.id = "oc-status-badges";

        badges.forEach(({ href, src, alt }) => {
          const link = document.createElement("a");
          link.href = href;
          link.target = "_blank";
          link.rel = "noopener noreferrer";

          const image = document.createElement("img");
          image.src = src;
          image.alt = alt;
          image.loading = "lazy";

          link.appendChild(image);
          container.appendChild(link);
        });

        anchor.appendChild(container);
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", render);
      } else {
        render();
      }
    })();

    if(window.location.host === '10.0.0.10'){
      Array.from(document.querySelectorAll('.services-list')).map(e=>{
        Array.from(e.children).forEach(el => {
            if (!el.id.startsWith('local-')) {
              el.remove();
            }
        });
        if(e.children.length===0){
          // console.log(e?.parentElement?.parentElement)
          return e?.parentElement?.parentElement?.remove()
        }
      })
    }
  bookmarks.yaml: |
    - Quick Links:
        - Operations Center Agile:
            - icon: github-light
              href: https://github.com/users/nirmalhk7/projects/16
        - Dashboard Icons:
            - icon: linkace
              href: https://dashboardicons.com/icons
  services.yaml: |
    - Automation:
      - Robot:
          name: Robot
          icon: openclaw
          description: Openclaw Dashboard
          href: "https://robot.trusted.nirmalhk7.com"
          siteMonitor: "https://robot.trusted.nirmalhk7.com"
    - Networking:
      - Tailscale:
          id: local-tailscale
          icon: tailscale-light
          href: https://login.tailscale.com/admin/machines
      - Google Home:
          id: googlehome
          icon: google-home
          href: https://home.google.com/home/1-55a939b1374bf27e1be4ded764e93e4d2c88ff3cbb03c77c535f0137a96f7663/devices
      - Cloudflare:
          id: local-cloudflare
          icon: cloudflare
          href: https://dash.cloudflare.com/397ae3d0f15c4e696b2a31307963d57c/nirmalhk7.com
      - Proxmox:
          icon: proxmox-light
          id: proxmox
          href: https://proxmox.trusted.nirmalhk7.com/
          widget:
            type: proxmox
            url: https://proxmox.trusted.nirmalhk7.com:8006
            username: ${PROXMOX_USERNAME}
            password: ${PROXMOX_PASSWORD}
    - Observability:
      - NetAlertX:
          id: local-netalertx
          name: NetAlertX
          icon: mdi-lan-connect
          description: Home WiFi device inventory and alerts
          href: "https://sentinel.trusted.nirmalhk7.com"
          siteMonitor: "https://sentinel.trusted.nirmalhk7.com"
  widgets.yaml: |
    - greeting:
        text_size: xl
        text: Operations Center Boulder
        font: bold
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: false
        memory: false
        network: default
  docker.yaml: ""
