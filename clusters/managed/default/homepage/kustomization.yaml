apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization


resources:
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - ingressroute.yaml
  - service.yaml
  - serviceaccount.yaml
  - secret-svc-token.yaml

configMapGenerator:
  - name: homepage-wallpapers
    files:
      - images/README.md
      - images/dawn.webp
      - images/morning.webp
      - images/afternoon.webp
      - images/evening.webp
      - images/twilight.webp
      - images/night.webp
      # Optional legacy fallbacks still supported by custom.js:
      # - images/sunrise.webp
      # - images/day.webp
      # - images/sunset.webp
  - name: homepage-logo
    files:
      - images/logo.svg

labels:
  - pairs:
      milano.app: homepage
