apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization


resources:
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - secret.yaml
  - deployment.yaml
  - ingressroute.yaml
  - service.yaml
  - serviceaccount.yaml
  - secret-svc-token.yaml

configMapGenerator:
  - name: homepage
    files:
      - config/kubernetes.yaml
      - config/proxmox.yaml
      - config/settings.yaml
      - config/custom.css
      - config/custom.js
      - config/bookmarks.yaml
      - config/services.yaml
      - config/widgets.yaml
      - config/docker.yaml
  - name: homepage-wallpapers
    files:
      - images/README.md
      - images/dawn.webp
      - images/morning.webp
      - images/afternoon.webp
      - images/evening.webp
      - images/twilight.webp
      - images/night.webp
      # Optional legacy fallbacks still supported by custom.js:
      # - images/sunrise.webp
      # - images/day.webp
      # - images/sunset.webp
  - name: homepage-logo
    files:
      - images/locust.svg
      - images/touca.svg

labels:
  - pairs:
      milano.app: homepage
