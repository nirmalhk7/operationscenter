apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nfsprovisioner
  namespace: mgd-default
spec:
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: 4.0.18
      sourceRef:
        kind: HelmRepository
        name: k8-sigs-charts
        namespace: mgd-default
  interval: 10m
  values:
    nfs:
      server: 172.16.0.108
      path: /mnt/2tbhdd
      mountOptions:
        - nfsvers=4.1
        - hard
        - noresvport
    storageClass:
      name: milano-v3
      reclaimPolicy: Retain
    replicaCount: 3
    metrics:
      enabled: true