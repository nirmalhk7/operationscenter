apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app portainer
  namespace: mgd-monitoring
spec:
  chart:
    spec:
      chart: portainer
      version: 239.0.2
      sourceRef:
        kind: HelmRepository
        name: portainer
        namespace: mgd-monitoring
  interval: 10m
  values:  
    service:
      type: ClusterIP
    persistence:
      storageClass: milano-v2
    env:
      - name: TRUSTED_ORIGINS
        value: "portainer.trusted.nirmalhk7.com"