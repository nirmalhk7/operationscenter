apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app scrutiny
  namespace: mgd-monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: scrutiny
      version: 0.1.3
      sourceRef:
        kind: HelmRepository
        name: vhdirk-helm-charts
        namespace: mgd-monitoring
  values:
    image:
      tag: v0.9.2-omnibus
    command:
      - /bin/sh
      - -lc
    args:
      - |
        touch /tmp/custom-init-performed
        exec /package/admin/s6/command/s6-svscan -d4 -- /run/service
