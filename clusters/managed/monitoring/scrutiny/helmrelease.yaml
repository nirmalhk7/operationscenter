apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app scrutiny
  namespace: mgd-monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: scrutiny
      version: 0.1.3
      sourceRef:
        kind: HelmRepository
        name: vhdirk-helm-charts
        namespace: mgd-monitoring
  values:
    image:
      tag: v0.9.2-omnibus
    persistence:
      collector-config:
        enabled: true
        type: configMap
        name: scrutiny-collector
        defaultMode: 0555
        mountPath: /opt/scrutiny/bin/scrutiny-collector-metrics
        subPath: scrutiny-collector-metrics
        readOnly: true
      web-config:
        enabled: true
        type: secret
        name: scrutiny-config
        defaultMode: 0444
        mountPath: /opt/scrutiny/config/scrutiny.yaml
        subPath: scrutiny.yaml
        readOnly: true
