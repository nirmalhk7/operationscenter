
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: &app grafana
  labels:
    app.kubernetes.io/name: *app
  annotations:
    gethomepage.dev/href: "https://grafana.trusted.nirmalhk7.com"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Observability
    gethomepage.dev/icon: *app
    gethomepage.dev/app: *app # optional, may be needed if app.kubernetes.io/name != ingress metadata.name
    gethomepage.dev/name: Grafana
    # gethomepage.dev/widget.type: *app
    # gethomepage.dev/widget.url: "https://grafana.trusted.nirmalhk7.com"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=grafana"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`grafana.trusted.nirmalhk7.com`)
      kind: Rule
      services:
        - name: main-grafana
          port: 80