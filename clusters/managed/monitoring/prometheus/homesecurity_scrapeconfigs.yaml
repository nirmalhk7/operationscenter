---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: lan-blackbox-router-ping
  labels:
    prometheus: prometheus_scraper
spec:
  scrapeInterval: 5m
  metricsPath: /probe
  params:
    module:
      - icmp
  staticConfigs:
    - labels:
        job: lan-blackbox-router
      targets:
        - 10.0.0.1
  relabelings:
    - sourceLabels: [__address__]
      targetLabel: __param_target
      action: replace
    - sourceLabels: [__param_target]
      targetLabel: instance
      action: replace
    - targetLabel: __address__
      replacement: 172.16.0.103:9115
      action: replace
---
