apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: lan-openports
  labels:
    prometheus: prometheus_scraper
spec:
  scrapeInterval: 5m
  staticConfigs:
    - labels:
        job: lan-openports
      targets:
        - 172.16.0.103:9919
  metricsPath: /metrics
---
