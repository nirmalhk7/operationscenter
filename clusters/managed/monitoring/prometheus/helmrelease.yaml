apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app main
  namespace: mgd-monitoring
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.13.6
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: mgd-monitoring
  interval: 10m
  releaseName: *app
  values:
    grafana:
      adminUser: admin
      # adminPassword: strongpassword

      # Use an existing secret for the admin user.
      admin:
        ## Name of the secret. Can be templated.
        existingSecret: "grafana-secret"
        userKey: GRAFANA-USER
        passwordKey: GRAFANA-PASSWORD

      defaultDashboardsEnabled: "false"
      env:
        GF_SERVER_SERVE_FROM_SUB_PATH: "true"
        
      grafana.ini:
        server:
          domain: "grafana.trusted.nirmalhk7.com"
          root_url: "https://grafana.trusted.nirmalhk7.com"
        auth.generic_oauth:
          enabled: "true"
          name: Authelia
          icon: signin
          allow_sign_up: "true"
          scopes: openid profile email groups
          empty_scopes: "false"
          auth_url: https://secure.trusted.nirmalhk7.com/api/oidc/authorization
          token_url: https://secure.trusted.nirmalhk7.com/api/oidc/token
          api_url: https://secure.trusted.nirmalhk7.com/api/oidc/userinfo
          login_attribute_path: preferred_username
          groups_attribute_path: groups
          name_attribute_path: name
          role_attribute_path: contains(groups, 'grafana_admin') && 'Admin' || 'Viewer'
          use_pkce: "true"
      sidecar:
        dashboards:
          enabled: "true"
          label: milano_grafana_dashboard
          labelValue: "true"
          searchNamespace: ALL

    prometheus:
      prometheusSpec:
        externalUrl: "https://prometheus.trusted.nirmalhk7.com"
        routePrefix: /
        scrapeConfigSelector:
          matchLabels:
            prometheus: prometheus_scraper
        serviceMonitorSelector:
          matchLabels:
            prometheus: prometheus_servicemonitor
    commonLabels:
      milano.level: managed