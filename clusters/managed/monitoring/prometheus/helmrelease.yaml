apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app main
  namespace: mgd-monitoring
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.10.4
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: mgd-monitoring
  interval: 10m
  releaseName: *app
  values:
    grafana:
      defaultDashboardsEnabled: "false"
      env:
        GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      grafana.ini:
        server:
          domain: grafana.trusted.nirmalhk7.com
          root_url: https://grafana.trusted.nirmalhk7.com
        auth.generic_oauth:
          enabled: "true"
          name: Authelia
          icon: signin
          allow_sign_up: "true"
          scopes: openid profile email groups
          empty_scopes: "false"
          auth_url: https://secure.trusted.nirmalhk7.com/api/oidc/authorization
          token_url: https://secure.trusted.nirmalhk7.com/api/oidc/token
          api_url: https://secure.trusted.nirmalhk7.com/api/oidc/userinfo
          login_attribute_path: preferred_username
          groups_attribute_path: groups
          name_attribute_path: name
          role_attribute_path: contains(groups, 'grafana_admin') && 'Admin' || 'Viewer'
          use_pkce: "true"
      sidecar:
        dashboards:
          enabled: "true"
          label: milano_grafana_dashboard
          labelValue: "true"
          searchNamespace: ALL
    prometheus:
      prometheusSpec:
        externalUrl: https://prometheus.trusted.nirmalhk7.com
        routePrefix: /
        scrapeConfigSelector:
          matchLabels:
            prometheus: prometheus_scraper
        serviceMonitorSelector:
          matchLabels:
            prometheus: prometheus_servicemonitor
    commonLabels:
      milano.level: managed
    alertmanager:
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by:
          - namespace
          - alertname
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: telegram
          routes:
          - receiver: 'null'
            matchers:
            - alertname = Watchdog
        receivers:
        - name: 'null'
        - name: telegram
          telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/grafana-credentials/token
            chat_id: -4581516591
            send_resolved: "true"
            parse_mode: HTML
            message: '{{ template "telegram.default.message" . }}'
        templates:
        - /etc/alertmanager/config/*.tmpl
      alertmanagerSpec:
        secrets:
        - grafana-credentials
