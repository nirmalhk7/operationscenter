apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app main
  namespace: mgd-monitoring
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.13.6
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: mgd-monitoring
  interval: 10m
  releaseName: *app
  values:
    grafana:
      adminUser: admin
      # adminPassword: strongpassword

      # Use an existing secret for the admin user.
      admin:
        ## Name of the secret. Can be templated.
        existingSecret: "grafana-credentials"
        userKey: GRAFANA-USER
        passwordKey: GRAFANA-PASSWORD

      defaultDashboardsEnabled: false
      env:
        GF_SERVER_SERVE_FROM_SUB_PATH: "true"
        
      grafana.ini:
        server:
          domain: grafana.trusted.nirmalhk7.com
          root_url: https://grafana.trusted.nirmalhk7.com
        auth.generic_oauth:
          enabled: "true"
          name: Authelia
          icon: signin
          allow_sign_up: "true"
          client_id: grafana
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          auth_style: InHeader
          scopes: openid profile email groups grafana_role
          empty_scopes: "false"
          auth_url: https://secure.trusted.nirmalhk7.com/api/oidc/authorization
          token_url: https://secure.trusted.nirmalhk7.com/api/oidc/token
          api_url: https://secure.trusted.nirmalhk7.com/api/oidc/userinfo
          tls_skip_verify_insecure: "true"
          login_attribute_path: preferred_username
          groups_attribute_path: groups
          email_attribute_path: email
          name_attribute_path: name
          role_attribute_path: email == 'nirmalh7@gmail.com' && 'GrafanaAdmin' || contains(groups[*], 'admins') && 'GrafanaAdmin' || contains(groups[*], 'grafana_admin') && 'GrafanaAdmin' || 'Viewer'
          allow_assign_grafana_admin: "true"
          use_pkce: "true"
        smtp:
          enabled: true
          host: smtp.maileroo.com:587
          user: nestor@nirmalhk7.com
          password: $__env{GF_SMTP_PASSWORD}
          from_address: nestor@nirmalhk7.com
          from_name: "Nirmal - Grafana"
          startTLS_policy: MandatoryStartTLS
      sidecar:
        dashboards:
          enabled: "true"
          label: milano_grafana_dashboard
          labelValue: "true"
          searchNamespace: ALL
      envValueFrom:
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
          secretKeyRef:
            name: grafana-credentials
            key: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
        TELEGRAM_TOKEN:
          secretKeyRef:
            name: grafana-credentials
            key: token
        GF_SMTP_PASSWORD:
          secretKeyRef:
            name: grafana-credentials
            key: SMTP_PASSWORD
      assertNoLeakedSecrets: false
      alerting:
        contactpoints.yaml:
          apiVersion: 1
          contactPoints:
            - orgId: 1
              name: email
              receivers:
                - uid: email_1
                  type: email
                  disableResolveMessage: false
                  settings:
                    addresses: nirmalhk7@gmail.com
                    singleEmail: false
            - orgId: 1
              name: telegram
              receivers:
                - uid: telegram_1
                  type: telegram
                  disableResolveMessage: false
                  settings:
                    bottoken: $TELEGRAM_TOKEN
                    chatid: "-1003812665515"
                    message_thread_id: "204"
        policies.yaml:
          apiVersion: 1
          policies:
            - orgId: 1
              receiver: email
              group_by:
                - namespace
                - alertname
        rules.yaml:
          apiVersion: 1
          groups:
            - orgId: 1
              name: Sample External Alerts
              folder: Infrastructure
              interval: 1m
              rules:
                - uid: example_up_alert
                  title: Endpoint Down (up == 0)
                  condition: C
                  data:
                    - refId: A
                      datasourceUid: prometheus
                      model:
                        expr: up == 0
                      relativeTimeRange:
                        from: 300
                        to: 0
                    - refId: B
                      datasourceUid: __expr__
                      model:
                        type: reduce
                        reducer: last
                        expression: A
                    - refId: C
                      datasourceUid: __expr__
                      model:
                        type: math
                        expression: $B > 0
                  noDataState: OK
                  execErrState: Alerting
                  for: 1m
                  annotations:
                    summary: "A monitored endpoint is down or unreachable."
                  labels:
                    severity: warning
                    namespace: sample
                    alertname: EndpointDown
    prometheus:
      prometheusSpec:
        externalUrl: https://prometheus.trusted.nirmalhk7.com
        routePrefix: /
        scrapeConfigSelector:
          matchLabels:
            prometheus: prometheus_scraper
        serviceMonitorSelector:
          matchLabels:
            prometheus: prometheus_servicemonitor
        resources:
          requests:
            cpu: 200m
            memory: 2Gi
          limits:
            cpu: 1000m
            memory: 4Gi
        env:
          - name: GOMEMLIMIT
            value: 3600MiB
        livenessProbe:
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
        readinessProbe:
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
        retention: 2d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
    commonLabels:
      milano.level: managed
