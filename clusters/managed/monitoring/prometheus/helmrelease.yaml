apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app main
  namespace: mgd-monitoring
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.13.6
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: mgd-monitoring
  interval: 10m
  releaseName: *app
  values:
    grafana:
      adminUser: admin
      # adminPassword: strongpassword

      # Use an existing secret for the admin user.
      admin:
        ## Name of the secret. Can be templated.
        existingSecret: "grafana-credentials"
        userKey: GRAFANA-USER
        passwordKey: GRAFANA-PASSWORD

      defaultDashboardsEnabled: false
      additionalDataSources:
        - name: Loki
          uid: loki
          type: loki
          access: proxy
          url: http://loki-gateway.mgd-devbench
          editable: false
      env:
        GF_SERVER_SERVE_FROM_SUB_PATH: "true"
        
      grafana.ini:
        server:
          domain: grafana.trusted.nirmalhk7.com
          root_url: https://grafana.trusted.nirmalhk7.com
        auth.generic_oauth:
          enabled: "true"
          name: Authelia
          icon: signin
          allow_sign_up: "true"
          client_id: grafana
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          auth_style: InHeader
          scopes: openid profile email groups grafana_role
          empty_scopes: "false"
          auth_url: https://secure.trusted.nirmalhk7.com/api/oidc/authorization
          token_url: https://secure.trusted.nirmalhk7.com/api/oidc/token
          api_url: https://secure.trusted.nirmalhk7.com/api/oidc/userinfo
          tls_skip_verify_insecure: "true"
          login_attribute_path: preferred_username
          groups_attribute_path: groups
          email_attribute_path: email
          name_attribute_path: name
          role_attribute_path: email == 'nirmalh7@gmail.com' && 'GrafanaAdmin' || contains(groups[*], 'admins') && 'GrafanaAdmin' || contains(groups[*], 'grafana_admin') && 'GrafanaAdmin' || 'Viewer'
          allow_assign_grafana_admin: "true"
          use_pkce: "true"
        smtp:
          enabled: true
          host: smtp.maileroo.com:587
          user: nestor@nirmalhk7.com
          password: $__env{GF_SMTP_PASSWORD}
          from_address: nestor@nirmalhk7.com
          from_name: "Nirmal - Grafana"
          startTLS_policy: MandatoryStartTLS
      sidecar:
        dashboards:
          enabled: "true"
          label: milano_grafana_dashboard
          labelValue: "true"
          searchNamespace: ALL
      envValueFrom:
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
          secretKeyRef:
            name: grafana-credentials
            key: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
        DISCORD_WEBHOOK_URL:
          secretKeyRef:
            name: grafana-credentials
            key: DISCORD_WEBHOOK_URL
        GF_SMTP_PASSWORD:
          secretKeyRef:
            name: grafana-credentials
            key: SMTP_PASSWORD
      assertNoLeakedSecrets: false
      alerting:
        contactpoints.yaml:
          apiVersion: 1
          contactPoints:
            - orgId: 1
              name: discord
              receivers:
                - uid: discord_1
                  type: discord
                  disableResolveMessage: false
                  settings:
                    url: $DISCORD_WEBHOOK_URL
        policies.yaml:
          apiVersion: 1
          policies:
            - orgId: 1
              receiver: discord
              group_by:
                - namespace
                - alertname
        rules.yaml:
          apiVersion: 1
          groups:
            - orgId: 1
              name: Managed App Failures
              folder: Infrastructure
              interval: 1m
              rules:
                - uid: managed_pod_crashlooping
                  title: Managed Pod CrashLoopBackOff
                  condition: C
                  data:
                    - refId: A
                      datasourceUid: prometheus
                      model:
                        expr: sum by (namespace, pod, container) (kube_pod_container_status_waiting_reason{namespace=~"mgd-.*",reason="CrashLoopBackOff"}) > 0
                      relativeTimeRange:
                        from: 300
                        to: 0
                    - refId: B
                      datasourceUid: __expr__
                      model:
                        type: reduce
                        reducer: last
                        expression: A
                    - refId: C
                      datasourceUid: __expr__
                      model:
                        type: math
                        expression: $B > 0
                  noDataState: OK
                  execErrState: Alerting
                  for: 5m
                  annotations:
                    summary: "Managed pod is stuck in CrashLoopBackOff."
                  labels:
                    severity: critical
                    namespace: managed
                    alertname: ManagedPodCrashLoopBackOff
                - uid: managed_pod_restarts_spike
                  title: Managed Pod Restart Spike
                  condition: C
                  data:
                    - refId: A
                      datasourceUid: prometheus
                      model:
                        expr: sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total{namespace=~"mgd-.*"}[10m])) > 3
                      relativeTimeRange:
                        from: 600
                        to: 0
                    - refId: B
                      datasourceUid: __expr__
                      model:
                        type: reduce
                        reducer: last
                        expression: A
                    - refId: C
                      datasourceUid: __expr__
                      model:
                        type: math
                        expression: $B > 0
                  noDataState: OK
                  execErrState: Alerting
                  for: 5m
                  annotations:
                    summary: "Managed pod restart count is spiking."
                  labels:
                    severity: warning
                    namespace: managed
                    alertname: ManagedPodRestartSpike
                - uid: managed_pod_unready
                  title: Managed Pod Unready
                  condition: C
                  data:
                    - refId: A
                      datasourceUid: prometheus
                      model:
                        expr: sum by (namespace, pod) (kube_pod_status_ready{namespace=~"mgd-.*",condition="true"} == 0) > 0
                      relativeTimeRange:
                        from: 300
                        to: 0
                    - refId: B
                      datasourceUid: __expr__
                      model:
                        type: reduce
                        reducer: last
                        expression: A
                    - refId: C
                      datasourceUid: __expr__
                      model:
                        type: math
                        expression: $B > 0
                  noDataState: OK
                  execErrState: Alerting
                  for: 5m
                  annotations:
                    summary: "Managed pod is not ready."
                  labels:
                    severity: warning
                    namespace: managed
                    alertname: ManagedPodUnready
                - uid: managed_pod_oomkilled
                  title: Managed Pod OOMKilled
                  condition: C
                  data:
                    - refId: A
                      datasourceUid: prometheus
                      model:
                        expr: sum by (namespace, pod, container) (kube_pod_container_status_last_terminated_reason{namespace=~"mgd-.*",reason="OOMKilled"}) > 0
                      relativeTimeRange:
                        from: 300
                        to: 0
                    - refId: B
                      datasourceUid: __expr__
                      model:
                        type: reduce
                        reducer: last
                        expression: A
                    - refId: C
                      datasourceUid: __expr__
                      model:
                        type: math
                        expression: $B > 0
                  noDataState: OK
                  execErrState: Alerting
                  for: 5m
                  annotations:
                    summary: "Managed pod was OOMKilled."
                  labels:
                    severity: critical
                    namespace: managed
                    alertname: ManagedPodOOMKilled
    prometheus:
      prometheusSpec:
        externalUrl: https://prometheus.trusted.nirmalhk7.com
        routePrefix: /
        externalLabels:
          cluster: managed
        scrapeConfigSelector:
          matchLabels:
            prometheus: prometheus_scraper
        serviceMonitorSelector:
          matchLabels:
            release: main
        resources:
          requests:
            cpu: 200m
            memory: 2Gi
          limits:
            cpu: 1000m
            memory: 4Gi
        env:
          - name: GOMEMLIMIT
            value: 3600MiB
        livenessProbe:
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
        readinessProbe:
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
        retention: 2d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
    commonLabels:
      milano.level: managed
