apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app authelia
  namespace: mgd-security
spec:
  chart:
    spec:
      chart: authelia
      version: 0.10.49
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: mgd-security
  interval: 1h
  values:
    pod:
      extraVolumes:
          - name: &appCredentials authelia-credentials
            secret:
              secretName: *appCredentials
      extraVolumeMounts:
        - name: *appCredentials
          mountPath: /config/users_database.yaml
          subPath: users_database.yaml
          readOnly: true
    persistence:
      enabled: true
      storageClass: milano-v2
    secret:
      existingSecret: *appCredentials
      additionalSecrets:
        authelia-credentials:
          items:
            - key: storage.encryption.key
              path: storage.encryption.key
            - key: storage.mysql.password
              path: storage.mysql.password.txt
            - key: session.encryption.key
              path: session.encryption.key
            - key: jwt-secret
              path: jwt-secret
            - key: users_database.yaml
              path: users_database.yaml
            - key: oidc-hmac-secret
              path: oidc-hmac-secret
            - key: oidc-jwks-private-key.pem
              path: oidc-jwks-private-key.pem
        authelia-app-secrets:
          items:
            - key: client-secret-grafana
              path: client-secret-grafana
            - key: client-secret-nextcloud
              path: client-secret-nextcloud
    configMap:
      identity_validation:
        reset_password:
          secret:
            secret_name: *appCredentials
            path: jwt-secret
      access_control:
        default_policy: 'one_factor'
      identity_providers:
        oidc:
          enabled: true
          hmac_secret:
            secret_name: *appCredentials
            path: oidc-hmac-secret
          jwks:
            - key_id: authelia-oidc-rs256
              use: sig
              algorithm: RS256
              key:
                path: /secrets/authelia-credentials/oidc-jwks-private-key.pem
          clients:
            - client_id: grafana
              client_name: Grafana
              client_secret:
                path: /secrets/authelia-app-secrets/client-secret-grafana
              redirect_uris:
                - https://grafana.trusted.nirmalhk7.com/login/generic_oauth
              post_logout_redirect_uris:
                - https://grafana.trusted.nirmalhk7.com/login/generic_oauth
              scopes: &oidcScopes
                - openid
                - profile
                - email
                - groups
              response_types: &oidcResponseTypes
                - code
              grant_types: &oidcGrantTypes
                - authorization_code
              authorization_policy: &oidcPolicy one_factor
              token_endpoint_auth_method: client_secret_basic
            - client_id: nextcloud
              client_name: Nextcloud
              client_secret:
                path: /secrets/authelia-app-secrets/client-secret-nextcloud
              redirect_uris:
                - https://drive.trusted.nirmalhk7.com/apps/user_oidc/code
              scopes: *oidcScopes
              response_types: *oidcResponseTypes
              grant_types: *oidcGrantTypes
              authorization_policy: *oidcPolicy
              token_endpoint_auth_method: client_secret_post
              consent_mode: implicit
      theme: 'dark'
      telemetry:
        metrics:
          enabled: true
      authentication_backend:
        file:
          enabled: true
          path: /config/users_database.yaml
        ldap:
          enabled: false
      session:
        cookies:
          - name: authelia_session
            domain: trusted.nirmalhk7.com
            authelia_url: https://secure.trusted.nirmalhk7.com
            remember_me: 30d
            expiration: 12h
            inactivity: 45m
        redis:
          enabled: false
      notifier:
        filesystem:
          enabled: true
          filename: /config/notification.txt
      storage:
        encryption_key:
          secret_name: *appCredentials
        local:
          enabled: false
        postgres:
          enabled: false
        mysql:
          enabled: true
          address: 'tcp://172.16.0.106:3306'
          database: *app
          username: 'authelia_rw'
          password:
            secret_name: *appCredentials
        