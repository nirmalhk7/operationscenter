apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-oidc-proxy
data:
  default.conf: |
    server {
      listen 8080;
      server_name authelia-oidc-proxy.mgd-security.svc.cluster.local;

      access_log /dev/stdout;
      error_log /dev/stderr warn;

      location = /.well-known/openid-configuration {
        proxy_pass https://secure.trusted.nirmalhk7.com/.well-known/openid-configuration;
        proxy_ssl_server_name on;
        proxy_ssl_name secure.trusted.nirmalhk7.com;
        proxy_ssl_verify off;
        proxy_set_header Host secure.trusted.nirmalhk7.com;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host secure.trusted.nirmalhk7.com;
        proxy_set_header Accept-Encoding "";
        sub_filter_types application/json;
        sub_filter_once off;
        sub_filter "https://secure.trusted.nirmalhk7.com/api/oidc/token" "http://authelia-oidc-proxy.mgd-security.svc.cluster.local/api/oidc/token";
        sub_filter "https://secure.trusted.nirmalhk7.com/api/oidc/userinfo" "http://authelia-oidc-proxy.mgd-security.svc.cluster.local/api/oidc/userinfo";
        sub_filter "https://secure.trusted.nirmalhk7.com/jwks.json" "http://authelia-oidc-proxy.mgd-security.svc.cluster.local/jwks.json";
      }

      location / {
        proxy_pass https://secure.trusted.nirmalhk7.com;
        proxy_ssl_server_name on;
        proxy_ssl_name secure.trusted.nirmalhk7.com;
        proxy_ssl_verify off;
        proxy_set_header Host secure.trusted.nirmalhk7.com;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host secure.trusted.nirmalhk7.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia-oidc-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authelia-oidc-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authelia-oidc-proxy
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /.well-known/openid-configuration
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /.well-known/openid-configuration
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: config
          configMap:
            name: authelia-oidc-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: authelia-oidc-proxy
spec:
  selector:
    app.kubernetes.io/name: authelia-oidc-proxy
  ports:
    - name: http
      port: 80
      targetPort: http
