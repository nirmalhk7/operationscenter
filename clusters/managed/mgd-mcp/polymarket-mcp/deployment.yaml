apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app polymarket-mcp
  labels:
    milano.app: *app
    milano.level: managed
spec:
  replicas: 1
  selector:
    matchLabels:
      milano.app: *app
  template:
    metadata:
      labels:
        milano.app: *app
    spec:
      containers:
        - name: *app
          image: smithery/polymarket-mcp:latest
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: GAMMA_API_URL
              value: "https://gamma-api.polymarket.com"
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi