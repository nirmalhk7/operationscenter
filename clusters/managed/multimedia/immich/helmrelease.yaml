
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich
  namespace: mgd-multimedia
spec:
  releaseName: *app
  chart:
    spec:
      chart: immich
      version: 0.10.3
      sourceRef:
        kind: HelmRepository
        name: immich-helm-charts
        namespace: mgd-multimedia
  interval: 10m
  values:
    controllers:
      main:
        containers:
          main:
            image:
              tag: v1.142.0
            env:
              DB_HOSTNAME: 172.16.0.106
              DB_DATABASE_NAME: *app
              DB_USERNAME: immich_rw
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-credentials
                    key: DB_PASSWORD
              REDIS_HOSTNAME: immich-redis
              REDIS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-credentials
                    key: REDIS_PASSWORD
              IMMICH_LOG_LEVEL: verbose
    persistence:
      oauth-secret:
        enabled: true
        type: secret
        name: immich-credentials
        globalMounts:
          - path: /secrets/immich-credentials
            readOnly: true
    immich:
      configuration:
        oauth:
          enabled: true
          issuerUrl: https://secure.trusted.nirmalhk7.com/.well-known/openid-configuration
          clientId: immich
          clientSecret:
            _secret: /secrets/immich-credentials/OAUTH_CLIENT_SECRET
          scope: openid profile email
          buttonText: Login with Authelia
          autoRegister: true
          signingAlgorithm: RS256
          storageLabelClaim: preferred_username
          tokenEndpointAuthMethod: client_secret_post
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: ""
          storageClass: "milano-v3"
          accessMode: ReadWriteMany
          size: 11Gi
    server:
      persistence:
        server:
          enabled: true
          type: persistentVolumeClaim
          storageClass: "milano-v3"
          accessMode: ReadWriteOnce
          size: 1Gi
    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          size: 10Gi
          type: persistentVolumeClaim
          accessMode: ReadWriteMany
          storageClass: "milano-v3"
