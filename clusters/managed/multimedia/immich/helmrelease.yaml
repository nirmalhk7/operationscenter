
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich
  namespace: mgd-multimedia
spec:
  releaseName: *app
  chart:
    spec:
      chart: immich
      version: 0.10.3
      sourceRef:
        kind: HelmRepository
        name: immich-helm-charts
        namespace: mgd-multimedia
  interval: 10m
  values:
    persistence:
      oauth-secret:
        enabled: true
        type: secret
        name: immich-credentials
        globalMounts:
          - path: /secrets/immich-credentials
            readOnly: true
    server:
      controllers:
        main:
          containers:
            main:
              image:
                tag: v1.142.0
              command:
                - /bin/bash
                - -lc
              args:
                - |
                  set -euo pipefail
                  oauth_secret="$(cat /secrets/immich-credentials/OAUTH_CLIENT_SECRET)"
                  smtp_password="$(cat /secrets/immich-credentials/SMTP_PASSWORD)"
                  config="/config/immich-config.yaml"
                  tmp="$(mktemp /tmp/immich-config.XXXXXX.yaml)"
                  awk -v secret="$oauth_secret" '
                    /^  clientId: immich$/ {
                      print
                      print "  clientSecret: \"" secret "\""
                      next
                    }
                    { print }
                  ' "$config" > "$tmp"
                  sed -i "s/__SMTP_PASSWORD__/${smtp_password}/g" "$tmp"
                  export IMMICH_CONFIG_FILE="$tmp"
                  exec /usr/src/app/server/bin/start.sh
              env:
                DB_HOSTNAME: 172.16.0.106
                DB_DATABASE_NAME: *app
                DB_USERNAME: immich_rw
                DB_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-credentials
                      key: DB_PASSWORD
                REDIS_HOSTNAME: immich-redis
                REDIS_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-credentials
                      key: REDIS_PASSWORD
                IMMICH_LOG_LEVEL: verbose
                # Authelia is currently fronted by Traefik's default self-signed cert.
                # Immich's OIDC discovery runs in Node, so it needs TLS verification disabled
                # until that issuer is replaced with a trusted certificate.
                NODE_TLS_REJECT_UNAUTHORIZED: "0"
      persistence:
        user-content:
          enabled: true
          type: persistentVolumeClaim
          existingClaim: immich-user-content
          advancedMounts:
            main:
              main:
                - path: /data/upload
                  subPath: upload
                - path: /data/library
                  subPath: library
    immich:
      configuration:
        oauth:
          enabled: true
          issuerUrl: https://secure.trusted.nirmalhk7.com/.well-known/openid-configuration
          clientId: immich
          scope: openid profile email immich_role
          buttonText: Login with Authelia
          autoRegister: true
          signingAlgorithm: RS256
          storageLabelClaim: preferred_username
          roleClaim: immich_role
          tokenEndpointAuthMethod: client_secret_post
        notifications:
          smtp:
            enabled: true
            from: "Nirmal - Immich <nestor@nirmalhk7.com>"
            replyTo: nestor@nirmalhk7.com
            transport:
              host: smtp.maileroo.com
              port: 587
              secure: false
              ignoreCert: false
              username: nestor@nirmalhk7.com
              password: "__SMTP_PASSWORD__"
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: immich-pvc-1
    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          size: 10Gi
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          storageClass: "milano-v2"
