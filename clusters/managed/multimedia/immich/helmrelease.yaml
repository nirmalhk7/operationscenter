
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich
  namespace: mgd-multimedia
spec:
  releaseName: *app
  chart:
    spec:
      chart: immich
      version: 0.11.1
      sourceRef:
        kind: HelmRepository
        name: immich-helm-charts
        namespace: mgd-multimedia
  interval: 10m
  values:
    image:
      tag: v1.142.0
    env:
      DB_HOSTNAME: 172.16.0.106
      DB_DATABASE_NAME: *app
      DB_USERNAME: immich_rw
      DB_PASSWORD:
        valueFrom:
          secretKeyRef:
            name: immich-credentials
            key: DB_PASSWORD
      REDIS_HOSTNAME: immich-redis
      REDIS_PASSWORD:
        valueFrom:
          secretKeyRef:
            name: immich-credentials
            key: REDIS_PASSWORD
      IMMICH_LOG_LEVEL: verbose
    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: ""
          storageClass: "milano-v3"
          accessMode: ReadWriteMany
          size: 11Gi
    server:
      persistence:
        server:
          enabled: true
          type: persistentVolumeClaim
          storageClass: "milano-v3"
          accessMode: ReadWriteOnce
          size: 1Gi
    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          size: 10Gi
          type: persistentVolumeClaim
          accessMode: ReadWriteMany
          storageClass: "milano-v3"