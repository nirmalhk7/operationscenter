apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nextcloud
  namespace: mgd-multimedia
spec:
  interval: 10m
  chart:
    spec:
      chart: nextcloud
      version: 9.0.1
      sourceRef:
        kind: HelmRepository
        name: nextcloud-helm
        namespace: mgd-multimedia
  releaseName: *app
  values:
    deploymentLabels: &milanLabels
      milano.app: *app
      milano.level: managed

    imaginary:
      podLabels:
        <<: *milanLabels
      service:
        labels:
          <<: *milanLabels

    metrics:
      enabled: true
      podLabels:
        <<: *milanLabels
      serviceMonitor:
        labels:
          <<: *milanLabels

    persistence:  
      enabled: true
      size: 20Gi
      storageClass: milano-v2

    nextcloud:
      host: drive.trusted.nirmalhk7.com
      existingSecret:
        enabled: true
        secretName: nextcloud-credentials
        usernameKey: nx-username
        passwordKey: nx-password
      extraEnv:
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: nextcloud-credentials
              key: oidc-client-secret
      hooks:
        post-installation:
          - sh
          - -c
          - |
            php /var/www/html/occ app:install user_oidc || php /var/www/html/occ app:enable user_oidc
            php /var/www/html/occ user_oidc:provider authelia \
              --clientid="nextcloud" \
              --clientsecret="${OIDC_CLIENT_SECRET}" \
              --discoveryuri="https://secure.trusted.nirmalhk7.com/.well-known/openid-configuration" \
              --mapping-uid="preferred_username" \
              --check-bearer=1 \
              --send-id-token-hint=1 \
              --unique-uid=0

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: mysql
      database: *app
      host: 172.16.0.106:3306
      existingSecret:
        enabled: true
        secretName: nextcloud-credentials
        usernameKey: db-username
        passwordKey: db-password