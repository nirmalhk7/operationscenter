apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nextcloud
  namespace: mgd-multimedia
spec:
  interval: 10m
  chart:
    spec:
      chart: nextcloud
      version: 9.0.3
      sourceRef:
        kind: HelmRepository
        name: nextcloud-helm
        namespace: mgd-multimedia
  releaseName: *app
  values:
    deploymentLabels: &milanLabels
      milano.app: *app
      milano.level: managed

    imaginary:
      podLabels:
        <<: *milanLabels
      service:
        labels:
          <<: *milanLabels

    metrics:
      enabled: true
      podLabels:
        <<: *milanLabels
      serviceMonitor:
        labels:
          <<: *milanLabels

    persistence:  
      enabled: true
      size: 20Gi
      storageClass: milano-v2

    nextcloud:
      host: drive.trusted.nirmalhk7.com
      extraEnv:
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: authelia-app-secrets
              key: client-secret-nextcloud
      configs:
        oidc.config.php: |-
          <?php
          $CONFIG = array (
            'allow_user_to_change_display_name' => false,
            'lost_password_link' => 'disabled',
            'oidc_login_provider_url' => 'https://secure.trusted.nirmalhk7.com',
            'oidc_login_client_id' => 'nextcloud',
            'oidc_login_client_secret' => getenv('OIDC_CLIENT_SECRET'),
            'oidc_login_auto_redirect' => false,
            'oidc_login_end_session_redirect' => false,
            'oidc_login_button_text' => 'Log in with Authelia',
            'oidc_login_hide_password_form' => false,
            'oidc_login_use_id_token' => true,
            'oidc_login_attributes' => array (
                'id' => 'preferred_username',
                'name' => 'name',
                'mail' => 'email',
                'groups' => 'groups',
            ),
            'oidc_login_default_group' => 'oidc',
            'oidc_login_use_external_storage' => false,
            'oidc_login_scope' => 'openid profile email groups',
            'oidc_login_proxy_ldap' => false,
            'oidc_login_disable_registration' => false,
            'oidc_login_redir_fallback' => false,
            'oidc_login_tls_verify' => true,
            'oidc_create_groups' => false,
            'oidc_login_webdav_enabled' => false,
            'oidc_login_password_authentication' => false,
            'oidc_login_public_key_caching_time' => 86400,
            'oidc_login_min_time_between_jwks_requests' => 10,
            'oidc_login_well_known_caching_time' => 86400,
            'oidc_login_update_avatar' => false,
          );
      existingSecret:
        enabled: true
        secretName: nextcloud-credentials
        usernameKey: nx-username
        passwordKey: nx-password

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: mysql
      database: *app
      host: 172.16.0.106:3306
      existingSecret:
        enabled: true
        secretName: nextcloud-credentials
        usernameKey: db-username
        passwordKey: db-password