apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nextcloud
  namespace: mgd-multimedia
spec:
  interval: 10m
  chart:
    spec:
      chart: nextcloud
      version: 9.0.4
      sourceRef:
        kind: HelmRepository
        name: nextcloud-helm
        namespace: mgd-multimedia
  releaseName: *app
  values:
    deploymentLabels: &milanLabels
      milano.app: *app
      milano.level: managed

    imaginary:
      podLabels:
        <<: *milanLabels
      service:
        labels:
          <<: *milanLabels

    metrics:
      enabled: true
      podLabels:
        <<: *milanLabels
      serviceMonitor:
        labels:
          <<: *milanLabels

    persistence:  
      enabled: true
      size: 20Gi
      storageClass: milano-v2

    nextcloud:
      host: drive.trusted.nirmalhk7.com
      existingSecret:
        enabled: true
        secretName: nextcloud-credentials
        usernameKey: nx-username
        passwordKey: nx-password
      configs:
        oidc.config.php: |-
          <?php
          $CONFIG = [
            'allow_user_to_change_display_name' => false,
            'lost_password_link' => 'https://secure.trusted.nirmalhk7.com/reset-password',
            'user_oidc' => [
              'auto_provision' => true,
              'soft_quota_default' => '5 GB',
            ],
          ];

    extraEnv:
      - name: OIDC_CLIENT_ID
        value: nextcloud
      - name: OIDC_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: nextcloud-credentials
            key: oidc-client-secret

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: mysql
      database: *app
      host: 172.16.0.106:3306
      existingSecret:
        enabled: true
        secretName: nextcloud-credentials
        usernameKey: db-username
        passwordKey: db-password