apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nextcloud
  namespace: mgd-multimedia
spec:
  interval: 10m
  chart:
    spec:
      chart: nextcloud
      version: 9.2.0
      sourceRef:
        kind: HelmRepository
        name: nextcloud-helm
        namespace: mgd-multimedia
  releaseName: *app
  values:
    deploymentLabels: &milanLabels
      milano.app: *app
      milano.level: managed

    imaginary:
      podLabels:
        <<: *milanLabels
      service:
        labels:
          <<: *milanLabels

    metrics:
      enabled: true
      podLabels:
        <<: *milanLabels
      serviceMonitor:
        labels:
          <<: *milanLabels

    persistence:
      enabled: true
      size: 20Gi
      storageClass: milano-v2
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-nfs-facility
        storageClass: milano-v3

    nextcloud:
      host: drive.trusted.nirmalhk7.com
      existingSecret:
        enabled: true
        secretName: nextcloud-credentials
        usernameKey: nx-username
        passwordKey: nx-password
      extraEnv:
        - name: OIDC_CLIENT_ID
          value: nextcloud
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: nextcloud-credentials
              key: oidc-client-secret
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-credentials
              key: SMTP_PASSWORD
      configs:
        install.config.php: |-
          <?php
          $CONFIG = [
            'installed' => true,
            'trusted_domains' => [
              'drive.trusted.nirmalhk7.com',
              'nextcloud.mgd-multimedia.svc.cluster.local',
            ],
            'overwrite.cli.url' => 'https://drive.trusted.nirmalhk7.com',
            'allow_local_remote_servers' => true,
          ];
        oidc.config.php: |-
          <?php
          $CONFIG = [
            'allow_user_to_change_display_name' => false,
            'overwritehost' => 'drive.trusted.nirmalhk7.com',
            'overwriteprotocol' => 'https',
            'lost_password_link' => 'https://secure.trusted.nirmalhk7.com/reset-password',
            'user_oidc' => [
              'auto_provision' => true,
              'default_token_endpoint_auth_method' => 'client_secret_post',
              'httpclient.allowselfsigned' => true,
              'soft_quota_default' => '5 GB',
            ],
          ];
      hooks:
        before-starting: |-
          #!/bin/sh
          set -eu
    podAnnotations:
      milano.io/nextcloud-oidc-revision: "2026-06-12a"

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: mysql
      database: *app
      host: 172.16.0.106:3306
      existingSecret:
        enabled: true
        secretName: nextcloud-credentials
        usernameKey: db-username
        passwordKey: db-password
