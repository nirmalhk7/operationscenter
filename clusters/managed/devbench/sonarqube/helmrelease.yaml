apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sonarqube
  namespace: mgd-devbench
spec:
  interval: 10m
  releaseName: *app
  chart:
    spec:
      chart: sonarqube
      version: 2026.1.0
      sourceRef:
        kind: HelmRepository
        name: sonarqube
        namespace: mgd-devbench
  values:
    community:
      enabled: true
    plugins:
      install:
        - "https://github.com/sonar-auth-oidc/sonar-auth-oidc/releases/download/v3.0.0/sonar-auth-oidc-plugin-3.0.0.jar"
    sonarProperties:
      sonar.core.serverBaseURL: "https://sonarqube.trusted.nirmalhk7.com"
      sonar.forceAuthentication: "true"
      sonar.auth.oidc.enabled: "true"
      sonar.auth.oidc.autoLogin: "true"
      sonar.auth.oidc.issuerUri: "https://secure.trusted.nirmalhk7.com"
      sonar.auth.oidc.clientId.secured: "sonarqube"
      sonar.auth.oidc.scopes: "openid email profile groups"
      sonar.auth.oidc.allowUsersToSignUp: "true"
      sonar.auth.oidc.loginStrategy: "Email"
      sonar.auth.oidc.groupsSync: "true"
      sonar.auth.oidc.groupsSync.claimName: "groups"
      sonar.auth.oidc.loginButtonText: "Authelia"
    sonarSecretProperties: "sonarqube-credentials"
    persistence:
      enabled: true
      storageClass: milano-v2
    jdbcOverwrite:
      enabled: true
      jdbcUrl: "jdbc:postgresql://172.16.0.106:5432/sonarqube"
      jdbcUsername: "sonarqube_rw"
      jdbcSecretName: "sonarqube-credentials"
      jdbcSecretPasswordKey: "DB_PASSWORD"
    postgresql:
      enabled: false
    elasticsearch:
      bootstrapChecks: false
    prometheusExporter:
      enabled: true
    monitoringPasscodeSecretName: sonarqube-credentials
    monitoringPasscodeSecretKey: MONITORING_PASSCODE