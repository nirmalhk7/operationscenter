apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: &app appwrite
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/href: "https://dev.trusted.nirmalhk7.com"
    gethomepage.dev/group: Devbench
    gethomepage.dev/description: "Backend platform"
    gethomepage.dev/icon: *app
    gethomepage.dev/app: *app
    gethomepage.dev/name: Appwrite
    gethomepage.dev/weight: "20"
    gethomepage.dev/pod-selector: "app.kubernetes.io/instance=appwrite"
spec:
  entryPoints:
    - websecure
    - web
  routes:
    - match: Host(`dev.trusted.nirmalhk7.com`) && PathPrefix(`/v1/realtime`)
      kind: Rule
      services:
        - name: appwrite-realtime
          port: 80
    - match: Host(`dev.trusted.nirmalhk7.com`) && PathPrefix(`/console`)
      kind: Rule
      services:
        - name: appwrite-console
          port: 80
    - match: Host(`dev.trusted.nirmalhk7.com`)
      kind: Rule
      services:
        - name: appwrite-api
          port: 80
