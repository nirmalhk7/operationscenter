apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: mgd-devbench
spec:
  schedule: "17 9 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: renovate
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          containers:
            - name: renovate
              image: docker.io/renovate/renovate:43.249.5
              imagePullPolicy: IfNotPresent
              env:
                - name: LOG_LEVEL
                  value: info
                - name: RENOVATE_PLATFORM
                  value: gitea
                - name: RENOVATE_ENDPOINT
                  value: http://gitea-http:3000/api/v1
                - name: RENOVATE_AUTODISCOVER
                  value: "true"
                - name: RENOVATE_REQUIRE_CONFIG
                  value: optional
                - name: RENOVATE_ONBOARDING
                  value: "true"
                - name: RENOVATE_GIT_AUTHOR
                  value: Renovate Bot <renovate@trusted.nirmalhk7.com>
                - name: RENOVATE_BASE_DIR
                  value: /tmp/renovate
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-credentials
                      key: RENOVATE_TOKEN
              resources:
                requests:
                  cpu: 25m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: renovate-cache
                  mountPath: /tmp/renovate
          volumes:
            - name: renovate-cache
              emptyDir: {}
