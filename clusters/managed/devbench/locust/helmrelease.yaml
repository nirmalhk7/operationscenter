
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app locust
  namespace: mgd-devbench
spec:
  releaseName: *app
  chart:
    spec:
      chart: locust
      version: 0.35.0
      sourceRef:
        kind: HelmRepository
        name: deliveryhero-helm-charts
        namespace: mgd-devbench
  interval: 10m
  values:
    image:
      repository: locustio/locust
      tag: 2.44.4
      pullPolicy: IfNotPresent
    extraLabels:
      milano.app: *app
      milano.level: managed
