---
- name: Prepare NFS node storage
  hosts: vm_mgdnfs1
  become: true
  gather_facts: false

  vars_files:
    - vars/versions.yaml

  tasks:
    - name: Require device path to be set
      ansible.builtin.assert:
        that:
          - nfs_dev_path is defined
          - nfs_dev_path | length > 0
        fail_msg: "Device path is required (e.g., /dev/sdb)"

    - name: Check block device exists
      ansible.builtin.stat:
        path: "{{ nfs_dev_path }}"
        follow: true
        get_checksum: false
      register: dev_stat

    - name: Fail when device missing
      ansible.builtin.fail:
        msg: "Device {{ nfs_dev_path }} not found"
      when: not dev_stat.stat.exists

    - name: Probe filesystem UUID
      ansible.builtin.command: blkid -s UUID -o value {{ nfs_dev_path }}
      register: blkid_probe
      changed_when: false
      failed_when: blkid_probe.rc not in [0, 2]

    - name: Format device as ext4 when uninitialized
      ansible.builtin.command: mkfs.ext4 -F {{ nfs_dev_path }}
      when: blkid_probe.rc != 0

    - name: Read filesystem UUID
      ansible.builtin.command: blkid -s UUID -o value {{ nfs_dev_path }}
      register: device_uuid
      changed_when: false

    - name: Ensure mount point exists
      ansible.builtin.file:
        path: "{{ nfs_mount_point }}"
        state: directory
        mode: '0755'

    - name: Persist and mount filesystem
      ansible.posix.mount:
        src: "UUID={{ device_uuid.stdout }}"
        path: "{{ nfs_mount_point }}"
        fstype: ext4
        opts: defaults,noatime,errors=remount-ro
        state: mounted

    - name: Verify mount present
      ansible.builtin.command: df -h {{ nfs_mount_point }}
      changed_when: false

    - name: Ensure application export directories exist
      ansible.builtin.file:
        path: "{{ nfs_mount_point }}/{{ item }}"
        state: directory
        mode: '0777'
      loop: "{{ nfs_app_dirs }}"

    - name: Ensure NFS server installed
      ansible.builtin.apt:
        name: "nfs-kernel-server"
        update_cache: true

    - name: Configure managed NFS export block
      ansible.builtin.blockinfile:
        path: /etc/exports
        create: true
        marker: "# {mark} ANSIBLE MANAGED BLOCK - operationscenter mgdnfs"
        block: |
          {{ nfs_mount_point }} {{ nfs_export_network }}({{ nfs_export_options }})
      notify: Reload nfs exports

    - name: Ensure NFS service is running and enabled
      ansible.builtin.systemd:
        name: nfs-kernel-server
        state: started
        enabled: true

    - name: Apply pending NFS export changes
      ansible.builtin.meta: flush_handlers

    - name: Verify NFS export is active
      ansible.builtin.command: exportfs -v
      register: exportfs_verify
      changed_when: false

    - name: Fail when NFS export is missing
      ansible.builtin.assert:
        that:
          - nfs_mount_point in exportfs_verify.stdout
        fail_msg: "NFS export for {{ nfs_mount_point }} is not active"

  handlers:
    - name: Reload nfs exports
      ansible.builtin.command: exportfs -ra
      notify: Restart nfs-kernel-server

    - name: Restart nfs-kernel-server
      ansible.builtin.systemd:
        name: nfs-kernel-server
        state: restarted
