; Endpoint for the Proxmox host. Defaults to LAN IP 10.0.0.10.
; Override when on VPN: PROXMOX_HOST=<vpn_ip> make ansible-run
;   (also works for the LXC/VM ProxyJump below)

[all:vars]
ansible_ssh_extra_args=-o UserKnownHostsFile=.ansible_known_hosts -o StrictHostKeyChecking=accept-new

[proxmox]
proxmox-host ansible_host="{{ lookup('env', 'PROXMOX_HOST') | default('10.0.0.10', true) }}" ansible_user=root

[lxc_nginx]
lxc-nginx ansible_host=172.16.0.101 ansible_user=root ansible_ssh_common_args="-o ForwardAgent=yes -o ProxyJump=root@{{ lookup('env', 'PROXMOX_HOST') | default('10.0.0.10', true) }}"

[lxc_proxbridge]
lxc-proxbridge ansible_host=172.16.0.102 ansible_user=root ansible_ssh_common_args="-o ForwardAgent=yes -o ProxyJump=root@{{ lookup('env', 'PROXMOX_HOST') | default('10.0.0.10', true) }}"

[lxc_homesecurity]
lxc-homesecurity ansible_host=172.16.0.103 ansible_user=root ansible_ssh_common_args="-o ForwardAgent=yes -o ProxyJump=root@{{ lookup('env', 'PROXMOX_HOST') | default('10.0.0.10', true) }}"

[vm_k8mgd]
vm-k8mgd ansible_host=172.16.0.105 ansible_user=root ansible_ssh_common_args="-o ForwardAgent=yes -o ProxyJump=root@{{ lookup('env', 'PROXMOX_HOST') | default('10.0.0.10', true) }}"

[vm_k8docker]
vm-k8docker ansible_host=172.16.0.106 ansible_user=root ansible_ssh_common_args="-o ForwardAgent=yes -o ProxyJump=root@{{ lookup('env', 'PROXMOX_HOST') | default('10.0.0.10', true) }}"

[vm_mgdnfs1]
vm-mgdnfs1 ansible_host=172.16.0.107 ansible_user=root ansible_ssh_common_args="-o ForwardAgent=yes -o ProxyJump=root@{{ lookup('env', 'PROXMOX_HOST') | default('10.0.0.10', true) }}"

[vm_openclaw]
openclaw ansible_host=172.16.0.104 ansible_user=root ansible_ssh_common_args="-o ForwardAgent=yes -o ProxyJump=root@{{ lookup('env', 'PROXMOX_HOST') | default('10.0.0.10', true) }}"
