---
- name: Ensure VectorChord DB container is running
  community.docker.docker_container:
    name: vectorchorddb
    image: "{{ vectorchord_image }}"
    state: started
    restart_policy: unless-stopped
    published_ports:
      - "{{ k8docker_db_bind_ip }}:{{ db_proxy_ports.postgresql }}:5432"
    labels:
      homepage.group: Containers
      homepage.name: VectorChord Postgres
      homepage.icon: postgres
      homepage.description: Shared Postgres and vector database backend
    volumes:
      - vectorchorddb_data:/var/lib/postgresql/data
    env:
      POSTGRES_PASSWORD: "{{ k8docker_db_passwords.postgres.bootstrap }}"

- name: Wait for VectorChord DB ready
  ansible.builtin.command: >
    docker exec vectorchorddb sh -c "PGPASSWORD='{{ k8docker_postgres_login_password }}' psql -h 127.0.0.1 -U postgres -d postgres -c 'SELECT 1' >/dev/null"
  register: vchord_health
  retries: 20
  delay: 5
  until: vchord_health.rc == 0
  changed_when: false

- name: Ensure Postgres root role exists
  community.postgresql.postgresql_user:
    name: root
    password: "{{ k8docker_db_passwords.postgres.root }}"
    login_db: postgres
    state: present
    role_attr_flags: SUPERUSER,CREATEDB,CREATEROLE,INHERIT,LOGIN
    login_user: root
    login_password: "{{ k8docker_postgres_root_login_password | default(k8docker_db_passwords.postgres.root, true) }}"
    login_host: "{{ k8docker_db_bind_ip }}"

- name: Create Postgres application users
  community.postgresql.postgresql_user:
    name: "{{ item.key }}_rw"
    password: "{{ k8docker_db_passwords.postgres.apps[item.key] }}"
    login_db: postgres
    state: present
    login_user: root
    login_password: "{{ k8docker_db_passwords.postgres.root }}"
    login_host: "{{ k8docker_db_bind_ip }}"
  loop: "{{ k8docker_databases.postgres.apps | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Create Postgres application databases
  community.postgresql.postgresql_db:
    name: "{{ item.key }}"
    state: present
    login_user: root
    login_password: "{{ k8docker_db_passwords.postgres.root }}"
    login_host: "{{ k8docker_db_bind_ip }}"
    owner: "{{ item.key }}_rw"
  loop: "{{ k8docker_databases.postgres.apps | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Restrict Postgres app databases to their owners
  community.postgresql.postgresql_query:
    db: "{{ item.key }}"
    login_user: root
    login_password: "{{ k8docker_db_passwords.postgres.root }}"
    login_host: "{{ k8docker_db_bind_ip }}"
    query: |
      REVOKE ALL ON DATABASE "{{ item.key }}" FROM PUBLIC;
      GRANT CONNECT ON DATABASE "{{ item.key }}" TO "{{ item.key }}_rw";
      REVOKE ALL ON SCHEMA public FROM PUBLIC;
      GRANT USAGE, CREATE ON SCHEMA public TO "{{ item.key }}_rw";
  loop: "{{ k8docker_databases.postgres.apps | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Install Postgres application extensions
  community.postgresql.postgresql_ext:
    name: "{{ item.1 }}"
    db: "{{ item.0.key }}"
    cascade: true
    login_user: root
    login_password: "{{ k8docker_db_passwords.postgres.root }}"
    login_host: "{{ k8docker_db_bind_ip }}"
  loop: "{{ k8docker_databases.postgres.apps | dict2items | selectattr('value.extensions', 'defined') | list | subelements('value.extensions') }}"
  loop_control:
    label: "{{ item.0.key }}:{{ item.1 }}"
