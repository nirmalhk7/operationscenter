---
- name: Fetch OpenClaw Token from K8s
  hosts: vm_k8mgd
  become: yes
  any_errors_fatal: true
  tags:
    - openclaw-kube
    - openclaw-env
  tasks:
    - name: Get openclaw-bot token
      ansible.builtin.shell:
        cmd: "kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get secret openclaw-bot-token -n kube-system -o jsonpath='{.data.token}' | base64 --decode"
      register: openclaw_k8s_token_result
      changed_when: false
      failed_when: openclaw_k8s_token_result.rc != 0 or openclaw_k8s_token_result.stdout == ''

    - name: Set dynamic token fact
      ansible.builtin.set_fact:
        openclaw_dynamic_token: "{{ openclaw_k8s_token_result.stdout }}"

- name: Deploy OpenClaw
  hosts: vm_openclaw
  become: yes
  vars_files:
    - vars/versions.yaml
    - vars/network.yaml

  vars:
    openclaw_user: root
    openclaw_home: /root
    openclaw_support_home: /root/openclaw_support
  handlers:
    - name: Restart OpenClaw service
      tags:
        - always
      ansible.builtin.systemd:
        name: openclaw
        enabled: true
        state: restarted
        daemon_reload: yes
  tasks:
    - name: Bootstrap OpenClaw filesystem
      tags:
        - openclaw-bootstrap
        - openclaw-assets
        - openclaw-config
        - openclaw-agent-workspaces
        - openclaw-pipelines
        - openclaw-env
      block:
        - name: Ensure OpenClaw configuration directory exists
          ansible.builtin.file:
            path: "{{ openclaw_home }}/.openclaw"
            state: directory
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0755'

        - name: Ensure OpenClaw compile cache directory exists
          ansible.builtin.file:
            path: /var/tmp/openclaw-compile-cache
            state: directory
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0755'

    - name: Deploy OpenClaw main configuration
      tags:
        - openclaw-assets
        - openclaw-config
      block:
        - name: Deploy main OpenClaw configuration file
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/openclaw.json"
            dest: "{{ openclaw_home }}/.openclaw/openclaw.json"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0600'
            force: yes
          notify: Restart OpenClaw service

    - name: Deploy OpenClaw agent workspaces
      tags:
        - openclaw-assets
        - openclaw-agent-workspaces
      block:
        - name: Copy custom agent workspaces
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/customAgents/"
            dest: "{{ openclaw_home }}/.openclaw/"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0755'
            force: yes
          notify: Restart OpenClaw service

        - name: Copy MountainValue subagent role docs
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/subAgents/"
            dest: "{{ openclaw_home }}/.openclaw/subAgents/"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0755'
            force: yes
          notify: Restart OpenClaw service

        - name: Remove stale MountainValue worker full-agent workspaces
          ansible.builtin.file:
            path: "{{ openclaw_home }}/.openclaw/workspace-{{ item }}"
            state: absent
          loop:
            - quantsieve
            - eventhound
            - riskskeptic
            - david
            - eq_quantsieve
            - eq_newswire
            - newswire
            - eq_eventhound
            - eq_riskskeptic
            - eq_thesis_depth_reviewer
          notify: Restart OpenClaw service

        - name: Copy main agent workspaces
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/mainAgent/"
            dest: "{{ openclaw_home }}/.openclaw/workspace/"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0755'
            force: yes
          notify: Restart OpenClaw service

        - name: Remove IDENTITY.md and BOOTSTRAP.md from mainAgent workspace
          ansible.builtin.file:
            path: "{{ openclaw_home }}/.openclaw/workspace/{{ item }}"
            state: absent
          loop:
            - IDENTITY.md
            - BOOTSTRAP.md
          notify: Restart OpenClaw service

    - name: Deploy OpenClaw Lobster pipelines
      tags:
        - openclaw-assets
        - openclaw-pipelines
      block:
        - name: Deploy Lobster pipeline file
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/mountainvalue.lobster"
            dest: "{{ openclaw_home }}/.openclaw/mountainvalue.lobster"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0600'
            force: yes
          notify: Restart OpenClaw service

    - name: Install OpenClaw OS prerequisites
      tags:
        - openclaw-bootstrap
      block:
        - name: Clean up old NodeSource list files to prevent conflicts
          ansible.builtin.shell: rm -f /etc/apt/sources.list.d/nodesource*
          changed_when: false

        - name: Ensure base packages are installed
          ansible.builtin.apt:
            name:
              - ca-certificates
              - curl
              - gnupg
              - python3-pip
              - git
            state: present
            update_cache: true

        - name: Remove conflicting Node.js packages if present
          ansible.builtin.apt:
            name:
              - nodejs
              - libnode72
              - libnode-dev
            state: absent
            purge: yes

    - name: Configure package repositories
      tags:
        - openclaw-bootstrap
      block:
        - name: Add NodeSource GPG key
          ansible.builtin.shell:
            cmd: |
              set -o pipefail
              curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | \
                gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
              chmod a+r /etc/apt/keyrings/nodesource.gpg
            creates: /etc/apt/keyrings/nodesource.gpg
            executable: /bin/bash

        - name: Add NodeSource repository file
          ansible.builtin.copy:
            dest: /etc/apt/sources.list.d/nodesource.list
            content: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_version }} nodistro main\n"
            mode: '0644'

        - name: Add GitHub CLI GPG key
          ansible.builtin.shell:
            cmd: |
              set -o pipefail
              curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
              chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            creates: /usr/share/keyrings/githubcli-archive-keyring.gpg
            executable: /bin/bash

        - name: Add GitHub CLI repository file
          ansible.builtin.copy:
            dest: /etc/apt/sources.list.d/github-cli.list
            content: "deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main\n"
            mode: '0644'

        - name: Add Kubernetes GPG key
          ansible.builtin.shell:
            cmd: |
              set -o pipefail
              curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubectl_version.split('.')[0] }}.{{ kubectl_version.split('.')[1] }}/deb/Release.key | \
                gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
              chmod a+r /etc/apt/keyrings/kubernetes-apt-keyring.gpg
            creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
            executable: /bin/bash

        - name: Add Kubernetes repository file
          ansible.builtin.copy:
            dest: /etc/apt/sources.list.d/kubernetes.list
            content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubectl_version.split('.')[0] }}.{{ kubectl_version.split('.')[1] }}/deb/ /\n"
            mode: '0644'

    - name: Install main software packages
      ansible.builtin.apt:
        name:
          - "nodejs={{ nodejs_package_version }}"
          - gh
          - kubectl
          - python3-venv
          - python3-pip
        state: present
        update_cache: true

    - name: Check if pnpm is already installed
      ansible.builtin.command: pnpm --version
      register: pnpm_check
      failed_when: false
      changed_when: false

    - name: Install pnpm globally
      ansible.builtin.command: npm install -g pnpm@{{ pnpm_version }}
      when: pnpm_check.rc != 0 or (pnpm_check.stdout is defined and pnpm_check.stdout != pnpm_version)

    - name: Remove conflicting global OpenClaw if exists
      ansible.builtin.file:
        path: /usr/bin/openclaw
        state: absent

    - name: Remove legacy uv-installed Polymarket MCP shim if present
      ansible.builtin.file:
        path: "{{ openclaw_home }}/.local/bin/polymarket-mcp"
        state: absent

    - name: Install OpenClaw globally (using pnpm)
      ansible.builtin.shell:
        cmd: |
          pnpm setup
          pnpm install -g openclaw@{{ openclaw_version }} polymarket-mcp@{{ polymarket_mcp_version }} stock-nse-india@{{ stock_nse_india_version }} @newsmcp/server@{{ newsmcp_server_version }} @cyanheads/secedgar-mcp-server@{{ secedgar_mcp_server_version }} kubectl-mcp-server@{{ kubectl_mcp_server_version }} promptfoo @buape/carbon @larksuiteoapi/node-sdk grammy
        executable: /bin/bash
      environment:
        PNPM_HOME: "{{ openclaw_home }}/.local/share/pnpm"
        PATH: "{{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin"
        HOME: "{{ openclaw_home }}"
      register: openclaw_install
      changed_when: "'Already up to date' not in openclaw_install.stdout"

    - name: Set permanent env vars
      lineinfile:
        path: /etc/environment
        regexp: "^KUBECONFIG="
        line: "KUBECONFIG={{ openclaw_support_home }}/.kube/config"
        create: yes
        state: present

    - name: Configure Kubernetes credentials
      block:
        - name: Ensure .kube directory exists
          ansible.builtin.file:
            path: "{{ openclaw_support_home }}/.kube"
            state: directory
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0700'

        - name: Create kubeconfig for OpenClaw
          ansible.builtin.copy:
            dest: "{{ openclaw_support_home }}/.kube/config"
            content: |
              apiVersion: v1
              kind: Config
              clusters:
              - cluster:
                  certificate-authority-data: {{ openclaw_k8s_ca }}
                  server: "{{ k8s_api_endpoint }}"
                name: homelab
              contexts:
              - context:
                  cluster: homelab
                  user: openclaw-bot
                name: openclaw-bot@homelab
              current-context: openclaw-bot@homelab
              users:
              - name: openclaw-bot
                user:
                  token: {{ openclaw_k8s_token }}
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0600'
          vars:
            openclaw_k8s_ca: "{{ lookup('env', 'OPENCLAW_CLUSTER_CA') }}"
            openclaw_k8s_token: "{{ hostvars['vm-k8mgd']['openclaw_dynamic_token'] }}"
            openclaw_client_cert: "{{ lookup('env', 'OPENCLAW_CLIENT_CERT') }}"
            openclaw_client_key: "{{ lookup('env', 'OPENCLAW_CLIENT_KEY') }}"

    - name: Validate required OpenClaw integration secrets
      tags:
        - openclaw-env
        - openclaw-validate
      block:
        - name: Require GitHub MCP PAT
          ansible.builtin.assert:
            that:
              - lookup('env', 'OPENCLAW_GITHUB_TOKEN') | length > 0
            fail_msg: "Set OPENCLAW_GITHUB_TOKEN before deploying OpenClaw with the GitHub MCP server enabled."

        - name: Require Todoist MCP API key
          ansible.builtin.assert:
            that:
              - lookup('env', 'OPENCLAW_TODOIST_API_KEY') | length > 0
            fail_msg: "Set OPENCLAW_TODOIST_API_KEY before deploying OpenClaw with the Todoist MCP server enabled."

        - name: Require Alpha Vantage MCP API key
          ansible.builtin.assert:
            that:
              - lookup('env', 'OPENCLAW_ALPHAVANTAGE_API_KEY') | length > 0
            fail_msg: "Set OPENCLAW_ALPHAVANTAGE_API_KEY before deploying OpenClaw with the Alpha Vantage MCP server enabled."

        - name: Require Victor Discord bot token
          ansible.builtin.assert:
            that:
              - lookup('env', 'OPENCLAW_DISCORD_BOT_TOKEN_VICTOR') | length > 0
            fail_msg: "Set OPENCLAW_DISCORD_BOT_TOKEN_VICTOR before deploying OpenClaw with Victor's Discord account enabled."

        - name: Require SEC EDGAR user agent
          ansible.builtin.assert:
            that:
              - lookup('env', 'OPENCLAW_EDGAR_USER_AGENT') | length > 0
            fail_msg: "Set OPENCLAW_EDGAR_USER_AGENT before deploying OpenClaw with the SEC EDGAR MCP server enabled."

    - name: Deploy OpenClaw environment file
      tags:
        - openclaw-env
      ansible.builtin.copy:
        dest: "{{ openclaw_home }}/.openclaw/.env"
        content: |
          {% for key in lookup('pipe', 'env | cut -d= -f1 | grep ^OPENCLAW_ || true').splitlines() %}
          {% if key != 'OPENCLAW_CLUSTER_TOKEN' %}
          {{ key }}="{{ lookup('env', key) }}"
          {% endif %}
          {% endfor %}
          OPENCLAW_CLUSTER_TOKEN="{{ hostvars['vm-k8mgd']['openclaw_dynamic_token'] }}"
          OPENROUTER_API_KEY={{ lookup('env', 'OPENROUTER_API_KEY') }}
          NVIDIA_API_KEY={{ lookup('env', 'NVIDIA_API_KEY') }}
          GEMINI_API_KEY={{ lookup('env', 'GEMINI_API_KEY') }}
          GROQ_API_KEY={{ lookup('env', 'GROQ_API_KEY')}}
          NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
          OPENCLAW_NO_RESPAWN=1
          KUBECONFIG="{{ openclaw_support_home }}/.kube/config"
          ALPACA_SECRET_KEY={{ lookup('env', 'ALPACA_SECRET_KEY') }}
          ALPACA_API_KEY={{ lookup('env', 'ALPACA_API_KEY') }}
          OPENCLAW_EQUITY_DISCORD_FORUM_CHANNEL_ID={{ lookup('env', 'OPENCLAW_EQUITY_DISCORD_FORUM_CHANNEL_ID') | default('1504282224789295134', true) }}
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        mode: '0600'
      notify: Restart OpenClaw service

    - name: Validate OpenClaw configuration
      tags:
        - openclaw-validate
      ansible.builtin.shell:
        cmd: |
          export PNPM_HOME="{{ openclaw_home }}/.local/share/pnpm"
          export PATH="{{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:$PATH"
          openclaw config validate
        executable: /bin/bash
      environment:
        HOME: "{{ openclaw_home }}"
      changed_when: false

    - name: Install OpenClaw systemd service
      tags:
        - openclaw-service
      ansible.builtin.copy:
        dest: /etc/systemd/system/openclaw.service
        content: |
          [Unit]
          Description=OpenClaw AI Agent Gateway
          After=network.target

          [Service]
          Type=simple

          User={{ openclaw_user }}
          EnvironmentFile={{ openclaw_home }}/.openclaw/.env
          Environment="PATH={{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin"
          Environment="PNPM_HOME={{ openclaw_home }}/.local/share/pnpm"
          Environment="HOME={{ openclaw_home }}"
          ExecStart={{ openclaw_home }}/.local/share/pnpm/openclaw gateway run --bind lan
          Restart=always
          RestartSec=10

          # Prod limits
          LimitNOFILE=65536
          LimitNPROC=1024
          # Logging
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: Restart OpenClaw service

    - name: Enable and restart OpenClaw service
      tags:
        - openclaw-service
      ansible.builtin.systemd:
        name: openclaw
        enabled: true
        state: restarted
        daemon_reload: yes
