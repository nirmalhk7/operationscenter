---
- name: Fetch OpenClaw Token from K8s
  hosts: vm_k8mgd
  become: yes
  any_errors_fatal: true
  tags:
    - openclaw-kube
    - openclaw-env
  tasks:
    - name: Get openclaw-bot token
      ansible.builtin.shell:
        cmd: "kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get secret openclaw-bot-token -n kube-system -o jsonpath='{.data.token}' | base64 --decode"
      register: openclaw_k8s_token_result
      changed_when: false
      failed_when: openclaw_k8s_token_result.rc != 0 or openclaw_k8s_token_result.stdout == ''
      no_log: true

    - name: Set dynamic token fact
      ansible.builtin.set_fact:
        openclaw_dynamic_token: "{{ openclaw_k8s_token_result.stdout }}"
      no_log: true

    - name: Get cluster CA bundle
      ansible.builtin.shell:
        cmd: "kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml config view --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}'"
      register: openclaw_k8s_ca_result
      changed_when: false
      failed_when: openclaw_k8s_ca_result.rc != 0 or openclaw_k8s_ca_result.stdout == ''
      no_log: true

    - name: Set dynamic CA fact
      ansible.builtin.set_fact:
        openclaw_dynamic_ca: "{{ openclaw_k8s_ca_result.stdout }}"
      no_log: true

- name: Deploy OpenClaw
  hosts: vm_openclaw
  become: yes
  vars_files:
    - vars/versions.yaml
    - vars/network.yaml

  vars:
    openclaw_user: root
    openclaw_home: /root
    openclaw_support_home: /root/openclaw_support
    openclaw_validate_home: /root/openclaw_validate_home
    openclaw_cluster_token: "{{ hostvars['vm-k8mgd']['openclaw_dynamic_token'] | default(lookup('env', 'OPENCLAW_CLUSTER_TOKEN'), true) }}"
    openclaw_cluster_ca: "{{ hostvars['vm-k8mgd']['openclaw_dynamic_ca'] | default(lookup('env', 'OPENCLAW_CLUSTER_CA'), true) }}"
  handlers:
    - name: Restart OpenClaw service
      tags:
        - always
      ansible.builtin.systemd:
        name: openclaw
        enabled: true
        state: restarted
        daemon_reload: yes
  tasks:
    - name: Bootstrap OpenClaw filesystem
      tags:
        - openclaw-bootstrap
        - openclaw-assets
        - openclaw-config
        - openclaw-agent-workspaces
        - openclaw-pipelines
        - openclaw-env
      block:
        - name: Ensure OpenClaw configuration directory exists
          ansible.builtin.file:
            path: "{{ openclaw_home }}/.openclaw"
            state: directory
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0700'

        - name: Ensure OpenClaw compile cache directory exists
          ansible.builtin.file:
            path: /var/tmp/openclaw-compile-cache
            state: directory
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0755'

    - name: Install OpenClaw OS prerequisites
      tags:
        - openclaw-bootstrap
      block:
        - name: Clean up old NodeSource list files to prevent conflicts
          ansible.builtin.shell: rm -f /etc/apt/sources.list.d/nodesource*
          changed_when: false

        - name: Ensure base packages are installed
          ansible.builtin.apt:
            name:
              - ca-certificates
              - curl
              - gnupg
              - python3-pip
              - python3-venv
              - git
            state: present
            update_cache: true

        - name: Remove conflicting Node.js packages if present
          ansible.builtin.apt:
            name:
              - nodejs
              - libnode72
              - libnode-dev
            state: absent
            purge: yes

    - name: Configure package repositories
      tags:
        - openclaw-bootstrap
      block:
        - name: Add NodeSource GPG key
          ansible.builtin.shell:
            cmd: |
              set -o pipefail
              curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | \
                gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
              chmod a+r /etc/apt/keyrings/nodesource.gpg
            creates: /etc/apt/keyrings/nodesource.gpg
            executable: /bin/bash

        - name: Add NodeSource repository file
          ansible.builtin.copy:
            dest: /etc/apt/sources.list.d/nodesource.list
            content: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_version }} nodistro main\n"
            mode: '0644'

        - name: Add GitHub CLI GPG key
          ansible.builtin.shell:
            cmd: |
              set -o pipefail
              curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
              chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            creates: /usr/share/keyrings/githubcli-archive-keyring.gpg
            executable: /bin/bash

        - name: Add GitHub CLI repository file
          ansible.builtin.copy:
            dest: /etc/apt/sources.list.d/github-cli.list
            content: "deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main\n"
            mode: '0644'

        - name: Add Kubernetes GPG key
          ansible.builtin.shell:
            cmd: |
              set -o pipefail
              curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubectl_version.split('.')[0] }}.{{ kubectl_version.split('.')[1] }}/deb/Release.key | \
                gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
              chmod a+r /etc/apt/keyrings/kubernetes-apt-keyring.gpg
            creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
            executable: /bin/bash

        - name: Add Kubernetes repository file
          ansible.builtin.copy:
            dest: /etc/apt/sources.list.d/kubernetes.list
            content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubectl_version.split('.')[0] }}.{{ kubectl_version.split('.')[1] }}/deb/ /\n"
            mode: '0644'

    - name: Install OpenClaw runtime packages
      tags:
        - openclaw-runtime
      block:
        - name: Install main software packages
          ansible.builtin.apt:
            name:
              - "nodejs={{ nodejs_package_version }}"
              - gh
              - kubectl
              - ffmpeg
              - python3-venv
              - python3-pip
            state: present
            update_cache: true

        - name: Check if pnpm is already installed
          ansible.builtin.command: pnpm --version
          register: pnpm_check
          failed_when: false
          changed_when: false

        - name: Install pnpm globally
          ansible.builtin.command: npm install -g pnpm@{{ pnpm_version }}
          when: pnpm_check.rc != 0 or (pnpm_check.stdout is defined and pnpm_check.stdout != pnpm_version)

        - name: Remove conflicting global OpenClaw if exists
          ansible.builtin.file:
            path: /usr/bin/openclaw
            state: absent

        - name: Remove legacy uv-installed Polymarket MCP shim if present
          ansible.builtin.file:
            path: "{{ openclaw_home }}/.local/bin/polymarket-mcp"
            state: absent

        - name: Remove incompatible OpenClaw extensions from newer releases
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ openclaw_home }}/.openclaw/extensions/discord"
            - "{{ openclaw_home }}/.openclaw/extensions/exa"

        - name: Install OpenClaw companion packages globally using pnpm
          ansible.builtin.shell:
            cmd: |
              pnpm setup
              pnpm install -g openclaw@{{ openclaw_version }} @clawdbot/lobster@{{ lobster_version }} polymarket-mcp@{{ polymarket_mcp_version }} stock-nse-india@{{ stock_nse_india_version }} @cyanheads/secedgar-mcp-server@{{ secedgar_mcp_server_version }} rss-reader-mcp@{{ rss_reader_mcp_version }} npm-search-mcp-server@{{ npm_search_mcp_server_version }} @isteam/hackernews-mcp@{{ hackernews_mcp_version }} @mbelinky/x-mcp-server@{{ x_mcp_server_version }} reddit-mcp-server@{{ reddit_mcp_server_version }} @modelcontextprotocol/server-filesystem@{{ server_filesystem_version }} promptfoo @buape/carbon @larksuiteoapi/node-sdk grammy
            executable: /bin/bash
          environment:
            PNPM_HOME: "{{ openclaw_home }}/.local/share/pnpm"
            PATH: "{{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin"
            HOME: "{{ openclaw_home }}"
          register: openclaw_install
          changed_when: "'Already up to date' not in openclaw_install.stdout"
          notify: Restart OpenClaw service

        - name: Publish Lobster to a standard system PATH
          ansible.builtin.copy:
            dest: /usr/local/bin/lobster
            content: |
              #!/bin/sh
              exec node {{ openclaw_home }}/.local/share/pnpm/global/5/node_modules/@clawdbot/lobster/dist/src/cli.js "$@"
            mode: '0755'
            owner: root
            group: root
            force: true
          notify: Restart OpenClaw service

        - name: Publish OpenClaw CLI to a standard system PATH
          ansible.builtin.copy:
            dest: /usr/local/bin/openclaw
            content: |
              #!/bin/sh
              export PNPM_HOME="{{ openclaw_home }}/.local/share/pnpm"
              export PATH="{{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin"
              exec {{ openclaw_home }}/.local/share/pnpm/openclaw "$@"
            mode: '0755'
            owner: root
            group: root
            force: true
          notify: Restart OpenClaw service

        - name: Create dedicated Kubernetes MCP virtualenv
          ansible.builtin.command:
            cmd: python3 -m venv {{ openclaw_home }}/.local/share/kubectl-mcp-server-venv
            creates: "{{ openclaw_home }}/.local/share/kubectl-mcp-server-venv/bin/python"

        - name: Install kubectl MCP server into its virtualenv
          ansible.builtin.pip:
            name: "kubectl-mcp-tool=={{ kubectl_mcp_tool_version }}"
            virtualenv: "{{ openclaw_home }}/.local/share/kubectl-mcp-server-venv"
            virtualenv_command: python3 -m venv
          environment:
            HOME: "{{ openclaw_home }}"
          notify: Restart OpenClaw service

        - name: Confirm Lobster CLI is available on PATH
          ansible.builtin.command: lobster --help
          environment:
            PNPM_HOME: "{{ openclaw_home }}/.local/share/pnpm"
            PATH: "{{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin"
            HOME: "{{ openclaw_home }}"
          changed_when: false

    - name: Install MountainValue equity research CLI
      tags:
        - openclaw-equity-cli
      block:
        - name: Ensure local equity-research deployment directory exists
          ansible.builtin.file:
            path: "{{ openclaw_home }}/.openclaw/cli/equity-research"
            state: directory
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0755'

        - name: Deploy local equity-research package metadata
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/cli/equity-research/{{ item }}"
            dest: "{{ openclaw_home }}/.openclaw/cli/equity-research/{{ item }}"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0644'
            force: yes
          loop:
            - package.json
            - package-lock.json
            - README.md
          notify: Restart OpenClaw service

        - name: Deploy local equity-research build output
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/cli/equity-research/dist/"
            dest: "{{ openclaw_home }}/.openclaw/cli/equity-research/dist/"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0755'
            force: yes
          notify: Restart OpenClaw service

        - name: Install local equity-research production dependencies
          ansible.builtin.command: npm ci --omit=dev --ignore-scripts
          args:
            chdir: "{{ openclaw_home }}/.openclaw/cli/equity-research"
          environment:
            HOME: "{{ openclaw_home }}"
          changed_when: false

        - name: Publish equity-research to a standard system PATH
          ansible.builtin.copy:
            dest: "{{ item }}"
            content: |
              #!/bin/sh
              exec node {{ openclaw_home }}/.openclaw/cli/equity-research/dist/src/cli.js "$@"
            mode: '0755'
            owner: root
            group: root
            force: true
          loop:
            - /usr/local/bin/equity-research
            - "{{ openclaw_home }}/.local/share/pnpm/equity-research"
          notify: Restart OpenClaw service

        - name: Install fix-that-thang CLI from GitHub Packages
          ansible.builtin.command: pnpm install -g @nirmalhk7/fix-that-thang@{{ fix_that_thang_version }}
          environment:
            PNPM_HOME: "{{ openclaw_home }}/.local/share/pnpm"
            PATH: "{{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin"
            HOME: "{{ openclaw_home }}"
          notify: Restart OpenClaw service

        - name: Publish fix-that-thang to a standard system PATH
          ansible.builtin.copy:
            dest: /usr/local/bin/fix-that-thang
            content: |
              #!/bin/sh
              exec node {{ openclaw_home }}/.local/share/pnpm/global/5/node_modules/@nirmalhk7/fix-that-thang/dist/src/cli.js "$@"
            mode: '0755'
            owner: root
            group: root
            force: true
          notify: Restart OpenClaw service

    # - name: Run OpenClaw doctor check
    #   ansible.builtin.shell:
    #     cmd: |
    #       export PNPM_HOME="{{ openclaw_home }}/.local/share/pnpm"
    #       export PATH="{{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:$PATH"
    #       openclaw doctor
    #     executable: /bin/bash
    #   environment:
    #     HOME: "{{ openclaw_home }}"
    #     KUBECONFIG: "{{ openclaw_support_home }}/.kube/config"
    #   changed_when: false

    - name: Configure OpenClaw Kubernetes access
      tags:
        - openclaw-kube
      block:
        - name: Set permanent kubeconfig env var
          lineinfile:
            path: /etc/environment
            regexp: "^KUBECONFIG="
            line: "KUBECONFIG={{ openclaw_support_home }}/.kube/config"
            create: yes
            state: present

        - name: Ensure OpenClaw support kube directory exists
          ansible.builtin.file:
            path: "{{ openclaw_support_home }}/.kube"
            state: directory
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0700'

        - name: Require Kubernetes token for OpenClaw kubeconfig
          ansible.builtin.assert:
            that:
              - openclaw_cluster_token | length > 0
            fail_msg: "vm-k8mgd did not provide openclaw_dynamic_token. Fix SSH access to vm-k8mgd or set OPENCLAW_CLUSTER_TOKEN before deploying OpenClaw Kubernetes access."

        - name: Require Kubernetes CA for OpenClaw kubeconfig
          ansible.builtin.assert:
            that:
              - openclaw_cluster_ca | length > 0
            fail_msg: "vm-k8mgd did not provide openclaw_dynamic_ca. Fix SSH access to vm-k8mgd or set OPENCLAW_CLUSTER_CA before deploying OpenClaw Kubernetes access."

        - name: Create kubeconfig for OpenClaw
          ansible.builtin.copy:
            dest: "{{ openclaw_support_home }}/.kube/config"
            content: |
              apiVersion: v1
              kind: Config
              clusters:
              - cluster:
                  certificate-authority-data: {{ openclaw_cluster_ca }}
                  server: "{{ k8s_api_endpoint }}"
                name: homelab
              contexts:
              - context:
                  cluster: homelab
                  user: openclaw-bot
                name: openclaw-bot@homelab
              current-context: openclaw-bot@homelab
              users:
              - name: openclaw-bot
                user:
                  token: {{ openclaw_k8s_token }}
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0600'
          vars:
            openclaw_k8s_ca: "{{ lookup('env', 'OPENCLAW_CLUSTER_CA') }}"
            openclaw_k8s_token: "{{ openclaw_cluster_token }}"
            openclaw_client_cert: "{{ lookup('env', 'OPENCLAW_CLIENT_CERT') }}"
            openclaw_client_key: "{{ lookup('env', 'OPENCLAW_CLIENT_KEY') }}"
          no_log: true

    - name: Validate required OpenClaw integration secrets
      tags:
        - openclaw-env
        - openclaw-validate
      block:
        - name: Require Kubernetes token for OpenClaw environment
          ansible.builtin.assert:
            that:
              - openclaw_cluster_token | length > 0
            fail_msg: "vm-k8mgd did not provide openclaw_dynamic_token. Fix SSH access to vm-k8mgd or set OPENCLAW_CLUSTER_TOKEN before deploying the OpenClaw environment."

        - name: Require GitHub MCP PAT
          ansible.builtin.assert:
            that:
              - lookup('env', 'OPENCLAW_GITHUB_TOKEN') | length > 0
            fail_msg: "Set OPENCLAW_GITHUB_TOKEN before deploying OpenClaw with the GitHub MCP server enabled."

        - name: Require Todoist MCP API key
          ansible.builtin.assert:
            that:
              - lookup('env', 'OPENCLAW_TODOIST_API_KEY') | length > 0
            fail_msg: "Set OPENCLAW_TODOIST_API_KEY before deploying OpenClaw with the Todoist MCP server enabled."

        - name: Require Alpha Vantage MCP API key
          ansible.builtin.assert:
            that:
              - lookup('env', 'OPENCLAW_ALPHAVANTAGE_API_KEY') | length > 0
            fail_msg: "Set OPENCLAW_ALPHAVANTAGE_API_KEY before deploying OpenClaw with the Alpha Vantage MCP server enabled."

        - name: Require Victor Discord bot token
          ansible.builtin.assert:
            that:
              - lookup('env', 'OPENCLAW_DISCORD_BOT_TOKEN_VICTOR') | length > 0
            fail_msg: "Set OPENCLAW_DISCORD_BOT_TOKEN_VICTOR before deploying OpenClaw with Victor's Discord account enabled."

        - name: Require SEC EDGAR user agent
          ansible.builtin.assert:
            that:
              - lookup('env', 'OPENCLAW_EDGAR_USER_AGENT') | length > 0
            fail_msg: "Set OPENCLAW_EDGAR_USER_AGENT before deploying OpenClaw with the SEC EDGAR MCP server enabled."

    - name: Validate candidate OpenClaw configuration before live deployment
      tags:
        - openclaw-assets
        - openclaw-config
        - openclaw-agent-workspaces
        - openclaw-pipelines
        - openclaw-env
        - openclaw-validate
      block:
        - name: Reset staged OpenClaw validation home
          ansible.builtin.file:
            path: "{{ openclaw_validate_home }}"
            state: absent

        - name: Ensure staged OpenClaw configuration directory exists
          ansible.builtin.file:
            path: "{{ openclaw_validate_home }}/.openclaw"
            state: directory
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0700'

        - name: Stage candidate OpenClaw configuration file
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/openclaw.json"
            dest: "{{ openclaw_validate_home }}/.openclaw/openclaw.json"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0600'
            force: yes

        - name: Stage candidate OpenClaw environment file
          ansible.builtin.template:
            src: openclaw.env.j2
            dest: "{{ openclaw_validate_home }}/.openclaw/.env"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0600'

        - name: Validate staged OpenClaw configuration
          ansible.builtin.shell:
            cmd: |
              export PNPM_HOME="{{ openclaw_home }}/.local/share/pnpm"
              export PATH="{{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:$PATH"
              openclaw config validate --json
            executable: /bin/bash
          environment:
            HOME: "{{ openclaw_validate_home }}"
          changed_when: false
      always:
        - name: Remove staged OpenClaw validation home
          ansible.builtin.file:
            path: "{{ openclaw_validate_home }}"
            state: absent

    - name: Deploy OpenClaw environment file
      tags:
        - openclaw-env
      ansible.builtin.template:
        src: openclaw.env.j2
        dest: "{{ openclaw_home }}/.openclaw/.env"
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        mode: '0600'
      notify: Restart OpenClaw service

    - name: Deploy OpenClaw main configuration
      tags:
        - openclaw-assets
        - openclaw-config
      block:
        - name: Deploy main OpenClaw configuration file
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/openclaw.json"
            dest: "{{ openclaw_home }}/.openclaw/openclaw.json"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0600'
            force: yes
          notify: Restart OpenClaw service

    - name: Deploy OpenClaw agent workspaces
      tags:
        - openclaw-assets
        - openclaw-agent-workspaces
      block:
        - name: Copy custom agent workspaces
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/customAgents/"
            dest: "{{ openclaw_home }}/.openclaw/"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0755'
            force: yes
          notify: Restart OpenClaw service

        - name: Copy MountainValue subagent role docs
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/subAgents/"
            dest: "{{ openclaw_home }}/.openclaw/subAgents/"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0755'
            force: yes
          notify: Restart OpenClaw service

        - name: Remove stale MountainValue subagent bootstrap files
          ansible.builtin.file:
            path: "{{ openclaw_home }}/.openclaw/subAgents/{{ item }}/BOOTSTRAP.md"
            state: absent
          loop:
            - eq_quantsieve
            - eq_eventhound
            - eq_riskskeptic
            - eq_thesis_depth_reviewer
            - newswire
          notify: Restart OpenClaw service

        - name: Remove stale MountainValue subagent onboarding files
          ansible.builtin.file:
            path: "{{ openclaw_home }}/.openclaw/subAgents/{{ item.0 }}/{{ item.1 }}"
            state: absent
          loop: "{{ ['eq_quantsieve', 'eq_eventhound', 'eq_riskskeptic', 'eq_thesis_depth_reviewer', 'newswire'] | product(['IDENTITY.md', 'USER.md', 'SOUL.md', 'HEARTBEAT.md']) | list }}"
          loop_control:
            label: "{{ item.0 }}/{{ item.1 }}"
          notify: Restart OpenClaw service

        - name: Remove stale MountainValue worker full-agent workspaces
          ansible.builtin.file:
            path: "{{ openclaw_home }}/.openclaw/workspace-{{ item }}"
            state: absent
          loop:
            - quantsieve
            - eventhound
            - riskskeptic
            - david
            - eq_quantsieve
            - eq_newswire
            - newswire
            - eq_eventhound
            - eq_riskskeptic
            - eq_thesis_depth_reviewer
          notify: Restart OpenClaw service

        - name: Copy main agent workspaces
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/mainAgent/"
            dest: "{{ openclaw_home }}/.openclaw/workspace/"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0755'
            force: yes
          notify: Restart OpenClaw service

        - name: Remove stale generated files from mainAgent workspace
          ansible.builtin.file:
            path: "{{ openclaw_home }}/.openclaw/workspace/{{ item }}"
            state: absent
          loop:
            - BOOTSTRAP.md
            - MEMORY.md
          notify: Restart OpenClaw service

    - name: Reconcile OpenClaw runtime state
      tags:
        - openclaw-config
        - openclaw-agent-workspaces
      block:
        - name: Derive active OpenClaw agent ids from repo config
          ansible.builtin.set_fact:
            openclaw_active_agent_ids: >-
              {{
                (lookup('file', playbook_dir ~ '/../../openclaw/openclaw.json') | from_json).agents.list
                | map(attribute='id')
                | list
              }}

        - name: Gather OpenClaw agent runtime directories
          ansible.builtin.find:
            paths: "{{ openclaw_home }}/.openclaw/agents"
            file_type: directory
            depth: 1
          register: openclaw_agent_runtime_dirs

        - name: Remove legacy OpenClaw agent runtime directories
          ansible.builtin.file:
            path: "{{ item.path }}"
            state: absent
          loop: "{{ openclaw_agent_runtime_dirs.files }}"
          loop_control:
            label: "{{ item.path | basename }}"
          when: item.path | basename not in openclaw_active_agent_ids

        - name: Archive orphan OpenClaw session transcripts
          ansible.builtin.command:
            cmd: openclaw doctor --fix --non-interactive --yes
          environment:
            HOME: "{{ openclaw_home }}"
            PNPM_HOME: "{{ openclaw_home }}/.local/share/pnpm"
            PATH: "{{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin"
            KUBECONFIG: "{{ openclaw_support_home }}/.kube/config"
          register: openclaw_doctor_fix
          changed_when: >-
            ('Archived' in openclaw_doctor_fix.stdout)
            or ('Doctor changes' in openclaw_doctor_fix.stdout)
            or ('State integrity' in openclaw_doctor_fix.stdout)
            or ('repair' in (openclaw_doctor_fix.stdout | lower))

    - name: Deploy OpenClaw Lobster pipelines
      tags:
        - openclaw-assets
        - openclaw-pipelines
      block:
        - name: Deploy Lobster pipeline file
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../openclaw/mountainvalue.lobster"
            dest: "{{ openclaw_home }}/.openclaw/mountainvalue.lobster"
            owner: "{{ openclaw_user }}"
            group: "{{ openclaw_user }}"
            mode: '0600'
            force: yes
          notify: Restart OpenClaw service

    - name: Install OpenClaw systemd service
      tags:
        - openclaw-service
      ansible.builtin.copy:
        dest: /etc/systemd/system/openclaw.service
        content: |
          [Unit]
          Description=OpenClaw AI Agent Gateway
          After=network.target

          [Service]
          Type=simple

          User={{ openclaw_user }}
          EnvironmentFile={{ openclaw_home }}/.openclaw/.env
          Environment="PATH={{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin"
          Environment="PNPM_HOME={{ openclaw_home }}/.local/share/pnpm"
          Environment="HOME={{ openclaw_home }}"
          ExecStart={{ openclaw_home }}/.local/share/pnpm/openclaw gateway run --bind lan
          Restart=always
          RestartSec=10

          # Prod limits
          LimitNOFILE=65536
          LimitNPROC=1024
          # Logging
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      notify: Restart OpenClaw service

    - name: Enable and restart OpenClaw service
      tags:
        - openclaw-service
      ansible.builtin.systemd:
        name: openclaw
        enabled: true
        state: restarted
        daemon_reload: yes
