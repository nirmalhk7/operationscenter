---
- name: Deploy OpenClaw
  hosts: vm_openclaw
  become: yes
  vars_files:
    - vars/versions.yaml

  vars:
    openclaw_user: root
    openclaw_home: /root
    nodejs_version: "22.x"

  tasks:
    - name: Clean up old NodeSource list files to prevent conflicts
      ansible.builtin.shell: rm -f /etc/apt/sources.list.d/nodesource*
      changed_when: false

    - name: Ensure base packages are installed
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create directory for NodeSource GPG key
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add NodeSource GPG key
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | \
            gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
          chmod a+r /etc/apt/keyrings/nodesource.gpg
        creates: /etc/apt/keyrings/nodesource.gpg
        executable: /bin/bash

    - name: Add NodeSource repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/nodesource.list
        content: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_version }} nodistro main\n"
        mode: '0644'

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Check if pnpm is already installed
      ansible.builtin.command: pnpm --version
      register: pnpm_check
      failed_when: false
      changed_when: false

    - name: Install pnpm globally
      ansible.builtin.command: npm install -g pnpm
      when: pnpm_check.rc != 0

    - name: Install OpenClaw globally (using pnpm)
      ansible.builtin.shell:
        cmd: pnpm install -g openclaw@{{ openclaw_version | default('latest') }}
        executable: /bin/bash
      environment:
        PNPM_HOME: "{{ openclaw_home }}/.local/share/pnpm"
        PATH: "{{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin"
        HOME: "{{ openclaw_home }}"
      register: openclaw_install
      changed_when: "'Already up to date' not in openclaw_install.stdout"

    - name: Ensure OpenClaw configuration directory exists
      ansible.builtin.file:
        path: "{{ openclaw_home }}/.openclaw"
        state: directory
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        mode: '0755'

    - name: Ensure OpenClaw compile cache directory exists
      ansible.builtin.file:
        path: /var/tmp/openclaw-compile-cache
        state: directory
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        mode: '0755'

    - name: Deploy pre-configured OpenClaw configuration file
      ansible.builtin.copy:
        src: /Users/nirmalhk7/Documents/DevWorld/operationscenter/infrastructure/assets/openclaw.json
        dest: "{{ openclaw_home }}/.openclaw/openclaw.json"
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        mode: '0600'

    - name: Deploy OpenClaw environment file
      ansible.builtin.copy:
        dest: "{{ openclaw_home }}/.openclaw/.env"
        content: |
          OPENCLAW_TELEGRAM_BOT_TOKEN="{{ lookup('env', 'OPENCLAW_GATEWAY_TELEGRAM_TOKEN') | default(lookup('env', 'OPENCLAW_TELEGRAM_BOT_TOKEN')) }}"
          OPENCLAW_GATEWAY_AUTH_TOKEN="{{ lookup('env', 'OPENCLAW_GATEWAY_AUTH_TOKEN') }}"
          GEMINI_API_KEY="{{ lookup('env', 'GEMINI_API_KEY') }}"
          NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
          OPENCLAW_NO_RESPAWN=1
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        mode: '0600'

    - name: Run OpenClaw onboarding non-interactively
      ansible.builtin.shell: |
        export PATH=$PATH:/usr/local/bin:{{ openclaw_home }}/.local/bin
        openclaw onboard --non-interactive --accept-risk --skip-health
      register: onboard_output
      changed_when: onboard_output.rc == 0

    - name: Create OpenClaw systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/openclaw.service
        content: |
          [Unit]
          Description=OpenClaw AI Agent Gateway
          After=network.target

          [Service]
          Type=simple
          User={{ openclaw_user }}
          EnvironmentFile={{ openclaw_home }}/.openclaw/.env
          Environment="PATH={{ openclaw_home }}/.local/bin:{{ openclaw_home }}/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin"
          Environment="PNPM_HOME={{ openclaw_home }}/.local/share/pnpm"
          Environment="HOME={{ openclaw_home }}"
          ExecStart=/bin/bash -c "openclaw gateway run"
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
        mode: '0644'

    - name: Enable and restart OpenClaw service
      ansible.builtin.systemd:
        name: openclaw
        enabled: true
        state: restarted
        daemon_reload: yes


