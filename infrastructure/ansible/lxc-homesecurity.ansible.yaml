---
- name: Allow raw network capabilities for homesecurity CT
  hosts: proxmox
  become: true
  gather_facts: false
  vars:
    homesecurity_ct_id: 103
  tasks:
    - name: Clear LXC capability drops for nested network exporters
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          config="/etc/pve/lxc/{{ homesecurity_ct_id }}.conf"
          desired="$(
            awk '
              !/^# (BEGIN|END) ANSIBLE MANAGED - retain caps$/ &&
              !/^lxc\.cap\.drop:/
            ' "$config"
            printf 'lxc.cap.drop: \n'
          )"
          before="$(cat "$config")"
          if [ "$before" != "$desired" ]; then
            printf '%s\n' "$desired" > "$config"
            if pct status {{ homesecurity_ct_id }} | grep -q 'status: running'; then
              pct reboot {{ homesecurity_ct_id }}
            fi
          fi
        executable: /bin/bash
      changed_when: false

- name: Deploy home WiFi monitoring stack on homesecurity LXC
  hosts: lxc_homesecurity
  become: true
  gather_facts: true

  vars_files:
    - vars/versions.yaml
    - vars/homesecurity.yaml

  vars:
    docker_repo: "https://download.docker.com/linux/debian"
    docker_gpg: "/etc/apt/keyrings/docker.asc"
    repo_list: "/etc/apt/sources.list.d/docker.list"
    docker_socket_proxy_bind: "172.16.0.103:2375:2375"

  tasks:
    - name: Check if docker is installed
      ansible.builtin.stat:
        path: /usr/bin/docker
      register: docker_bin

    - name: Docker setup
      when: not docker_bin.stat.exists
      block:
        - name: Ensure base deps
          ansible.builtin.apt:
            update_cache: true
            name: [ca-certificates, curl]

        - name: Ensure keyrings directory exists
          ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: "0755"

        - name: Download Docker GPG key
          ansible.builtin.get_url:
            url: "{{ docker_repo }}/gpg"
            dest: "{{ docker_gpg }}"
            mode: "0644"

        - name: Get dpkg architecture
          ansible.builtin.command: dpkg --print-architecture
          register: dpkg_arch
          changed_when: false

        - name: Add Docker apt repository
          ansible.builtin.copy:
            dest: "{{ repo_list }}"
            mode: "0644"
            content: |
              deb [arch={{ dpkg_arch.stdout }} signed-by={{ docker_gpg }}] {{ docker_repo }} {{ ansible_lsb.codename | default('bookworm') }} stable

        - name: Install Docker packages at requested versions
          ansible.builtin.apt:
            name:
              - "docker-ce={{ homesecurity_docker_ce_version }}"
              - "docker-ce-cli={{ homesecurity_docker_ce_cli_version }}"
              - "containerd.io={{ homesecurity_containerd_version }}"
              - "docker-buildx-plugin={{ homesecurity_docker_buildx_plugin_version }}"
              - "docker-compose-plugin={{ homesecurity_docker_compose_plugin_version }}"
            update_cache: true

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Ensure homesecurity install directory exists
      ansible.builtin.file:
        path: "{{ homesecurity_install_dir }}"
        state: directory
        mode: "0755"

    - name: Ensure homesecurity config subdirectories exist
      ansible.builtin.file:
        path: "{{ homesecurity_install_dir }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - blackbox
        - network_exporter
        - openport
        - netalertx

    - name: Sync homesecurity stack files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ homesecurity_install_dir }}/{{ item.dest }}"
        mode: "{{ item.mode | default('0644') }}"
      loop:
        - { src: files/homesecurity/docker-compose.yml, dest: docker-compose.yml }
        - { src: files/homesecurity/blackbox/blackbox.yml, dest: blackbox/blackbox.yml }
        - { src: files/homesecurity/network_exporter/network_exporter.yml, dest: network_exporter/network_exporter.yml }
        - { src: files/homesecurity/openport/config.yaml, dest: openport/config.yaml }
        - { src: files/homesecurity/netalertx/README.md, dest: netalertx/README.md, mode: "0644" }

    - name: Render NetAlertX app.conf for WiFi subnet scanning
      ansible.builtin.template:
        src: templates/homesecurity/netalertx-app.conf.j2
        dest: "{{ homesecurity_install_dir }}/netalertx/app.conf"
        mode: "0644"
      register: netalertx_app_conf

    - name: Deploy homesecurity Docker Compose stack
      community.docker.docker_compose_v2:
        project_name: "{{ homesecurity_compose_project }}"
        project_src: "{{ homesecurity_install_dir }}"
        state: present
        pull: always

    - name: Ensure Homepage Docker socket proxy is running
      community.docker.docker_container:
        name: homepage-docker-proxy
        image: "{{ docker_socket_proxy_image }}"
        state: started
        restart_policy: unless-stopped
        pull: true
        published_ports:
          - "{{ docker_socket_proxy_bind }}"
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock:ro
        env:
          CONTAINERS: "1"
          SERVICES: "0"
          TASKS: "0"
          POST: "0"

    - name: Restart NetAlertX when app.conf changes
      community.docker.docker_compose_v2:
        project_name: "{{ homesecurity_compose_project }}"
        project_src: "{{ homesecurity_install_dir }}"
        services:
          - netalertx
        state: restarted
      when: netalertx_app_conf.changed

    - name: Purge wmnet and docker devices from NetAlertX inventory
      ansible.builtin.command:
        cmd: >
          docker exec {{ homesecurity_compose_project }}-netalertx-1
          sqlite3 /data/db/app.db
          "DELETE FROM Devices WHERE devLastIP GLOB '172.16.*'
          OR devLastIP GLOB '172.17.*' OR devLastIP GLOB '172.18.*'; SELECT changes();"
      register: netalertx_purge_infra
      changed_when: netalertx_purge_infra.stdout | trim | int > 0

    - name: Wait for exporter endpoints
      ansible.builtin.uri:
        url: "{{ item }}"
        status_code: 200
      register: homesecurity_health
      until: homesecurity_health.status == 200
      retries: 12
      delay: 5
      loop:
        - http://127.0.0.1:9115/metrics
        - http://127.0.0.1:9427/metrics
        - http://127.0.0.1:9919/metrics
        - http://127.0.0.1:9798/metrics
