---
- name: Configure proxbridge CT passthrough on Proxmox
  hosts: proxmox
  become: true
  gather_facts: false
  vars:
    proxbridge_ct_id: 102
    scrutiny_devices:
      - device: /dev/sda
        type: sat
      - device: /dev/sdb
        type: sat
      - device: /dev/nvme0
        type: nvme

  handlers:
    - name: Restart proxbridge CT
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          if pct status {{ proxbridge_ct_id }} | grep -q 'status: running'; then
            pct reboot {{ proxbridge_ct_id }}
          else
            pct start {{ proxbridge_ct_id }}
          fi
          for attempt in {1..60}; do
            if pct exec {{ proxbridge_ct_id }} -- true >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for CT {{ proxbridge_ct_id }} after passthrough config change" >&2
          exit 1
        executable: /bin/bash

  tasks:
    - name: Read proxbridge CT config
      ansible.builtin.command: "pct config {{ proxbridge_ct_id }}"
      register: proxbridge_pct_config
      changed_when: false

    - name: Require proxbridge to be privileged for raw host disk access
      ansible.builtin.assert:
        that:
          - "'unprivileged: 1' not in proxbridge_pct_config.stdout"
        fail_msg: "CT {{ proxbridge_ct_id }} must be privileged for proxbridge disk telemetry; convert/recreate it before running this playbook."

    - name: Remove obsolete CAP_SYS_RAWIO block markers
      ansible.builtin.blockinfile:
        path: "/etc/pve/lxc/{{ proxbridge_ct_id }}.conf"
        marker: "# {mark} ANSIBLE MANAGED - retain sys_rawio"
        state: absent
        unsafe_writes: true

    - name: Retain CAP_SYS_RAWIO in proxbridge
      ansible.builtin.lineinfile:
        path: "/etc/pve/lxc/{{ proxbridge_ct_id }}.conf"
        regexp: '^lxc\.cap\.drop:'
        line: 'lxc.cap.drop:'
        unsafe_writes: true
      register: proxbridge_cap_config
      notify: Restart proxbridge CT

    - name: Configure proxbridge host mounts and device passthrough
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          ctid="{{ proxbridge_ct_id }}"
          before="$(pct config "$ctid")"

          pct set "$ctid" -features nesting=1,keyctl=1
          pct set "$ctid" -mp0 /proc,mp=/host/proc,ro=1
          pct set "$ctid" -mp1 /sys,mp=/host/sys,ro=1
          pct set "$ctid" -mp2 /,mp=/host/rootfs,ro=1
          pct set "$ctid" -mp3 /run/udev,mp=/run/udev,ro=1

          desired_devices=(
          {% for item in scrutiny_devices %}
            "{{ item.device }}"
          {% endfor %}
          )

          idx=0
          for device in "${desired_devices[@]}"; do
            pct set "$ctid" "-dev${idx}" "path=${device},uid=0,gid=0,mode=0660"
            idx=$((idx + 1))
          done

          while read -r key; do
            [ -z "$key" ] && continue
            key_idx="${key#dev}"
            if [ "$key_idx" -ge "$idx" ]; then
              pct set "$ctid" -delete "$key"
            fi
          done < <(pct config "$ctid" | awk -F: '/^dev[0-9]+:/ { print $1 }')

          after="$(pct config "$ctid")"
          if [ "$before" != "$after" ]; then
            echo "PROXBRIDGE_CT_CONFIG_CHANGED=1"
          else
            echo "PROXBRIDGE_CT_CONFIG_CHANGED=0"
          fi
        executable: /bin/bash
      register: proxbridge_ct_config
      changed_when: "'PROXBRIDGE_CT_CONFIG_CHANGED=1' in proxbridge_ct_config.stdout"
      notify: Restart proxbridge CT

- name: Install proxbridge disk telemetry collectors
  hosts: lxc_proxbridge
  become: true
  gather_facts: false
  vars_files:
    - vars/versions.yaml
  vars:
    ssh_pubkey_ed25519: "{{ lookup('file', '~/.ssh/id_ed25519_homelab.pub') }}"
    scrutiny_api_endpoint: "https://scrutiny.trusted.nirmalhk7.com"
    scrutiny_api_host: scrutiny.trusted.nirmalhk7.com
    scrutiny_api_host_ip: 172.16.0.101
    scrutiny_host_id: milano
    scrutiny_devices:
      - device: /dev/sda
        type: sat
      - device: /dev/sdb
        type: sat
      - device: /dev/nvme0
        type: nvme

  handlers:
    - name: Restart node exporter
      ansible.builtin.systemd:
        daemon_reload: true
        name: node_exporter
        state: restarted
        enabled: true

    - name: Restart smartctl exporter
      ansible.builtin.systemd:
        daemon_reload: true
        name: smartctl_exporter
        state: restarted
        enabled: true

    - name: Run scrutiny collector once
      ansible.builtin.systemd:
        daemon_reload: true
        name: scrutiny-collector.service
        state: started

  tasks:
    - name: Wait for proxbridge SSH after CT passthrough changes
      ansible.builtin.wait_for_connection:
        timeout: 300
      when:
        - (hostvars[groups['proxmox'][0]].proxbridge_ct_config is changed)
          or (hostvars[groups['proxmox'][0]].proxbridge_cap_config is changed)

    - name: Apply SSH hardening to proxbridge
      ansible.builtin.include_role:
        name: ssh-hardening
      tags: [ssh]

    - name: Ensure telemetry base packages are installed
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        name:
          - ca-certificates
          - curl
          - gnupg
          - jq
          - libcap2-bin
          - smartmontools
          - tar

    - name: Require CAP_SYS_RAWIO in proxbridge
      ansible.builtin.command: capsh --has-p=cap_sys_rawio
      changed_when: false

    - name: Validate proxbridge Scrutiny disks
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          set +e
          smart_json="$(smartctl -d {{ item.type | quote }} -a -j {{ item.device | quote }})"
          smartctl_rc=$?
          set -e
          if (( smartctl_rc & 3 )); then
            echo "smartctl could not query {{ item.device }} as {{ item.type }} (rc=$smartctl_rc)" >&2
            exit "$smartctl_rc"
          fi
          jq -e '
            ((.model_name // .model_family // .product) | type == "string" and length > 0)
            and (.serial_number | type == "string" and length > 0)
            and (.user_capacity.bytes | type == "number" and . > 0)
            and (.smart_status.passed | type == "boolean")
          ' <<<"$smart_json" >/dev/null
        executable: /bin/bash
      loop: "{{ scrutiny_devices }}"
      loop_control:
        label: "{{ item.device }} ({{ item.type }})"
      changed_when: false

    - name: Download node_exporter
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        mode: '0644'

    - name: Unarchive node_exporter
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp
        remote_src: true

    - name: Install node_exporter binary
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        owner: root
        group: root
        mode: '0755'
        remote_src: true
      notify: Restart node exporter

    - name: Install systemd unit for host disk node_exporter
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Prometheus node_exporter for proxbridge host disk metrics
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=root
          Group=root
          ExecStart=/usr/local/bin/node_exporter \
            --web.listen-address=:9100 \
            --path.procfs=/host/proc \
            --path.sysfs=/host/sys \
            --path.rootfs=/host/rootfs \
            --collector.disable-defaults \
            --collector.diskstats \
            --collector.filesystem
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
      notify: Restart node exporter

    - name: Ensure host disk node_exporter is running
      ansible.builtin.systemd:
        daemon_reload: true
        name: node_exporter
        state: started
        enabled: true

    - name: Download smartctl_exporter
      ansible.builtin.get_url:
        url: "https://github.com/prometheus-community/smartctl_exporter/releases/download/v{{ smartctl_exporter_version }}/smartctl_exporter-{{ smartctl_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/smartctl_exporter-{{ smartctl_exporter_version }}.linux-amd64.tar.gz"
        mode: '0644'

    - name: Unarchive smartctl_exporter
      ansible.builtin.unarchive:
        src: "/tmp/smartctl_exporter-{{ smartctl_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp
        remote_src: true

    - name: Install smartctl_exporter binary
      ansible.builtin.copy:
        src: "/tmp/smartctl_exporter-{{ smartctl_exporter_version }}.linux-amd64/smartctl_exporter"
        dest: /usr/local/bin/smartctl_exporter
        owner: root
        group: root
        mode: '0755'
        remote_src: true
      notify: Restart smartctl exporter

    - name: Install systemd unit for smartctl_exporter
      ansible.builtin.copy:
        dest: /etc/systemd/system/smartctl_exporter.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Prometheus smartctl_exporter for proxbridge disks
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=root
          Group=root
          ExecStart=/usr/local/bin/smartctl_exporter --web.listen-address=:9633 --smartctl.path=/usr/sbin/smartctl
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
      notify: Restart smartctl exporter

    - name: Ensure smartctl_exporter is running
      ansible.builtin.systemd:
        daemon_reload: true
        name: smartctl_exporter
        state: started
        enabled: true

    - name: Ensure proxbridge Scrutiny directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /opt/scrutiny/bin
        - /opt/scrutiny/config

    - name: Route proxbridge Scrutiny API hostname to internal Nginx
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED - scrutiny api"
        block: |
          {{ scrutiny_api_host_ip }} {{ scrutiny_api_host }}
      notify: Run scrutiny collector once

    - name: Install proxbridge Scrutiny collector binary
      ansible.builtin.get_url:
        url: "https://github.com/AnalogJ/scrutiny/releases/download/{{ scrutiny_version }}/scrutiny-collector-metrics-linux-amd64"
        dest: /opt/scrutiny/bin/scrutiny-collector-metrics
        checksum: "sha256:{{ scrutiny_collector_metrics_linux_amd64_sha256 }}"
        owner: root
        group: root
        mode: '0755'
      notify: Run scrutiny collector once

    - name: Configure proxbridge Scrutiny collector
      ansible.builtin.copy:
        dest: /opt/scrutiny/config/collector.yaml
        owner: root
        group: root
        mode: '0644'
        content: |
          version: 1

          host:
            id: "{{ scrutiny_host_id }}"

          api:
            endpoint: "{{ scrutiny_api_endpoint }}"

          devices:
          {% for item in scrutiny_devices %}
            - device: {{ item.device }}
              type: {{ item.type }}
          {% endfor %}

          allow_listed_devices:
          {% for item in scrutiny_devices %}
            - {{ item.device }}
          {% endfor %}

          commands:
            metrics_smartctl_bin: /usr/sbin/smartctl
      notify: Run scrutiny collector once

    - name: Install proxbridge Scrutiny collector systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/scrutiny-collector.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Scrutiny collector for proxbridge disks
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          User=root
          Group=root
          ExecStart=/opt/scrutiny/bin/scrutiny-collector-metrics run --config /opt/scrutiny/config/collector.yaml --log-file /var/log/scrutiny-collector.log
      notify: Run scrutiny collector once

    - name: Install proxbridge Scrutiny collector systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/scrutiny-collector.timer
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Run proxbridge Scrutiny collector daily

          [Timer]
          OnCalendar=*-*-* 00:00:00
          Persistent=true
          RandomizedDelaySec=5m

          [Install]
          WantedBy=timers.target

    - name: Ensure proxbridge Scrutiny collector timer is enabled
      ansible.builtin.systemd:
        daemon_reload: true
        name: scrutiny-collector.timer
        state: started
        enabled: true

- name: Remove temporary Proxmox Scrutiny collector
  hosts: proxmox
  become: true
  gather_facts: false
  tasks:
    - name: Stop and disable temporary Proxmox Scrutiny collector units
      ansible.builtin.systemd:
        daemon_reload: true
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - scrutiny-collector.timer
        - scrutiny-collector.service
      failed_when: false

    - name: Remove temporary Proxmox Scrutiny API hosts entry
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED - scrutiny api"
        state: absent

    - name: Remove temporary Proxmox Scrutiny collector files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/scrutiny-collector.service
        - /etc/systemd/system/scrutiny-collector.timer
        - /opt/scrutiny
        - /var/log/scrutiny-collector.log

    - name: Reload Proxmox systemd after Scrutiny cleanup
      ansible.builtin.systemd:
        daemon_reload: true
