server:
  port: 9919

scanning:
  interval: 86400
  port_range: "22,80,443,8080,8443,5353,1883,5683,9999"
  max_cidr_size: 24
  disable_dns_resolution: true
  use_syn_scan: true
  worker_count: 3
  rate_limit: 30
  host_timeout: 300
  disable_host_discovery: true

# Skip Xfinity router (10.0.0.1) and Proxmox WiFi IP (10.0.0.10).
targets:
  - name: wifi-lan-low
    target: "10.0.0.2-10.0.0.9"
    port_range: "22,80,443,8080,8443,5353,1883,5683,9999"
    protocol: tcp
    interval: "24h"
  - name: wifi-lan-mid
    target: "10.0.0.11-10.0.0.153"
    port_range: "22,80,443,8080,8443,5353,1883,5683,9999"
    protocol: tcp
    interval: "24h"
  - name: wifi-lan-high
    target: "10.0.0.155-10.0.0.254"
    port_range: "22,80,443,8080,8443,5353,1883,5683,9999"
    protocol: tcp
    interval: "24h"
