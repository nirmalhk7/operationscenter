server:
  port: 9919

scanning:
  interval: 86400
  port_range: "22,80,443,8080,8443,5353,1883,5683,9999"
  max_cidr_size: 24
  disable_dns_resolution: true
  use_syn_scan: true
  worker_count: 3
  rate_limit: 30
  host_timeout: 300
  disable_host_discovery: true

# CIDR blocks covering 10.0.0.0/24 while skipping 10.0.0.1 and 10.0.0.10.
targets:
  - name: wifi-lan-2-3
    target: "10.0.0.2/31"
    port_range: "22,80,443,8080,8443,5353,1883,5683,9999"
    protocol: tcp
    interval: "24h"
  - name: wifi-lan-4-7
    target: "10.0.0.4/30"
