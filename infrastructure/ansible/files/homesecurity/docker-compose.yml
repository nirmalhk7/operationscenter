services:
  blackbox:
    image: prom/blackbox-exporter:v0.26.0
    restart: unless-stopped
    labels:
      homepage.group: Home Security
      homepage.name: Blackbox Exporter
      homepage.icon: prometheus
      homepage.description: HTTP and ICMP probe exporter
    cap_add:
      - NET_RAW
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  network_exporter:
    image: syepes/network_exporter:latest
    restart: unless-stopped
    labels:
      homepage.group: Home Security
      homepage.name: Network Exporter
      homepage.icon: mdi-network-outline
      homepage.description: LAN latency and packet loss exporter
    privileged: true
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - SYS_PTRACE
    sysctls:
      net.ipv4.ping_group_range: "0 65535"
    ports:
      - "9427:9427"
    volumes:
      - ./network_exporter/network_exporter.yml:/app/cfg/network_exporter.yml:ro

  openport:
    image: ghcr.io/renatogalera/openport-exporter:v0.3.0
    restart: unless-stopped
    labels:
      homepage.group: Home Security
      homepage.name: Open Port Exporter
      homepage.icon: mdi-door-open
      homepage.description: Port exposure exporter
    cap_add:
      - NET_RAW
    ports:
      - "9919:9919"
    volumes:
      - ./openport/config.yaml:/config.yaml:ro
    environment:
      CONFIG_PATH: /config.yaml

  speedtest:
    image: miguelndecarvalho/speedtest-exporter:v3.5.4
    restart: unless-stopped
    labels:
      homepage.group: Home Security
      homepage.name: Speedtest Exporter
      homepage.icon: mdi-speedometer
      homepage.description: Internet speed exporter
    ports:
      - "9798:9798"
    environment:
      SPEEDTEST_PORT: "9798"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9798/"]
      interval: 30s
      timeout: 10s
      retries: 5

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  netalertx:
    image: ghcr.io/jokob-sk/netalertx:latest
    restart: unless-stopped
    labels:
      homepage.group: Home Security
      homepage.name: NetAlertX
      homepage.icon: mdi-lan-connect
      homepage.href: https://sentinel.trusted.nirmalhk7.com
      homepage.description: Home WiFi device inventory and alerts
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    volumes:
      - netalertx_data:/data
      - ./netalertx/app.conf:/data/config/app.conf:ro
    environment:
      TZ: America/Denver
      PORT: "20211"

volumes:
  netalertx_data:
