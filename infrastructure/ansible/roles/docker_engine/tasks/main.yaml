---
- name: Ensure Docker apt prerequisites are installed
  ansible.builtin.apt:
    update_cache: true
    name:
      - ca-certificates
      - curl
    state: present

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "{{ docker_engine_repo | default('https://download.docker.com/linux/debian') }}/gpg"
    dest: "{{ docker_engine_gpg | default('/etc/apt/keyrings/docker.asc') }}"
    mode: '0644'

- name: Get dpkg architecture
  ansible.builtin.command: dpkg --print-architecture
  register: docker_engine_dpkg_arch
  changed_when: false

- name: Configure Docker apt repository
  ansible.builtin.copy:
    dest: "{{ docker_engine_repo_list | default('/etc/apt/sources.list.d/docker.list') }}"
    mode: '0644'
    content: |
      deb [arch={{ docker_engine_dpkg_arch.stdout }} signed-by={{ docker_engine_gpg | default('/etc/apt/keyrings/docker.asc') }}] {{ docker_engine_repo | default('https://download.docker.com/linux/debian') }} {{ ansible_lsb.codename | default('bookworm') }} stable

- name: Install Docker engine packages
  ansible.builtin.apt:
    name: "{{ docker_engine_packages }}"
    update_cache: true
    state: present
