---
- name: Install Docker stack on k8docker VM
  hosts: vm_k8docker
  become: true
  gather_facts: true

  vars_files:
    - vars/versions.yaml

  vars:
    k8docker_mariadb_login_password: "{{ k8docker_db_passwords.mariadb.root }}"
    k8docker_postgres_login_password: "{{ k8docker_db_passwords.postgres.bootstrap }}"
    k8docker_postgres_root_login_password: "{{ k8docker_db_passwords.postgres.root }}"
    k8docker_clickhouse_login_password: "{{ k8docker_db_passwords.clickhouse.root }}"
    k8docker_mongodb_login_password: "{{ lookup('env', 'MONGODB_ROOT_PASSWORD') | default(k8docker_db_passwords.mongodb.root, true) }}"

  tasks:
    - name: Ensure DB management dependencies are installed
      ansible.builtin.apt:
        update_cache: true
        name: [python3-pymysql, python3-psycopg2, python3-pymongo, python3-clickhouse-driver]

    - name: Validate k8docker DB configuration
      ansible.builtin.import_tasks: tasks/k8docker/validate-vars.yaml

    - name: Ensure Docker engine is installed at requested versions
      ansible.builtin.include_role:
        name: docker_engine
      vars:
        docker_engine_packages:
          - "docker-ce={{ docker_ce_version }}"
          - "docker-ce-cli={{ docker_ce_version }}"
          - "containerd.io={{ containerd_version }}"
          - "docker-buildx-plugin={{ docker_buildx_plugin_version }}"
          - "docker-compose-plugin={{ docker_compose_plugin_version }}"
      tags: [docker_setup]

    - name: Container setup - collecting artifacts
      tags: [setup]
      block:
        - name: Ensure artifacts directory exists
          ansible.builtin.file:
            path: /root/operationscenter-artifacts
            state: directory
            mode: '0755'

    - name: k8docker host monitoring
      tags: monitoring
      ansible.builtin.import_tasks: tasks/k8docker/monitoring.yaml

    - name: MariaDB deployment
      tags: mariadb
      ansible.builtin.import_tasks: tasks/k8docker/mariadb.yaml

    - name: VectorChord deployment
      tags: vectorchord
      ansible.builtin.import_tasks: tasks/k8docker/postgres.yaml

    - name: ClickHouse deployment
      tags: clickhouse
      ansible.builtin.import_tasks: tasks/k8docker/clickhouse.yaml

    - name: MongoDB deployment
      tags: mongodb
      ansible.builtin.import_tasks: tasks/k8docker/mongodb.yaml

    - name: Refresh k8docker DB metrics after deployment
      ansible.builtin.command: /usr/local/bin/k8docker-db-metrics
      changed_when: false

    - name: Ensure Homepage Docker socket proxy is running
      community.docker.docker_container:
        name: homepage-docker-proxy
        image: "{{ docker_socket_proxy_image }}"
        state: started
        restart_policy: unless-stopped
        pull: true
        published_ports:
          - "{{ docker_socket_proxy_bind }}"
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock:ro
        env:
          CONTAINERS: "1"
          SERVICES: "0"
          TASKS: "0"
          POST: "0"

  handlers:
    - name: Restart k8docker node exporter
      ansible.builtin.systemd:
        daemon_reload: true
        name: node_exporter
        state: restarted
        enabled: true

    - name: Refresh k8docker DB metrics
      ansible.builtin.command: /usr/local/bin/k8docker-db-metrics
