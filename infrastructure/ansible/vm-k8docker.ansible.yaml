---
- name: Install Docker stack on k8docker VM
  hosts: vm_k8docker
  become: true
  gather_facts: true

  vars_files:
    - vars/versions.yaml

  vars:
    docker_repo: "https://download.docker.com/linux/debian"
    docker_gpg: "/etc/apt/keyrings/docker.asc"
    repo_list: "/etc/apt/sources.list.d/docker.list"
    clickhouse_password: "{{ lookup('env', 'CLICKHOUSE_PASSWORD') }}"
    clickhouse_password_xml: /root/operationscenter-artifacts/langfuse-clickhouse-default-password.xml
    clickhouse_db_name: langfuse
    mariadb_root_password: "{{ lookup('env', 'MARIADB_ROOT_PASSWORD') }}"
    mariadb_rw_password: "{{ lookup('env', 'MARIADB_RW_PASSWORD') }}"
    mariadb_db_names: [nextcloud, gitea, sonarqube, bugsink, authelia, pterodactyl, appwrite]
    vectorchord_pg_password: "{{ lookup('env', 'VECTORCHORD_PG_PASSWORD') }}" 
    vectorchord_image: "tensorchord/vchord-postgres:pg17-v0.4.3"
    vectorchord_db_names: [immich, authentik, sonarqube, outline, n8n, langfuse]
    mongodb_root_password: "{{ lookup('env', 'MONGODB_ROOT_PASSWORD') }}"
    mongodb_db_names: []
    docker_socket_proxy_bind: "172.16.0.106:2375:2375"
    # External access via nginx stream proxy (db.trusted.nirmalhk7.com:<port>)
    db_proxy_hostname: db.trusted.nirmalhk7.com
    db_proxy_ports:
      mariadb: 3306
      postgresql: 5432
      mongodb: 27017

  tasks:
    - name: Check if docker is installed
      ansible.builtin.stat:
        path: /usr/bin/docker
      register: docker_bin

    - name: Ensure DB management dependencies are installed
      ansible.builtin.apt:
        update_cache: true
        name: [python3-pymysql, python3-psycopg2, python3-pymongo, python3-clickhouse-driver]

    - name: Docker setup
      block:
        - name: Ensure base deps
          ansible.builtin.apt:
            update_cache: true
            name: [ca-certificates, curl]

        - name: Ensure keyrings directory exists
          ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: '0755'

        - name: Download Docker GPG key
          ansible.builtin.get_url:
            url: "{{ docker_repo }}/gpg"
            dest: "{{ docker_gpg }}"
            mode: '0644'

        - name: Get dpkg architecture
          ansible.builtin.command: dpkg --print-architecture
          register: dpkg_arch
          changed_when: false

        - name: Add Docker apt repository
          ansible.builtin.copy:
            dest: "{{ repo_list }}"
            mode: '0644'
            content: |
              deb [arch={{ dpkg_arch.stdout }} signed-by={{ docker_gpg }}] {{ docker_repo }} {{ ansible_lsb.codename | default('bookworm') }} stable

        - name: Install Docker packages at requested versions
          ansible.builtin.apt:
            name:
              - "docker-ce={{ docker_ce_version }}"
              - "docker-ce-cli={{ docker_ce_version }}"
              - "containerd.io={{ containerd_version }}"
              - "docker-buildx-plugin={{ docker_buildx_plugin_version }}"
              - "docker-compose-plugin={{ docker_compose_plugin_version }}"
            update_cache: true
      when: not docker_bin.stat.exists
      tags: [docker_setup]

    - name: Container setup - collecting artifacts
      tags: [setup]
      block:
        - name: Ensure artifacts directory exists
          ansible.builtin.file:
            path: /root/operationscenter-artifacts
            state: directory
            mode: '0755'

        - name: Render ClickHouse password XML on the host
          ansible.builtin.copy:
            dest: "{{ clickhouse_password_xml }}"
            mode: '0644'
            content: |
              <clickhouse>
                <users>
                  <default remove="remove">
                  </default>
                  <default>
                    <password_sha256_hex>{{ clickhouse_password | hash('sha256') }}</password_sha256_hex>
                    <networks>
                      <ip>127.0.0.1</ip>
                      <ip>::1</ip>
                      <ip>172.16.0.0/24</ip>
                    </networks>
                    <profile>default</profile>
                    <quota>default</quota>
                  </default>
                </users>
              </clickhouse>

    - name: Perform docker deployments
      tags: [deployments]
      block:
        - name: MariaDB deployment
          tags: mariadb
          block:
            - name: Ensure MariaDB container is running
              community.docker.docker_container:
                name: maria
                image: mariadb:12
                state: started
                restart_policy: unless-stopped
                # External: db.trusted.nirmalhk7.com:3306 via nginx stream proxy
                published_ports:
                  - "3306:3306"
                labels:
                  homepage.group: Containers
                  homepage.name: MariaDB
                  homepage.icon: mariadb
                  homepage.description: Shared MariaDB backend
                volumes:
                  - mariadb_data:/var/lib/mysql
                env:
                  MARIADB_ROOT_PASSWORD: "{{ mariadb_root_password }}"
                healthcheck:
                  test: ["CMD", "mariadb-admin", "ping", "-uroot", "-p{{ mariadb_root_password }}"]
                  interval: 30s
                  timeout: 10s
                  retries: 5
            - name: Wait for MariaDB healthy
              ansible.builtin.shell: >
                {% raw %}docker inspect --format '{{.State.Health.Status}}' maria{% endraw %}
              register: maria_health
              retries: 20
              delay: 5
              until: maria_health.stdout == "healthy"
              changed_when: false

            - name: Create MariaDB databases
              community.mysql.mysql_db:
                name: "{{ item }}"
                state: present
                login_user: root
                login_password: "{{ mariadb_root_password }}"
                login_host: 127.0.0.1
              loop: "{{ mariadb_db_names }}"

            - name: Create MariaDB users
              community.mysql.mysql_user:
                name: "{{ item }}_rw"
                password: "{{ mariadb_rw_password }}"
                priv: "{{ item }}.*:ALL"
                host: "%"
                state: present
                login_user: root
                login_password: "{{ mariadb_root_password }}"
                login_host: 127.0.0.1
              loop: "{{ mariadb_db_names }}"

        - name: VectorChord deployment
          tags: vectorchord
          block:
            - name: Ensure VectorChord DB container is running
              community.docker.docker_container:
                name: vectorchorddb
                image: "{{ vectorchord_image }}"
                state: started
                restart_policy: unless-stopped
                # External: db.trusted.nirmalhk7.com:5432 via nginx stream proxy
                published_ports:
                  - "5432:5432"
                labels:
                  homepage.group: Containers
                  homepage.name: VectorChord Postgres
                  homepage.icon: postgres
                  homepage.description: Shared Postgres and vector database backend
                volumes:
                  - vectorchorddb_data:/var/lib/postgresql/data
                env:
                  POSTGRES_PASSWORD: "{{ vectorchord_pg_password }}"

            - name: Wait for VectorChord DB ready
              ansible.builtin.command: >
                docker exec vectorchorddb pg_isready -U postgres
              register: vchord_health
              retries: 20
              delay: 5
              until: vchord_health.rc == 0
              changed_when: false

            - name: Create VectorChord users
              community.postgresql.postgresql_user:
                name: "{{ item }}_rw"
                password: "{{ lookup('env', 'VECTORCHORD_RW_PASSWORD') }}"
                login_db: postgres
                state: present
                login_user: postgres
                login_password: "{{ vectorchord_pg_password }}"
                login_host: 127.0.0.1
              loop: "{{ vectorchord_db_names }}"

            - name: Create VectorChord databases
              community.postgresql.postgresql_db:
                name: "{{ item }}"
                state: present
                login_user: postgres
                login_password: "{{ vectorchord_pg_password }}"
                login_host: 127.0.0.1
                owner: "{{ item }}_rw"
              loop: "{{ vectorchord_db_names }}"

            - name: Install VectorChord extensions
              community.postgresql.postgresql_ext:
                name: "{{ item.1 }}"
                db: "{{ item.0 }}"
                cascade: yes
                login_user: postgres
                login_password: "{{ vectorchord_pg_password }}"
                login_host: 127.0.0.1
              loop: "{{ vectorchord_db_names | product(['vchord', 'earthdistance']) | list }}"
              when: item.0 == 'immich'

        - name: ClickHouse deployment
          tags: clickhouse
          block:
            - name: Ensure ClickHouse container is running
              community.docker.docker_container:
                name: langfuse-clickhouse
                image: "clickhouse/clickhouse-server:{{ clickhouse_server_version }}"
                state: started
                restart_policy: unless-stopped
                # External: 172.16.0.106:9000 for Langfuse and clickhouse-driver modules
                published_ports:
                  - "8123:8123"
                  - "9000:9000"
                labels:
                  homepage.group: Containers
                  homepage.name: ClickHouse
                  homepage.icon: clickhouse
                  homepage.description: Langfuse analytics database
                volumes:
                  - langfuse_clickhouse_data:/var/lib/clickhouse
                  - "{{ clickhouse_password_xml }}:/etc/clickhouse-server/users.d/default-password.xml:ro"
                env:
                  CLICKHOUSE_SKIP_USER_SETUP: "1"
                  CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
                healthcheck:
                  test:
                    - CMD
                    - clickhouse-client
                    - --user
                    - default
                    - --password
                    - "{{ clickhouse_password }}"
                    - --query
                    - SELECT 1
                  interval: 30s
                  timeout: 10s
                  retries: 10

            - name: Wait for ClickHouse healthy
              ansible.builtin.shell: >
                {% raw %}docker inspect --format '{{.State.Health.Status}}' langfuse-clickhouse{% endraw %}
              register: clickhouse_health
              retries: 20
              delay: 5
              until: clickhouse_health.stdout == "healthy"
              changed_when: false

            - name: Ensure Langfuse ClickHouse database exists
              community.clickhouse.clickhouse_db:
                login_host: 172.16.0.106
                login_port: 9000
                login_user: default
                login_password: "{{ clickhouse_password }}"
                login_db: default
                name: "{{ clickhouse_db_name }}"
                state: present

        - name: MongoDB deployment
          tags: mongodb
          block:
            - name: Ensure MongoDB container is running
              community.docker.docker_container:
                name: mongo
                image: mongo:4.4
                state: started
                restart_policy: unless-stopped
                # External: db.trusted.nirmalhk7.com:27017 via nginx stream proxy
                published_ports:
                  - "27017:27017"
                labels:
                  homepage.group: Containers
                  homepage.name: MongoDB
                  homepage.icon: mongodb
                  homepage.description: Shared MongoDB backend
                volumes:
                  - mongodb_data:/data/db
                env:
                  MONGO_INITDB_ROOT_USERNAME: root
                  MONGO_INITDB_ROOT_PASSWORD: "{{ mongodb_root_password }}"
                healthcheck:
                  test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
                  interval: 30s
                  timeout: 10s
                  retries: 5

            - name: Wait for MongoDB healthy
              ansible.builtin.shell: >
                {% raw %}docker inspect --format '{{.State.Health.Status}}' mongo{% endraw %}
              register: mongo_health
              retries: 20
              delay: 5
              until: mongo_health.stdout == "healthy"
              changed_when: false

            - name: Create MongoDB application users
              community.mongodb.mongodb_user:
                database: "{{ item }}"
                name: "{{ item }}_rw"
                password: "{{ mariadb_rw_password }}"
                roles: readWrite
                state: present
                login_user: root
                login_password: "{{ mongodb_root_password }}"
                login_host: 127.0.0.1
                login_port: 27017
              loop: "{{ mongodb_db_names }}"

    - name: Ensure Homepage Docker socket proxy is running
      community.docker.docker_container:
        name: homepage-docker-proxy
        image: "{{ docker_socket_proxy_image }}"
        state: started
        restart_policy: unless-stopped
        pull: true
        published_ports:
          - "{{ docker_socket_proxy_bind }}"
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock:ro
        env:
          CONTAINERS: "1"
          SERVICES: "0"
          TASKS: "0"
          POST: "0"
