---
- name: Provision nginx LXC via Proxmox jump
  hosts: lxc_nginx
  become: true
  gather_facts: false
  vars_files:
    - vars/versions.yaml
  vars:
    certbot_certs: true
    certbot_cron: false
    certbot_email: "{{ lookup('env', 'CERTBOT_EMAIL') }}"
    cloudflare_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"
    cloudflared_tunnel_token: "{{ lookup('env', 'CLOUDFLARED_TUNNEL_TOKEN') }}"
    cert_path: /etc/letsencrypt/live/trusted.nirmalhk7.com/fullchain.pem

  pre_tasks:
    - name: Ensure gpg is installed (for apt_key)
      ansible.builtin.apt:
        name: gnupg
        state: present

    - name: Add Nginx signing key
      ansible.builtin.apt_key:
        url: https://nginx.org/keys/nginx_signing.key
        state: present

    - name: Add official nginx.org apt repository
      ansible.builtin.apt_repository:
        repo: "deb http://nginx.org/packages/debian bookworm nginx"
        filename: nginx
        state: present

    - name: Guard Cloudflare token when certs enabled
      ansible.builtin.fail:
        msg: "Set cloudflare_api_token when certbot_certs=true"
      when: certbot_certs and (cloudflare_api_token | length == 0)

    - name: Guard Certbot email when certs enabled
      ansible.builtin.fail:
        msg: "Set certbot_email (or export CERTBOT_EMAIL) when certbot_certs=true"
      when: certbot_certs and (certbot_email | length == 0)

  tasks:
  
    - name: Ensure base packages
      ansible.builtin.apt:
        cache_valid_time: 3600
        pkg: 
        - curl
        - wget
        - tar
        - ca-certificates

    - name: Ensure Nginx is installed at requested version
      ansible.builtin.apt:
        allow_unauthenticated: true
        update_cache: true
        name: "nginx={{ nginx_package_version }}"

    - name: cloudflared_setup
      block:
        - name: Download cloudflared Debian package
          ansible.builtin.get_url:
            url: "https://github.com/cloudflare/cloudflared/releases/download/{{ cloudflared_version }}/cloudflared-linux-amd64.deb"
            dest: "/tmp/cloudflared-{{ cloudflared_version }}-linux-amd64.deb"
            mode: '0644'

        - name: Install cloudflared
          ansible.builtin.apt:
            deb: "/tmp/cloudflared-{{ cloudflared_version }}-linux-amd64.deb"

        - name: Ensure cloudflared user exists
          ansible.builtin.user:
            name: cloudflared
            shell: /usr/sbin/nologin
            system: true
            state: present

        - name: Ensure cloudflared directories exist
          ansible.builtin.file:
            path: "{{ item.path }}"
            state: directory
            owner: "{{ item.owner }}"
            group: "{{ item.group }}"
            mode: "{{ item.mode }}"
          loop:
            - { path: /etc/cloudflared, owner: root, group: cloudflared, mode: '0750' }
            - { path: /var/log/cloudflared, owner: cloudflared, group: cloudflared, mode: '0750' }

        - name: Write cloudflared tunnel environment
          ansible.builtin.copy:
            dest: /etc/default/cloudflared
            content: "TUNNEL_TOKEN={{ cloudflared_tunnel_token }}\n"
            owner: root
            group: cloudflared
            mode: '0640'
          no_log: true
          when: cloudflared_tunnel_token | length > 0

        - name: Install cloudflared systemd unit
          ansible.builtin.template:
            src: cloudflared.service.j2
            dest: /etc/systemd/system/cloudflared.service
            owner: root
            group: root
            mode: '0644'

        - name: Enable cloudflared when tunnel token is present
          ansible.builtin.systemd:
            daemon_reload: true
            name: cloudflared
            state: started
            enabled: true
          when: cloudflared_tunnel_token | length > 0

        - name: Stop cloudflared when tunnel token is absent
          ansible.builtin.systemd:
            daemon_reload: true
            name: cloudflared
            state: stopped
            enabled: false
          failed_when: false
          when: cloudflared_tunnel_token | length == 0
      tags: [cloudflared_setup]

    - name: cloudflare_setup
      block:
        - name: Install certbot with DNS plugin
          ansible.builtin.apt:
            name: [certbot, python3-certbot-dns-cloudflare]
            state: present

        - name: Ensure Cloudflare secrets directory exists
          ansible.builtin.file:
            path: /root/.secrets/certbot
            state: directory
            owner: root
            group: root
            mode: '0700'

        - name: Write Cloudflare credentials
          ansible.builtin.copy:
            dest: /root/.secrets/certbot/cloudflare.ini
            content: "dns_cloudflare_api_token = {{ cloudflare_api_token }}\n"
            owner: root
            group: root
            mode: '0600'

      when: certbot_certs
      tags: [cloudflare_setup]

    - name: ssl_cert_setup
      block:
        - name: Check if certificate exists
          ansible.builtin.stat:
            path: "{{ cert_path }}"
          register: cert_stat

        - name: Check certificate expiry (grace 30d)
          ansible.builtin.command: >
            openssl x509 -checkend 2592000 -noout -in "{{ cert_path }}"
          register: cert_expiry_check
          failed_when: false
          changed_when: false
          when: cert_stat.stat.exists

        - name: Obtain or renew certificate
          ansible.builtin.command: >
            certbot certonly --non-interactive --agree-tos --no-eff-email --email "{{ certbot_email }}" \
            --dns-cloudflare --dns-cloudflare-credentials /root/.secrets/certbot/cloudflare.ini \
            --dns-cloudflare-propagation-seconds 60 -d "*.trusted.nirmalhk7.com" -d "trusted.nirmalhk7.com"
          timeout: 300
          register: certbot_result
          changed_when: "'Certificate not yet due for renewal' not in certbot_result.stderr"
          when: (not cert_stat.stat.exists) or (cert_expiry_check.rc | default(1) != 0)

        - name: Show certbot output
          ansible.builtin.debug:
            msg:
              - "stdout: {{ certbot_result.stdout | default('') }}"
              - "stderr: {{ certbot_result.stderr | default('') }}"
          when: certbot_result is defined

        - name: Install certbot cron job
          ansible.builtin.cron:
            name: certbot_renew
            minute: "0"
            hour: "3"
            user: root
            job: "certbot renew --quiet --post-hook 'systemctl reload nginx'"
          when: certbot_cron
      when: certbot_certs
      tags: [ssl_cert_setup]

    - name: nginx_setup
      block:
        - name: Deploy nginx config
          block:
            - name: Deploy nginx conf.d
              ansible.builtin.copy:
                src: "{{ playbook_dir }}/../../nginx/conf.d/"
                dest: /etc/nginx/conf.d/
                owner: root
                group: root
                mode: '0644'
                directory_mode: '0755'
            - name: Deploy nginx stream.d
              ansible.builtin.copy:
                src: "{{ playbook_dir }}/../../nginx/stream.d/"
                dest: /etc/nginx/stream.d/
                owner: root
                group: root
                mode: '0644'
                directory_mode: '0755'
            - name: Deploy nginx mainconf
              ansible.builtin.copy:
                src: "{{ playbook_dir }}/../../nginx/nginx.conf"
                dest: /etc/nginx/nginx.conf
                owner: root
                group: root
                mode: '0644'
                directory_mode: '0755'

        - name: Restart nginx
          ansible.builtin.systemd:
            name: nginx
            state: restarted
            enabled: true

      when: true
      tags: [nginx_setup]
      
    - name: nginx-prometheus-exporter setup
      block:
      - name: Download nginx-prometheus-exporter
        ansible.builtin.get_url:
          url: "https://github.com/nginx/nginx-prometheus-exporter/releases/download/v{{ nginx_exporter_version }}/nginx-prometheus-exporter_{{ nginx_exporter_version }}_linux_amd64.tar.gz"
          dest: /tmp/nginx-prometheus-exporter.tar.gz
          mode: '0644'

      - name: Unarchive nginx-prometheus-exporter
        ansible.builtin.unarchive:
          src: /tmp/nginx-prometheus-exporter.tar.gz
          dest: /tmp
          remote_src: true

      - name: Install exporter binary
        ansible.builtin.copy:
          src: /tmp/nginx-prometheus-exporter
          dest: /usr/local/bin/nginx-prometheus-exporter
          owner: root
          group: root
          mode: '0755'
          remote_src: true

      - name: Ensure exporter user exists
        ansible.builtin.user:
          name: nginx-prometheus-exporter
          shell: /usr/sbin/nologin
          system: true
          state: present

      - name: Install systemd unit for exporter
        ansible.builtin.template:
          src: nginx-prometheus-exporter.service.j2
          dest: /etc/systemd/system/nginx-prometheus-exporter.service
          owner: root
          group: root
          mode: '0644'

      - name: Reload systemd and enable exporter
        ansible.builtin.systemd:
          daemon_reload: true
          name: nginx-prometheus-exporter
          state: started
          enabled: true
