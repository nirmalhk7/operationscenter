---
- name: Operations Center Host Setup
  hosts: proxmox
  become: true
  vars_files:
    - vars/versions.yaml
    - vars/network.yaml
  vars:
    homelab_path: /root/operationscenter
    tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTHKEY') | default('', true) }}"
    ssh_pubkey_ed25519: "{{ lookup('file', '~/.ssh/id_ed25519_homelab.pub') }}"
    tailscale_args: "{{ lookup('env', 'TAILSCALE_ARGS') if lookup('env', 'TAILSCALE_ARGS') else '--ssh' }}"
    homepage_proxmox_password: "{{ lookup('env', 'HOMEPAGE_PROXMOX_PASSWORD') | default('', true) }}"
    proxmox_oidc_client_secret: "{{ lookup('env', 'PROXMOX_OIDC_CLIENT_SECRET') | default('', true) }}"
    wifi_psk: "{{ lookup('env', 'PROXMOX_WIFI_PSK') | default('', true) }}"
    proxmox_oidc_realm: authelia
    proxmox_oidc_issuer_url: https://secure.trusted.nirmalhk7.com
    proxmox_oidc_admin_user: nirmalhk7@gmail.com@authelia

  tasks:
    - name: Routine package update/ basic setup
      tags: [packages]
      block:
      - name: Update apt cache and upgrade packages
        ansible.builtin.apt:
          update_cache: true
          cache_valid_time: 3600
          upgrade: safe
      - name: SSH hardening for Proxmox host
        ansible.builtin.include_role:
          name: ssh-hardening
        tags: [ssh]

    - name: Networking configuration
      tags: hostconf
      block:
        - name: Create operations center networking directory
          ansible.builtin.file:
            path: "{{ homelab_path }}/networking"
            state: directory
            mode: '0755'

        - name: Deploy iptables scripts to networking directory
          ansible.builtin.copy:
            src: "../assets/{{ item }}"
            dest: "{{ homelab_path }}/networking/{{ item }}"
            mode: '0755'
          loop:
            - iptables-up.sh
            - iptables-down.sh

        - name: Enable IPv4 forwarding for Tailscale
          ansible.posix.sysctl:
            name: net.ipv4.ip_forward
            value: '1'
            state: present
            reload: true

        - name: Require Proxmox Wi-Fi PSK
          ansible.builtin.assert:
            that:
              - wifi_psk | length > 0
            fail_msg: "Set PROXMOX_WIFI_PSK before applying host Wi-Fi configuration"
          no_log: true

        - name: Ensure Proxmox Wi-Fi packages are installed
          ansible.builtin.apt:
            name:
              - pve-firmware
              - wpasupplicant
              - iw
            state: present

        - name: Check whether Wi-Fi config exists
          ansible.builtin.stat:
            path: /etc/wpa_supplicant/wpa_supplicant.conf
          register: wifi_config_stat

        - name: Create Wi-Fi config when missing
          ansible.builtin.template:
            src: wpa_supplicant.conf.j2
            dest: /etc/wpa_supplicant/wpa_supplicant.conf
            owner: root
            group: root
            mode: '0600'
          when: not wifi_config_stat.stat.exists
          register: wifi_config_render
          no_log: true

        - name: Update Wi-Fi config with backup when it already exists
          ansible.builtin.template:
            src: wpa_supplicant.conf.j2
            dest: /etc/wpa_supplicant/wpa_supplicant.conf
            owner: root
            group: root
            mode: '0600'
            backup: true
          when: wifi_config_stat.stat.exists
          register: wifi_config_update
          no_log: true

        - name: Check whether Wi-Fi systemd unit exists
          ansible.builtin.stat:
            path: /etc/systemd/system/wpa_supplicant.service
          register: wifi_unit_stat

        - name: Create Wi-Fi systemd unit when missing
          ansible.builtin.template:
            src: wpa_supplicant.service.j2
            dest: /etc/systemd/system/wpa_supplicant.service
            owner: root
            group: root
            mode: '0644'
          when: not wifi_unit_stat.stat.exists
          register: wifi_unit_render

        - name: Update Wi-Fi systemd unit with backup when it already exists
          ansible.builtin.template:
            src: wpa_supplicant.service.j2
            dest: /etc/systemd/system/wpa_supplicant.service
            owner: root
            group: root
            mode: '0644'
            backup: true
          when: wifi_unit_stat.stat.exists
          register: wifi_unit_update

        - name: Ensure Wi-Fi systemd unit is enabled and running
          ansible.builtin.systemd:
            name: wpa_supplicant.service
            enabled: true
            daemon_reload: "{{ (wifi_unit_render.changed | default(false)) or (wifi_unit_update.changed | default(false)) }}"
            state: >-
              {{
                'restarted'
                if (wifi_config_render.changed | default(false))
                or (wifi_config_update.changed | default(false))
                or (wifi_unit_render.changed | default(false))
                or (wifi_unit_update.changed | default(false))
                else 'started'
              }}

        - name: Check whether interface config exists
          ansible.builtin.stat:
            path: /etc/network/interfaces
          register: network_interfaces_stat

        - name: Read current interface config
          ansible.builtin.slurp:
            path: /etc/network/interfaces
          when: network_interfaces_stat.stat.exists
          register: network_interfaces_slurp

        - name: Detect whether legacy unmanaged Wi-Fi interface cleanup is needed
          ansible.builtin.set_fact:
            wifi_interface_cleanup_needed: >-
              {{
                ('# BEGIN ANSIBLE MANAGED - wmnet bridge' not in (network_interfaces_slurp.content | b64decode))
                or (((network_interfaces_slurp.content | b64decode) | regex_findall('(?m)^auto ' ~ wifi_iface ~ '$') | length) > 1)
                or (((network_interfaces_slurp.content | b64decode) | regex_findall('(?m)^iface ' ~ wifi_iface ~ ' inet static$') | length) > 1)
              }}
          when:
            - network_interfaces_stat.stat.exists
            - network_interfaces_slurp.content is defined

        - name: Remove legacy unmanaged Wi-Fi stanzas before managing the interface
          ansible.builtin.replace:
            path: /etc/network/interfaces
            regexp: '(?ms)^auto {{ wifi_iface }}\niface {{ wifi_iface }} inet static\n(?:[ \t].*\n|#.*\n|\n)*'
            replace: ''
            backup: true
          when:
            - network_interfaces_stat.stat.exists
            - wifi_interface_cleanup_needed | default(false)
          register: wifi_interface_cleanup

        - name: Configure wmnet bridge interface
          ansible.builtin.blockinfile:
            path: /etc/network/interfaces
            backup: true
            marker: "# {mark} ANSIBLE MANAGED - wmnet bridge"
            block: |

              auto {{ wifi_iface }}
              iface {{ wifi_iface }} inet static
                      address {{ host_ip }}/24
                      gateway {{ wifi_gateway }}
              #Machine to Wifi interface. CRITICAL DO NOT REMOVE
              
              auto wmnet
              iface wmnet inet static
                  address 172.16.0.1/24
                  bridge-ports none
                  bridge-stp off
                  bridge-fd 0
                  post-up HOST_IP={{ host_ip }} INT_SUBNET={{ int_subnet }} NGINX_IP={{ nginx_ip }} K8S_IP={{ k8s_ip }} NFS_IP={{ nfs_ip }} VPN_IP={{ vpn_ip }} WAN_IFACE={{ wan_iface }} LAN_IFACE={{ lan_iface }} VPN_IFACE={{ vpn_iface }} {{ homelab_path }}/networking/iptables-up.sh
                  post-down HOST_IP={{ host_ip }} INT_SUBNET={{ int_subnet }} NGINX_IP={{ nginx_ip }} K8S_IP={{ k8s_ip }} NFS_IP={{ nfs_ip }} VPN_IP={{ vpn_ip }} WAN_IFACE={{ wan_iface }} LAN_IFACE={{ lan_iface }} VPN_IFACE={{ vpn_iface }} {{ homelab_path }}/networking/iptables-down.sh
          register: managed_network_interfaces

        - name: Reload network configuration
          ansible.builtin.command: ifreload -a
          when: (wifi_interface_cleanup.changed | default(false)) or managed_network_interfaces.changed
          
    - name: Single node Proxmox configuration
      tags: singlenode
      block:
        - name: Disable HA services (not needed for single node)
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: stopped
            enabled: false
          loop:
            - pve-ha-lrm
            - pve-ha-crm
            - corosync

        - name: Disable enterprise repository (unless subscribed)
          ansible.builtin.file:
            path: /etc/apt/sources.list.d/pve-enterprise.list
            state: absent

        - name: Add Proxmox no-subscription repository
          ansible.builtin.apt_repository:
            repo: "deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription"
            filename: pve-no-subscription
            state: present

        - name: Backup proxmoxlib.js
          ansible.builtin.copy:
            src: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
            dest: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js.bak
            remote_src: true
            force: false

        - name: Remove subscription popup from Proxmox web UI
          ansible.builtin.replace:
            path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
            regexp: "Ext\\.Msg\\.show\\(\\{\\s+title: gettext\\('No valid subscription'\\),"
            replace: "void({ //title: gettext('No valid subscription'),"
          notify: Restart pveproxy

    - name: Configure Homepage Proxmox user
      tags: homepage
      block:
        - name: Require Homepage Proxmox password
          ansible.builtin.assert:
            that:
              - homepage_proxmox_password | length > 0
            fail_msg: "Set HOMEPAGE_PROXMOX_PASSWORD in infrastructure/ansible/.env"

        - name: Read Proxmox users
          ansible.builtin.command:
            argv:
              - pveum
              - user
              - list
              - --output-format
              - json
          register: proxmox_users
          changed_when: false

        - name: Create Homepage Proxmox user
          ansible.builtin.command:
            argv:
              - pveum
              - user
              - add
              - homepage.bot@pve
              - --comment
              - Homepage read-only identity
              - --enable
              - "1"
          when: "'homepage.bot@pve' not in (proxmox_users.stdout | from_json | map(attribute='userid'))"

        - name: Set Homepage Proxmox user password
          ansible.builtin.command:
            argv:
              - pveum
              - passwd
              - homepage.bot@pve
            stdin: "{{ homepage_proxmox_password }}\n{{ homepage_proxmox_password }}"
          changed_when: false
          no_log: true

        - name: Grant Homepage user read-only cluster access
          ansible.builtin.command:
            argv:
              - pveum
              - acl
              - modify
              - /
              - --users
              - homepage.bot@pve
              - --roles
              - PVEAuditor
          changed_when: false

    - name: Configure Authelia OpenID Connect realm for Proxmox
      tags: [oidc, authelia]
      block:
        - name: Require Proxmox OIDC client secret
          ansible.builtin.assert:
            that:
              - proxmox_oidc_client_secret | length > 0
            fail_msg: "Set PROXMOX_OIDC_CLIENT_SECRET in infrastructure/ansible/.env"

        - name: Read Proxmox realms
          ansible.builtin.command:
            argv:
              - pveum
              - realm
              - list
              - --output-format
              - json
          register: proxmox_realms
          changed_when: false

        - name: Create Authelia OpenID realm
          ansible.builtin.command:
            argv:
              - pveum
              - realm
              - add
              - "{{ proxmox_oidc_realm }}"
              - --type
              - openid
              - --issuer-url
              - "{{ proxmox_oidc_issuer_url }}"
              - --client-id
              - proxmox
              - --client-key
              - "{{ proxmox_oidc_client_secret }}"
              - --username-claim
              - email
              - --scopes
              - openid email profile
              - --autocreate
              - "1"
              - --query-userinfo
              - "1"
              - --comment
              - Authelia OIDC SSO
          when: proxmox_oidc_realm not in (proxmox_realms.stdout | from_json | map(attribute='realm'))
          no_log: true

        - name: Update Authelia OpenID realm
          ansible.builtin.command:
            argv:
              - pveum
              - realm
              - modify
              - "{{ proxmox_oidc_realm }}"
              - --issuer-url
              - "{{ proxmox_oidc_issuer_url }}"
              - --client-id
              - proxmox
              - --client-key
              - "{{ proxmox_oidc_client_secret }}"
              - --scopes
              - openid email profile
              - --autocreate
              - "1"
              - --query-userinfo
              - "1"
              - --comment
              - Authelia OIDC SSO
          when: proxmox_oidc_realm in (proxmox_realms.stdout | from_json | map(attribute='realm'))
          no_log: true

        - name: Read Proxmox users
          ansible.builtin.command:
            argv:
              - pveum
              - user
              - list
              - --output-format
              - json
          register: proxmox_oidc_users
          changed_when: false

        - name: Create Authelia admin Proxmox user
          ansible.builtin.command:
            argv:
              - pveum
              - user
              - add
              - "{{ proxmox_oidc_admin_user }}"
              - --comment
              - Authelia OIDC administrator
              - --enable
              - "1"
          when: proxmox_oidc_admin_user not in (proxmox_oidc_users.stdout | from_json | map(attribute='userid'))

        - name: Grant Proxmox administrator access to Authelia admin user
          ansible.builtin.command:
            argv:
              - pveum
              - acl
              - modify
              - /
              - --users
              - "{{ proxmox_oidc_admin_user }}"
              - --roles
              - Administrator
          changed_when: false

    - name: Tailscale setup on Proxmox host
      tags:
      - networking
      - tailscale
      block:
        - name: Ensure Tailscale repository key is installed
          ansible.builtin.get_url:
            url: https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg
            dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
            mode: '0644'

        - name: Configure Tailscale apt repository
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian bookworm main"
            filename: tailscale
            state: present

        - name: Install Tailscale at requested version
          ansible.builtin.apt:
            update_cache: true
            name: "tailscale={{ tailscale_version }}"
            force_apt_get: true
            allow_downgrade: true

        - name: Ensure tailscaled service enabled and running
          ansible.builtin.systemd:
            name: tailscaled
            enabled: true
            state: started

        - name: Check Tailscale status
          ansible.builtin.command: tailscale status --peers=false
          register: tailscale_status
          failed_when: false
          changed_when: false

        - name: Fail if auth key missing when login required
          ansible.builtin.fail:
            msg: "TAILSCALE_AUTHKEY env var required to bring Tailscale up"
          when: (tailscale_status.rc != 0) and (tailscale_auth_key | length == 0)

        - name: Bring Tailscale up when not connected
          ansible.builtin.command: tailscale up --auth-key={{ tailscale_auth_key }} {{ tailscale_args }}
          when: tailscale_status.rc != 0

        - name: Configure Tailscale metrics systemd service
          ansible.builtin.blockinfile:
            path: /etc/systemd/system/tailscale-metrics.service
            mode: '0644'
            create: true
            marker: "### {mark} ANSIBLE MANAGED - tailscale metrics ###"
            block: |
              [Unit]
              Description=Tailscale metrics server
              After=network-online.target tailscaled.service
              Wants=network-online.target
              ConditionPathExists=/usr/bin/tailscale

              [Service]
              Type=simple
              ExecStart=/usr/bin/tailscale web --listen 127.0.0.1:5252
              Restart=on-failure
              User=root
              Group=root

              [Install]
              WantedBy=multi-user.target

        - name: Ensure Tailscale metrics service running
          ansible.builtin.systemd:
            name: tailscale-metrics.service
            enabled: true
            state: started
          notify: Restart Tailscale metrics



    # Stage: Update PermitRootLogin in LXC 104 from Proxmox host
    - name: Set PermitRootLogin prohibit-password in LXC 104
      become: true
      block:
        - name: Set PermitRootLogin prohibit-password and restart ssh in LXC 104
          ansible.builtin.shell: >
            pct exec 104 -- sed -i 's/^#PermitRootLogin.*/PermitRootLogin prohibit-password/g' /etc/ssh/sshd_config && pct exec 104 -- systemctl restart ssh
            
  handlers:
    - name: Restart Tailscale metrics
      ansible.builtin.systemd:
        name: tailscale-metrics.service
        state: restarted

    - name: Restart pveproxy
      ansible.builtin.systemd:
        name: pveproxy
        state: restarted
