---
- name: Install managed K3s control plane
  hosts: vm_k8mgd
  become: true
  gather_facts: false
  vars_files:
    - vars/versions.yaml

  tasks:
    - name: Configure k3s
      tags:
      - k8
      - mgd
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/config.yaml
        mode: '0644'
        content: |
          write-kubeconfig-mode: "0600"
          bind-address: "{{ k3s_bind_address }}"
          cluster-init: true
          tls-san:
            - "{{ k3s_tls_san }}"
          disable:
            - servicelb
            - traefik
      notify: Restart k3s

    - name: Check if k3s is installed
      tags:
      - k8
      - mgd
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_bin

    - name: Install k3s when missing
      tags:
      - k8
      - mgd
      ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -s - server
      args:
        creates: /usr/local/bin/k3s
      environment:
        INSTALL_K3S_VERSION: "{{ k3s_version }}"
      when: not k3s_bin.stat.exists

    - name: Ensure base packages
      tags:
      - k8
      - mgd
      ansible.builtin.apt:
        cache_valid_time: 3600
        pkg: 
        - yq
        - nfs-common

    - name: Read managed cluster certificate-authority-data
      tags:
      - k8
      - mgd
      ansible.builtin.command: yq -r '.clusters[0].cluster."certificate-authority-data"' {{ k3s_config }}
      register: ca_data
      changed_when: false

    - name: Store managed cluster CA for downstream plays
      tags:
      - k8
      - mgd
      ansible.builtin.set_fact:
        k3s_cluster_ca: "{{ ca_data.stdout }}"
      no_log: true

  handlers:
    - name: Restart k3s
      ansible.builtin.systemd:
        name: k3s
        state: restarted
