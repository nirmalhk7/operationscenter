name: Publish Equity Research Package

on:
  push:
    branches:
      - main
    paths:
      - 'openclaw/cli/equity-research/**'
      - '.github/workflows/publish-equity-research.yaml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    defaults:
      run:
        working-directory: openclaw/cli/equity-research
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          registry-url: https://npm.pkg.github.com
          scope: '@nirmalhk7'
          cache: npm
          cache-dependency-path: openclaw/cli/equity-research/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Release
        run: npx semantic-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
