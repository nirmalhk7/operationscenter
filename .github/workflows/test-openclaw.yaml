name: Validate OpenClaw Config

on:
  push:
    branches:
      - main
    paths:
      - 'openclaw/openclaw.json'
      - '.github/workflows/test-openclaw.yaml'
  pull_request:
    branches:
      - '**'
    paths:
      - 'openclaw/openclaw.json'
      - '.github/workflows/test-openclaw.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.34.4'
          run_install: |
            - args: [--global, 'openclaw@2026.4.23', promptfoo, '@buape/carbon', '@larksuiteoapi/node-sdk', grammy]

      - name: Validate OpenClaw Configuration
        run: |
          mkdir -p ~/.openclaw
          cp openclaw/openclaw.json ~/.openclaw/openclaw.json
          openclaw config validate
