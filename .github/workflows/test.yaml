name: Test Infrastructure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      k8s: ${{ steps.filter.outputs.k8s }}
      nginx: ${{ steps.filter.outputs.nginx }}
      ansible: ${{ steps.filter.outputs.ansible }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            k8s:
              - 'clusters/**'
              - 'charts/**'
            nginx:
              - 'nginx/**'
            ansible:
              - 'infrastructure/ansible/**'
            terraform:
              - 'infrastructure/terra/**'

  test-k8s:
    needs: filter
    if: needs.filter.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint and kubeconform
        run: |
          sudo apt-get update && sudo apt-get install -y yamllint
          KUBECONFORM_VERSION=v0.6.7
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
      - name: Run yamllint
        run: >
          yamllint -d "{extends: relaxed, rules: {line-length: disable, document-start: disable, truthy: disable, empty-lines: disable, comments: disable, trailing-spaces: disable, indentation: disable}}" clusters/ charts/
      - name: Run kubeconform
        run: |
          kubeconform -summary -ignore-missing-schemas -schema-location default -schema-location "https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json" clusters/ charts/

  test-nginx:
    needs: filter
    if: needs.filter.outputs.nginx == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate dummy SSL certs
        run: |
          sudo mkdir -p /etc/letsencrypt/live/trusted.nirmalhk7.com/
          sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/letsencrypt/live/trusted.nirmalhk7.com/privkey.pem -out /etc/letsencrypt/live/trusted.nirmalhk7.com/fullchain.pem -subj "/CN=trusted.nirmalhk7.com"
      - name: Test Nginx config
        run: |
          cd nginx
          sudo nginx -t -c $(pwd)/nginx.conf -p $(pwd)

  test-ansible:
    needs: filter
    if: needs.filter.outputs.ansible == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Ansible
        run: pip install ansible
      - name: Run Ansible syntax check
        run: |
          cd infrastructure/ansible
          ansible-playbook --syntax-check main.ansible.yaml -i inventory.ini || true
          for playbook in *.ansible.yaml; do
            ansible-playbook --syntax-check $playbook -i inventory.ini
          done

  test-terraform:
    needs: filter
    if: needs.filter.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Create dummy SSH keys
        run: |
          mkdir -p ~/.ssh
          touch ~/.ssh/id_ed25519_homelab.pub
          touch ~/.ssh/id_ed25519_mgmt.pub
      - name: Terraform Init
        run: |
          cd infrastructure/terra
          terraform init -backend=false
      - name: Terraform Validate
        run: |
          cd infrastructure/terra
          terraform validate
