name: Test Ansible

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/ansible/**'
      - '.github/workflows/test-ansible.yaml'
  pull_request:
    branches:
      - '**'
    paths:
      - 'infrastructure/ansible/**'
      - '.github/workflows/test-ansible.yaml'

jobs:
  test-ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install Ansible
        run: pip install ansible
      - name: Run Ansible syntax check
        run: |
          cd infrastructure/ansible
          ansible-playbook --syntax-check main.ansible.yaml -i inventory.ini || true
          for playbook in *.ansible.yaml; do
            ansible-playbook --syntax-check $playbook -i inventory.ini
          done
