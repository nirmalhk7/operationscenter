name: Test Terraform

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/terra/**'
      - '.github/workflows/test-terraform.yaml'
  pull_request:
    branches:
      - '**'
    paths:
      - 'infrastructure/terra/**'
      - '.github/workflows/test-terraform.yaml'

jobs:
  test-terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
      - name: Create dummy SSH keys
        run: |
          mkdir -p ~/.ssh
          touch ~/.ssh/id_ed25519_homelab.pub
          touch ~/.ssh/id_ed25519_mgmt.pub
      - name: Terraform Init
        run: |
          cd infrastructure/terra
          terraform init -backend=false
      - name: Terraform Validate
        run: |
          cd infrastructure/terra
          terraform validate
