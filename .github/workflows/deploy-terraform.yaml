name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/terra/**'
      - '.github/workflows/deploy-terraform.yaml'

permissions:
  pull-requests: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Create dummy SSH keys
        run: |
          mkdir -p ~/.ssh
          touch ~/.ssh/id_ed25519_homelab.pub
          touch ~/.ssh/id_ed25519_mgmt.pub

      - name: Terraform Init
        env:
          TF_VAR_pm_api_url: ${{ secrets.TF_PM_API_URL }}
          TF_VAR_pm_user: ${{ secrets.TF_PM_USER }}
          TF_VAR_pm_password: ${{ secrets.TF_PM_PASSWORD }}
        run: |
          cd infrastructure/terra
          terraform init -backend=false

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_pm_api_url: ${{ secrets.TF_PM_API_URL }}
          TF_VAR_pm_user: ${{ secrets.TF_PM_USER }}
          TF_VAR_pm_password: ${{ secrets.TF_PM_PASSWORD }}
        run: |
          cd infrastructure/terra
          terraform plan -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infrastructure/terra/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n... (truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1
