{{- if .Values.mongo.embedded.enabled }}
apiVersion: v1
data:
  mongod.conf: |
    systemLog:
        quiet: true

    net:
        port: 27017
        bindIp: 0.0.0.0

    security:
       authorization: enabled
kind: ConfigMap
metadata:
  name: mongod-conf
  namespace: {{ .Release.Namespace }}
{{- end }}
