apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Release.Name }}-touca-app
  name: {{ .Release.Name }}-touca-app
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-touca-app
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-touca-app
    spec:
      containers:
      - image: {{ .Values.toucaApp.dockerRepoName | default "touca" | lower }}/{{ .Values.toucaApp.dockerImageName }}:{{ .Values.toucaApp.dockerImageTag }}
        name: {{ .Release.Name }}-touca-app
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: ENV_FILE
          value: prod
        - name: WEBAPP_ROOT
          value: {{ .Values.toucaApp.webappRoot | quote }}
        - name: MINIO_HOST
          value: {{ .Release.Name }}-touca-minio
        - name: MONGO_HOST
          {{- if .Values.mongo.embedded.enabled }}
          value: {{ .Release.Name }}-touca-mongo
          {{- else }}
          value: {{ required "mongo.host is required when mongo.embedded.enabled is false" .Values.mongo.host | quote }}
          {{- end }}
        - name: REDIS_HOST
          value: {{ .Release.Name }}-touca-redis
        - name: MINIO_USER
          value: toucauser
        - name: MINIO_PASS
          value: toucapass
        {{- if .Values.mongo.existingSecret }}
        - name: MONGO_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongo.existingSecret }}
              key: MONGO_USER
        - name: MONGO_PASS
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongo.existingSecret }}
              key: MONGO_PASS
        {{- else }}
        - name: MONGO_USER
          value: toucauser
        - name: MONGO_PASS
          value: toucapass
        {{- end }}
