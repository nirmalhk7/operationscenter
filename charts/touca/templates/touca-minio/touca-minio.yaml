apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Release.Name }}-touca-minio
  name: {{ .Release.Name }}-touca-minio
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-touca-minio
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-touca-minio
    spec:
      containers:
      - image: {{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}
        name: {{ .Release.Name }}-touca-minio
        env:
        - name: MINIO_ROOT_USER
          value: toucauser
        - name: MINIO_ROOT_PASSWORD
          value: toucapass
        command: [ "minio"]
        args: [ "server", "/data"]
        volumeMounts:
        - mountPath: /data/
          name: minio-volume
      volumes:
      - name: minio-volume
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}-minio-data