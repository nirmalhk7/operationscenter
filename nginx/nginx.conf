events {
    worker_connections 1024;
}

http {
    # Per-domain Content-Security-Policy
    map $host $csp_policy {
        # Strictest default: only self, no external sources
        default "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # home.trusted.nirmalhk7.com: allow shields.io badges, unsplash background, open-meteo API
        home.trusted.nirmalhk7.com "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: https://cdn.jsdelivr.net https://images.unsplash.com https://img.shields.io; font-src 'self'; connect-src 'self' https://api.open-meteo.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";
    }

    # TODO nirmalhk7 Include nginx level rate limiting.
    include conf.d/statuscheck.conf;

    # Homepage on local
    include conf.d/local.conf;

    # proxmox.trusted.nirmalhk7.com Proxmox dashboard
    include conf.d/proxmox.conf;

    # Local metrics connection
    include conf.d/prometheus.conf;

    # *.trusted.nirmalhk7.com
    include conf.d/mgd.conf;
}