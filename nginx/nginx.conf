events {
    worker_connections 1024;
}

http {
    # Per-domain Content-Security-Policy
    map $host $csp_policy {
        # Strictest default: only self, no external sources
        default "default-src 'none'; script-src 'self' chrome-extension:; style-src 'self' chrome-extension:; img-src 'self' chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Traefik Dashboard: Vue app requires unsafe-inline and potentially unsafe-eval
        traefik.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' https://traefik.github.io chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";
        "~*traefik\.trusted\.nirmalhk7\.com" "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' https://traefik.github.io chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # nginx.trusted.nirmalhk7.com: allow inline scripts for dashboard and unsafe-eval for some JS
        nginx.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # llms.trusted.nirmalhk7.com: allow inline scripts and styles for LLM UIs
        llms.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Nextcloud
        drive.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://drive.trusted.nirmalhk7.com; object-src 'none'; manifest-src 'self'";

        # home.trusted.nirmalhk7.com: allow shields.io badges, unsplash background, open-meteo API, jsdelivr icons
        home.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: https://images.unsplash.com https://img.shields.io https://cdn.jsdelivr.net chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Immich: official recommended policy
        immich.trusted.nirmalhk7.com "default-src 'self'; script-src 'self' 'unsafe-inline' https://immich.trusted.nirmalhk7.com https://static.immich.cloud https://tiles.immich.cloud chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; connect-src 'self' https://immich.trusted.nirmalhk7.com https://tiles.immich.cloud https://static.immich.cloud chrome-extension:; frame-ancestors 'self'; worker-src 'self' blob:; object-src 'none'";

        # Gitea: unsafe-inline for syntax highlighting, https: in img-src for external avatars
        git.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: https: chrome-extension:; font-src 'self' data: chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://git.trusted.nirmalhk7.com; object-src 'none'; manifest-src 'self'";

        # SonarQube: unsafe-eval required by its React UI
        sonarqube.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' data: chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Outline: unsafe-eval for ProseMirror, blob for uploads, wss for collab
        outline.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: blob: https: chrome-extension:; font-src 'self' data: chrome-extension:; connect-src 'self' blob: wss://outline.trusted.nirmalhk7.com chrome-extension:; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Grafana: unsafe-eval for panel rendering, wss for live dashboards
        grafana.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: blob: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' wss://grafana.trusted.nirmalhk7.com chrome-extension:; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Prometheus: unsafe-eval for expression browser — otherwise default is sufficient
        prometheus.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # robot.trusted.nirmalhk7.com: allow inline styles and data URIs for images
        robot.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' wss://robot.trusted.nirmalhk7.com chrome-extension:; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # sentinel.trusted.nirmalhk7.com (NetAlertX): inline assets and API calls
        sentinel.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: blob: chrome-extension:; font-src 'self' data: chrome-extension:; connect-src 'self' chrome-extension:; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Proxmox: allow inline scripts, styles, eval, and data URIs for ExtJS
        proxmox.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Scrutiny: allow inline scripts and styles
        scrutiny.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # n8n: allow inline scripts and styles
        n8n.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Pterodactyl Panel: allow Gravatar and standard UI requirements
        gaming.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: https://www.gravatar.com chrome-extension:; font-src 'self' data: chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Catch-all for other subdomains that might need some inline styles/scripts
        ~*\.trusted\.nirmalhk7\.com$ "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";
        "*.trusted.nirmalhk7.com" "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";
    }

    # Allow server-side OIDC callers (e.g. Proxmox libwww-perl) on token/discovery paths.
    map $request_uri $oidc_server_path {
        default 0;
        ~^/\.well-known/openid-configuration$ 1;
        ~^/api/oidc/ 1;
        ~^/jwks\.json$ 1;
    }

    map $http_user_agent $bad_bot_user_agent {
        default 0;
        ~*(nikto|sqlmap|fimap|nmap|nessus|dirbuster|acunetix|netsparker|curl|wget|libwww|python|scan|bot|crawler|spider|scrapy|masscan|hydra|john|havij|paros|burp|zaproxy|rat|brutus|webinspect|sqlninja|w3af|metasploit|coreimpact|canvas|beef|sqlsus|sqlbrute|sqlb|gpt|openai|chatgpt|bard|gemini|llama|anthropic|claude|copilot|ai|deepmind|bingbot|googlebot|yandexbot|baiduspider|sogou|exabot|facebot|ia_archiver) 1;
    }

    map "$bad_bot_user_agent:$oidc_server_path" $block_bot_user_agent {
        "1:0" 1;
        default 0;
    }

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=addr:1000m rate=1000r/s;
    limit_req_status 429;


    include conf.d/statuscheck.conf;

    # Homepage on local
    include conf.d/local.conf;

    # proxmox.trusted.nirmalhk7.com Proxmox dashboard
    include conf.d/proxmox.conf;

    # Local metrics connection
    include conf.d/prometheus.conf;

    # OpenClaw connection
    include conf.d/robot.conf;

    # NetAlertX (home LAN monitoring)
    include conf.d/sentinel.conf;

    # *.trusted.nirmalhk7.com
    include conf.d/mgd.conf;
}

stream {
    log_format mc_proxy '$remote_addr [$time_local] '
                        '$protocol $status $bytes_sent $bytes_received '
                        '$session_time "$upstream_addr"';
    access_log /var/log/nginx/stream-access.log mc_proxy;

    include stream.d/*.conf;
}
