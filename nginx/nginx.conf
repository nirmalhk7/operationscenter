worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # --- Rate Limiting ---
    # Zone for general request rate limiting: 10 req/s per IP, 10MB state
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # Stricter zone for auth/login endpoints
    limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;
    limit_req_status 429;

    # --- Log Format ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # --- Per-domain client_max_body_size ---
    # Default: 2M. Immich needs 50G.
    map $host $client_max_body {
        default              2m;
        immich.trusted.nirmalhk7.com 50g;
    }

    # --- Per-domain Cross-Origin-Embedder-Policy ---
    # Some apps (e.g. Immich) use SharedArrayBuffer and require COEP.
    # Others will break with require-corp (e.g. if they load cross-origin resources).
    map $host $coep_policy {
        default                           "require-corp";
        outline.trusted.nirmalhk7.com     "unsafe-none";
        git.trusted.nirmalhk7.com         "unsafe-none";
        sonarqube.trusted.nirmalhk7.com   "unsafe-none";
    }

    # --- Per-domain Cross-Origin-Opener-Policy ---
    map $host $coop_policy {
        default                           "same-origin";
        outline.trusted.nirmalhk7.com     "same-origin-allow-popups";
    }

    # --- Per-domain Content-Security-Policy ---
    map $host $csp_policy {
        # Strictest default: only self, no external sources
        default "default-src 'none'; script-src 'self' chrome-extension:; style-src 'self' chrome-extension:; img-src 'self' chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Nextcloud
        drive.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://drive.trusted.nirmalhk7.com; object-src 'none'; manifest-src 'self'";

        # home.trusted.nirmalhk7.com: allow shields.io badges, unsplash background, open-meteo API
        home.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: https://images.unsplash.com https://img.shields.io chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Immich: official recommended policy
        immich.trusted.nirmalhk7.com "default-src 'self'; script-src 'self' https://immich.trusted.nirmalhk7.com https://static.immich.cloud https://tiles.immich.cloud 'sha256-h5wSYKWbmHcoYTdkHNNguMswVNCphpvwW+uxooXhF/Y=' 'sha256-MK9u9tTzYnMIn9JSYcvLuwDDlo6Oevw1wdQBWB8TGys=' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; connect-src 'self' https://immich.trusted.nirmalhk7.com https://tiles.immich.cloud https://static.immich.cloud chrome-extension:; frame-ancestors 'self'; worker-src 'self' blob:; object-src 'none'";

        # Gitea: unsafe-inline for syntax highlighting, https: in img-src for external avatars
        git.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: https: chrome-extension:; font-src 'self' data: chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://git.trusted.nirmalhk7.com; object-src 'none'; manifest-src 'self'";

        # SonarQube: unsafe-eval required by its React UI
        sonarqube.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' data: chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Outline: unsafe-eval for ProseMirror, blob for uploads, wss for collab
        outline.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: blob: https: chrome-extension:; font-src 'self' data: chrome-extension:; connect-src 'self' blob: wss://outline.trusted.nirmalhk7.com chrome-extension:; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Grafana: unsafe-eval for panel rendering, wss for live dashboards
        grafana.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: blob: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' wss://grafana.trusted.nirmalhk7.com chrome-extension:; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";

        # Prometheus: unsafe-eval for expression browser — otherwise default is sufficient
        prometheus.trusted.nirmalhk7.com "default-src 'none'; script-src 'self' 'unsafe-eval' chrome-extension:; style-src 'self' 'unsafe-inline' chrome-extension:; img-src 'self' data: chrome-extension:; font-src 'self' chrome-extension:; connect-src 'self' chrome-extension:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'";
    }

    include conf.d/statuscheck.conf;

    # Homepage on local
    include conf.d/local.conf;

    # proxmox.trusted.nirmalhk7.com Proxmox dashboard
    include conf.d/proxmox.conf;

    # Local metrics connection
    include conf.d/prometheus.conf;

    # *.trusted.nirmalhk7.com
    include conf.d/mgd.conf;
}