upstream appwrite_livepublic {
    server 172.16.0.105:8443;
    keepalive 10;
}

server {
    listen 127.0.0.1:18080 default_server;
    server_name _;
    return 444;
}

server {
    listen 127.0.0.1:18080;
    server_name dev.nirmalhk7.com;

    server_tokens off;
    add_header Milano-Resource "OCB-appwrite-public" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 32m;
    limit_req zone=appwrite_cf burst=60 nodelay;

    if ($host != "dev.nirmalhk7.com") {
        return 444;
    }

    if ($request_method !~ ^(GET|POST|HEAD|PUT|PATCH|DELETE|OPTIONS)$) {
        return 405;
    }

    location ~* (^|/)(\.git|\.svn|\.hg|\.env|\.DS_Store|\.htaccess|\.htpasswd|composer\.(json|lock)|package-lock\.json|yarn\.lock)$ {
        return 404;
    }

    location ~* \.(bak|backup|old|orig|save|swp|sql|sqlite|db|dump|log|pem|key|crt|zip|tar|gz|tgz|bz2|7z|rar)$ {
        return 404;
    }

    location / {
        proxy_pass https://appwrite_livepublic;
        proxy_ssl_verify off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_keepalive;

        proxy_set_header Host dev.nirmalhk7.com;
        proxy_set_header X-Forwarded-Host dev.nirmalhk7.com;
        proxy_set_header X-Real-IP $cloudflare_client_ip;
        proxy_set_header X-Forwarded-For $cloudflare_client_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $cloudflare_client_ip;
    }
}
