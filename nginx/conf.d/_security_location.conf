# Block access to hidden files and sensitive paths
location ~* /(\.git|\.svn|\.env|\.DS_Store|\.htaccess|\.htpasswd|backup|bak)(/|$) {
    return 404;
}
location ~* \.(pem|key|crt|log|zip|tar|gz|tgz|bz2|7z|rar)$ {
    return 404;
}

# Limit request methods
if ($request_method !~ ^(GET|POST|HEAD|DELETE|PUT|PATCH|OPTIONS|PROPFIND|REPORT)$) {
    return 405;
}
