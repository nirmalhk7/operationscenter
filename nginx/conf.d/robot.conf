upstream robot_mgd {
    server 172.16.0.104:18789; 
    keepalive 10;
}

# Upgrade WebSocket if requested, otherwise use keepalive
map $http_upgrade $connection_upgrade_keepalive {
    default upgrade;
    ''      '';
}

server {
    listen 80;
    server_name robot.trusted.nirmalhk7.com;
    
    include conf.d/_security.conf;
    add_header Milano-Resource "OCB-robot";

    location / {
        proxy_pass http://robot_mgd;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_keepalive;
        include conf.d/_security_location.conf;
    }
}

server {
    listen 443 ssl;
    server_name robot.trusted.nirmalhk7.com;

    include conf.d/_security.conf;
    include conf.d/_security_https.conf;
    add_header Milano-Resource "OCB-robot";

    location / {
        proxy_pass http://robot_mgd;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_keepalive;
        include conf.d/_security_location.conf;
    }
}