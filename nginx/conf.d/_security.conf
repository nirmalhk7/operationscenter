# --- Security Headers ---
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# CSP is domain-aware via the $csp_policy map in nginx.conf.
add_header Content-Security-Policy $csp_policy always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
# COOP/COEP use per-domain maps in nginx.conf — loosen per-domain there, not here.
add_header Cross-Origin-Opener-Policy $coop_policy always;
add_header Cross-Origin-Embedder-Policy $coep_policy always;

# --- Miscellaneous ---
server_tokens off;

# --- Proxy Headers ---
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# --- WebSocket Support ---
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade_keepalive;

# --- Request Size & Buffer Limits ---
# Per-domain body size via $client_max_body map in nginx.conf (default: 2M).
client_max_body_size $client_max_body;
client_body_buffer_size 16k;
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;

# --- Timeout Settings ---
proxy_read_timeout 60s;
proxy_connect_timeout 10s;
proxy_send_timeout 60s;

# --- DNS Resolver ---
resolver 1.1.1.1 1.0.0.1 valid=300s;
resolver_timeout 5s;

# --- Error Handling ---
error_page 504 /timeout.html;
location = /timeout.html {
    internal;
    return 504 '{"error":"gateway_timeout"}';
}

error_page 502 /badgateway.html;
location = /badgateway.html {
    internal;
    return 502 '{"error":"bad_gateway"}';
}

error_page 429 /ratelimit.html;
location = /ratelimit.html {
    internal;
    return 429 '{"error":"rate_limited"}';
}

# --- Access Control: block sensitive paths ---
location ~* /(\.git|\.svn|\.env|\.DS_Store|\.htaccess|\.htpasswd|backup|bak)(/|$) {
    return 404;
}
location ~* \.(pem|key|crt|log|zip|tar|gz|tgz|bz2|7z|rar)$ {
    return 404;
}

# --- Enforce HTTPS ---
if ($scheme = http) {
    return 301 https://$host$request_uri;
}

# --- Limit HTTP methods ---
if ($request_method !~ ^(GET|POST|HEAD|PUT|DELETE|PATCH|OPTIONS|PROPFIND|REPORT|SEARCH|MKCOL)$) {
    return 405;
}
