upstream milano_mgd {
    server 172.16.0.105:443;
    keepalive 10;
}

server {
    listen 80;
    server_name *.trusted.nirmalhk7.com;

    include conf.d/_security.conf;
    add_header Milano-Resource "OCB-mgd";

    location / {
        proxy_pass https://milano_mgd;
        proxy_ssl_verify off;
        include conf.d/_security_location.conf;
    }
}

server {
    listen 443 ssl;
    server_name *.trusted.nirmalhk7.com;

    include conf.d/_security.conf;
    include conf.d/_security_https.conf;
    add_header Milano-Resource "OCB-mgd";

    location / {
        proxy_pass https://milano_mgd;
        proxy_ssl_verify off;
        include conf.d/_security_location.conf;
    }
}
