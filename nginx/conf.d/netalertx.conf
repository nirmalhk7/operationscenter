upstream netalertx_mgd {
    server 172.16.0.103:20211;
    keepalive 10;
}

server {
    listen 80;
    server_name netalertx.trusted.nirmalhk7.com;

    include conf.d/_security.conf;
    add_header Milano-Resource "OCB-netalertx";

    location / {
        proxy_pass http://netalertx_mgd;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include conf.d/_security_location.conf;
    }
}

server {
    listen 443 ssl;
    server_name netalertx.trusted.nirmalhk7.com;

    include conf.d/_security.conf;
    include conf.d/_security_https.conf;
    add_header Milano-Resource "OCB-netalertx";

    location / {
        proxy_pass http://netalertx_mgd;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include conf.d/_security_location.conf;
    }
}
